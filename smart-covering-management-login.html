function Salesmen({ leads, setLeads, followups, setFollowups, orders, payments, salesmen, setSalesmen }) {
  const [sel,setSel]=useState(null);
  const blankSalesman={name:"",mobile:"",area:"",email:"",loginId:"",password:""};
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState(blankSalesman);
  const [reassign,setReassign]=useState(null);
  const [reassignFilter,setReassignFilter]=useState("All");
  const [bulkTarget,setBulkTarget]=useState("");
  const [reassignLogs,setReassignLogs]=useState(()=>{
    try { return JSON.parse(localStorage.getItem("smartcovering_reassignment_logs"))||[]; }
    catch { return []; }
  });
  const addSalesman=async ()=>{
    const nameError=validatePersonName(form.name);
    if(nameError)return alert(nameError);
    const mobileError=validateMobile(form.mobile);
    if(mobileError)return alert(mobileError);
    const emailError=validateSalesmanEmail(form.email);
    if(emailError)return alert(emailError);
    if(!form.loginId.trim()||!form.password.trim())return alert("Login ID and password are required");
    if(salesmen.some(s=>s.loginId?.toLowerCase()===form.loginId.trim().toLowerCase()))return alert("This login ID is already used");
    const initials=form.name.split(" ").filter(Boolean).map(p=>p[0]).join("").slice(0,2).toUpperCase()||"SM";
    const colors=[T.blue,T.green,T.orange,T.purple,T.teal,T.amber,T.red];
    const id=Date.now();
    try {
      await createBackendAccessUser({name:form.name.trim(),loginId:form.loginId.trim(),password:form.password.trim(),role:"salesman",linkedEntityId:id});
    } catch (error) {
      return alert(error.message||"Could not create salesman login");
    }
    setSalesmen(list=>[...list,{...form,name:form.name.trim(),mobile:normalizeMobile(form.mobile),email:form.email.trim().toLowerCase(),loginId:form.loginId.trim(),password:"",id,initials,joining:todayStr(),color:colors[list.length%colors.length]}]);
    setForm(blankSalesman);
    setShowAdd(false);
  };
  const removeSalesman=(e,id)=>{
    e.stopPropagation();
    const salesman=salesmen.find(s=>s.id===id);
    if(!salesman)return;
    const owned=leads.filter(l=>l.salesman===id);
    const active=salesmen.filter(s=>s.id!==id);
    if(!active.length)return alert("Please add another active salesman before removing this salesman.");
    if(!owned.length){
      if(!confirm("Remove this salesman login? No leads are assigned to this salesman."))return;
      setSalesmen(list=>list.filter(s=>s.id!==id));
      if(sel?.id===id)setSel(null);
      return;
    }
    const firstTarget=active[0].id;
    setBulkTarget(String(firstTarget));
    setReassign({
      salesman,
      assignments:owned.reduce((acc,l)=>({...acc,[l.id]:firstTarget}),{}),
      selected:owned.map(l=>l.id),
    });
  };
  const reassignLeadReason=lead=>{
    const quoteAmount=Number(lead.quotation?.amount||0);
    const paid=Number(lead.paymentPaid||0);
    if(isSalesRecognized(lead,orders,payments)&&Math.max(Number(lead.paymentBalance ?? (quoteAmount-paid)),0)>0)return "Payment Pending";
    if(lead.quotation&&!lead.paymentOrderId)return "Quotation Pending";
    if(leadFollowupReason(lead))return "Follow-up Pending";
    if(lead.svDone||lead.status==="Site Visit Scheduled")return "Site Visit Done";
    if(!lead.paymentOrderId&&lead.status!=="Converted")return "Order Not Closed";
    if(lead.channelPartnerId||lead.source==="CP")return "Channel Partner Leads";
    return "Active Lead";
  };
  const reassignFilterMatch=lead=>{
    if(reassignFilter==="All")return true;
    if(reassignFilter==="Payment Pending"){
      const quoteAmount=Number(lead.quotation?.amount||0);
      const paid=Number(lead.paymentPaid||0);
      return isSalesRecognized(lead,orders,payments)&&Math.max(Number(lead.paymentBalance ?? (quoteAmount-paid)),0)>0;
    }
    if(reassignFilter==="Quotation Pending")return !!lead.quotation&&!lead.paymentOrderId;
    if(reassignFilter==="Follow-up Pending")return !!leadFollowupReason(lead);
    if(reassignFilter==="Site Visit Done")return !!lead.svDone||lead.status==="Site Visit Scheduled";
    if(reassignFilter==="Order Not Closed")return !lead.paymentOrderId&&lead.status!=="Converted";
    if(reassignFilter==="Channel Partner Leads")return !!lead.channelPartnerId||lead.source==="CP";
    return true;
  };
  const setReassignTarget=(leadId,target)=>setReassign(r=>({...r,assignments:{...r.assignments,[leadId]:Number(target)}}));
  const toggleReassignLead=leadId=>setReassign(r=>{
    const selected=r.selected.includes(leadId)?r.selected.filter(id=>id!==leadId):[...r.selected,leadId];
    return {...r,selected};
  });
  const applyBulkReassign=ids=>setReassign(r=>{
    if(!bulkTarget)return r;
    const next={...r.assignments};
    ids.forEach(id=>next[id]=Number(bulkTarget));
    return {...r,assignments:next,selected:[...new Set([...r.selected,...ids])]};
  });
  const completeReassignment=()=>{
    const oldId=reassign.salesman.id;
    const owned=leads.filter(l=>l.salesman===oldId);
    const missing=owned.filter(l=>!reassign.assignments[l.id]||Number(reassign.assignments[l.id])===oldId);
    if(missing.length)return alert("Please assign every lead to another salesman before removing.");
    const logRows=owned.reduce((acc,l)=>{
      const target=Number(reassign.assignments[l.id]);
      acc[target]=(acc[target]||0)+1;
      return acc;
    },{});
    const now=new Date().toLocaleString("en-IN");
    const logs=Object.entries(logRows).map(([target,count])=>({
      id:`RAL${Date.now()}-${target}`,
      date:now,
      admin:"Management",
      oldSalesman:reassign.salesman.name,
      newSalesman:smName(Number(target),salesmen),
      count
    }));
    const stamp=new Date().toISOString();
    setLeads(ls=>ls.map(l=>l.salesman===oldId?{...l,salesman:Number(reassign.assignments[l.id]),updated:todayStr(),updatedAt:stamp,reassignedAt:stamp,assignedAt:stamp,reassignmentHistory:[...(l.reassignmentHistory||[]),{date:now,from:reassign.salesman.name,to:smName(Number(reassign.assignments[l.id]),salesmen),admin:"Management"}]}:l));
    setFollowups?.(fs=>fs.map(f=>{
      const lead=owned.find(l=>l.id===f.leadId);
      return lead?{...f,smId:Number(reassign.assignments[lead.id])}:f;
    }));
    setSalesmen(list=>list.filter(s=>s.id!==oldId));
    const nextLogs=[...logs,...reassignLogs].slice(0,40);
    setReassignLogs(nextLogs);
    localStorage.setItem("smartcovering_reassignment_logs",JSON.stringify(nextLogs));
    if(sel?.id===oldId)setSel(null);
    setReassign(null);
    alert(`Reassigned ${owned.length} lead(s) and removed ${reassign.salesman.name}.`);
  };
  const changePassword=async (e,salesman)=>{
    e.stopPropagation();
    const next=prompt(`Enter new password for ${salesman.name}`, "");
    if(!next)return;
    try {
      await createBackendAccessUser({name:salesman.name,loginId:salesman.loginId,password:next,role:"salesman",linkedEntityId:salesman.id});
    } catch (error) {
      return alert(error.message||"Could not update salesman password");
    }
    const forcedLogoutAt=Date.now();
    setSalesmen(list=>list.map(s=>s.id===salesman.id?{...s,password:"",forcedLogoutAt}:s));
    if(sel?.id===salesman.id)setSel(s=>({...s,password:"",forcedLogoutAt}));
    alert("Password changed. Any logged-in session for this salesman will be logged out and old password will not work.");
  };
  const calcSalesmanMetrics=s=>{
    const sLeads=sortLeadsNewest(leads.filter(l=>l.salesman===s.id));
    const converted=sLeads.filter(l=>l.status==="Converted");
    const contacted=sLeads.filter(l=>l.contactDone||["Contacted","Site Visit Scheduled","Quoted","Converted"].includes(l.status)).length;
    const siteVisits=sLeads.filter(l=>l.svDone||["Site Visit Scheduled","Quoted","Converted"].includes(l.status)).length;
    const measured=sLeads.filter(l=>l.measurement||l.measurements?.length).length;
    const quoted=sLeads.filter(l=>l.quotation).length;
    const recognizedSales=sLeads.filter(l=>isSalesRecognized(l,orders,payments));
    const quotedTotal=recognizedSales.reduce((sum,l)=>sum+Number(l.quotation?.amount||0),0);
    const collected=recognizedSales.reduce((sum,l)=>sum+leadPaidFromOrders(l,orders,payments),0);
    const pending=recognizedSales.reduce((sum,l)=>{
      const quotedAmount=Number(l.quotation?.amount||0);
      const paid=leadPaidFromOrders(l,orders,payments);
      const balance=leadBalanceFromOrders(l,orders,payments)||Math.max(quotedAmount-paid,0);
      return sum+Math.max(balance,0);
    },0);
    const paidLeads=recognizedSales.filter(l=>l.paymentMarked&&leadPaidFromOrders(l,orders,payments)>0).length;
    const openFollowups=unifiedFollowups(sLeads,followups,salesmen).filter(f=>f.smId===s.id).length;
    const completedFollowups=followups.filter(f=>f.smId===s.id&&f.outcome==="Completed").length;
    const productionOrders=orders.filter(o=>sLeads.some(l=>l.id===o.leadId)).length;
    const rate=sLeads.length>0?Math.round(converted.length/sLeads.length*100):0;
    return {sLeads,converted,contacted,siteVisits,measured,quoted,quotedTotal,collected,pending,paidLeads,openFollowups,completedFollowups,productionOrders,rate};
  };
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,marginBottom:18}}>
        <SectionTitle>Salesman Management</SectionTitle>
        <PrimaryBtn onClick={()=>setShowAdd(true)} color={T.blue}>+ Add Salesman</PrimaryBtn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:16}}>
        {salesmen.map(s=>{
          const m=calcSalesmanMetrics(s);
          return (
            <GlassCard key={s.id} style={{cursor:"pointer"}} onClick={()=>setSel(s)}>
              <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
                <Avatar name={s.name} size={44} color={s.color} />
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:15,fontWeight:700,color:T.text}}>{s.name}</div>
                  <div style={{fontSize:12,color:T.muted,marginTop:2}}>{s.area}</div>
                  <div style={{fontSize:11,color:T.sub,marginTop:2}}>Login ID: {s.loginId}</div>
                </div>
                <GhostBtn onClick={e=>changePassword(e,s)}>Change Password</GhostBtn>
                <GhostBtn onClick={e=>removeSalesman(e,s.id)}>Remove</GhostBtn>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:20,fontWeight:700,fontFamily:"'Space Grotesk',sans-serif",color:s.color}}>{m.rate}%</div>
                  <div style={{fontSize:10,color:T.muted}}>conv. rate</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:8,marginBottom:14}}>
                {[
                  ["Assigned",m.sLeads.length,T.blue],
                  ["Contacted",m.contacted,T.orange],
                  ["SV Done",m.siteVisits,T.teal],
                  ["Quoted",m.quoted,T.purple],
                  ["Converted",m.converted.length,T.green],
                  ["Collected",inr(m.collected),T.green],
                  ["Pending",inr(m.pending),T.red],
                  ["Sales",inr(m.quotedTotal),s.color]
                ].map(([l,v,c])=>(
                  <div key={l} style={{background:"rgba(255,255,255,.04)",borderRadius:10,padding:"8px 6px",textAlign:"center"}}>
                    <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:14,fontWeight:700,color:c,whiteSpace:"nowrap"}}>{v}</div>
                    <div style={{fontSize:10,color:T.muted,marginTop:2}}>{l}</div>
                  </div>
                ))}
              </div>
            </GlassCard>
          );
        })}
      </div>
      {reassignLogs.length>0&&<GlassCard style={{marginTop:16,padding:0}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}`,fontSize:13,fontWeight:800,color:T.text}}>Reassignment Audit</div>
        <Table headers={["Date / Time","Old Salesman","New Salesman","Leads","Admin"]}>
          {reassignLogs.slice(0,6).map(log=><TR key={log.id}><TD color={T.sub}>{log.date}</TD><TD bold>{log.oldSalesman}</TD><TD bold>{log.newSalesman}</TD><TD>{log.count}</TD><TD>{log.admin}</TD></TR>)}
        </Table>
      </GlassCard>}

      {showAdd&&<Modal title="Add Salesman" onClose={()=>setShowAdd(false)}>
        <FormRow cols={2}>
          <Field label="Salesman Name"><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} /></Field>
          <Field label="Mobile"><input value={form.mobile} maxLength={10} inputMode="numeric" placeholder="10 digit mobile number" onChange={e=>setForm(f=>({...f,mobile:e.target.value.replace(/\D/g,"").slice(0,10)}))} /></Field>
        </FormRow>
        <FormRow cols={2}>
          <Field label="Area"><input value={form.area} onChange={e=>setForm(f=>({...f,area:e.target.value}))} /></Field>
          <Field label="Email"><input type="email" value={form.email} placeholder="name@gmail.com or name@smartcovering.in" onChange={e=>setForm(f=>({...f,email:e.target.value}))} /></Field>
        </FormRow>
        <FormRow cols={2}>
          <Field label="Login ID"><input value={form.loginId} onChange={e=>setForm(f=>({...f,loginId:e.target.value}))} placeholder="example: amit" /></Field>
          <Field label="Password"><input type="text" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} placeholder="Give this to salesman" /></Field>
        </FormRow>
        <div style={{display:"flex",gap:10,marginTop:20}}><PrimaryBtn onClick={addSalesman} color={T.blue}>Save Salesman</PrimaryBtn><GhostBtn onClick={()=>setShowAdd(false)}>Cancel</GhostBtn></div>
      </Modal>}
      {reassign&&(()=>{ 
        const owned=sortLeadsNewest(leads.filter(l=>l.salesman===reassign.salesman.id));
        const visible=sortLeadsNewest(owned.filter(reassignFilterMatch));
        const active=salesmen.filter(s=>s.id!==reassign.salesman.id);
        const assignedCount=owned.filter(l=>reassign.assignments[l.id]&&Number(reassign.assignments[l.id])!==reassign.salesman.id).length;
        const filters=["All","Payment Pending","Quotation Pending","Follow-up Pending","Site Visit Done","Order Not Closed","Channel Partner Leads"];
        return <Modal title={`Reassign Leads - ${reassign.salesman.name}`} onClose={()=>setReassign(null)} wide>
          <div style={{background:T.cardHi,border:`1px solid ${T.border}`,borderRadius:8,padding:12,marginBottom:14,display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10}}>
            <div><div style={{fontSize:11,fontWeight:800,color:T.muted}}>Total Leads</div><div style={{fontSize:22,fontWeight:900,color:T.text}}>{owned.length}</div></div>
            <div><div style={{fontSize:11,fontWeight:800,color:T.muted}}>Ready To Transfer</div><div style={{fontSize:22,fontWeight:900,color:T.green}}>{assignedCount}</div></div>
            <div><div style={{fontSize:11,fontWeight:800,color:T.muted}}>Selected Rows</div><div style={{fontSize:22,fontWeight:900,color:T.blue}}>{reassign.selected.length}</div></div>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",marginBottom:14}}>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {filters.map(f=><button key={f} onClick={()=>setReassignFilter(f)} style={{border:`1px solid ${reassignFilter===f?T.blue:T.border}`,background:reassignFilter===f?T.blue:"#fff",color:reassignFilter===f?"#fff":T.sub,borderRadius:7,padding:"7px 10px",fontSize:12,fontWeight:800,cursor:"pointer"}}>{f}</button>)}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <select value={bulkTarget} onChange={e=>setBulkTarget(e.target.value)} style={{width:190,padding:"8px 10px"}}>
                {active.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
              <GhostBtn onClick={()=>setReassign(r=>({...r,selected:visible.map(l=>l.id)}))}>Select Visible</GhostBtn>
              <PrimaryBtn onClick={()=>applyBulkReassign(reassign.selected.length?reassign.selected:visible.map(l=>l.id))} color={T.blue}>Assign Selected</PrimaryBtn>
            </div>
          </div>
          <GlassCard style={{padding:0,maxHeight:420,overflowY:"auto",marginBottom:14}}>
            <Table headers={["Select","Lead","Status","Reason","Transfer To"]}>
              {visible.map(l=>{
                const quoteAmount=Number(l.quotation?.amount||0);
              const paid=leadPaidFromOrders(l,orders,payments);
              const pending=isSalesRecognized(l,orders,payments)?(leadBalanceFromOrders(l,orders,payments)||Math.max(Number(l.paymentBalance ?? (quoteAmount-paid)),0)):0;
                return <TR key={l.id}>
                  <TD><input type="checkbox" checked={reassign.selected.includes(l.id)} onChange={()=>toggleReassignLead(l.id)} style={{width:"auto"}} /></TD>
                  <TD bold>{l.name}<div style={{fontSize:11,color:T.muted}}>{l.id} | {l.mobile} | {l.source||"Salesman"}</div></TD>
                  <TD><StatusPill s={l.status} /><div style={{fontSize:11,color:T.muted,marginTop:4}}>Quote {quoteAmount?inr(quoteAmount):"-"} | Pending {pending?inr(pending):"-"}</div></TD>
                  <TD><Pill label={reassignLeadReason(l)} color={T.sub} /></TD>
                  <TD><select value={reassign.assignments[l.id]||""} onChange={e=>setReassignTarget(l.id,e.target.value)} style={{minWidth:190,padding:"8px 10px"}}>{active.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></TD>
                </TR>;
              })}
              {!visible.length&&<TR><TD colSpan={5} color={T.muted}>No leads in this filter.</TD></TR>}
            </Table>
          </GlassCard>
          <div style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"center",flexWrap:"wrap"}}>
            <div style={{fontSize:12,color:T.sub}}>Removal will complete only after all {owned.length} lead(s) are assigned to another active salesman. Follow-ups and pending work will move with the lead.</div>
            <div style={{display:"flex",gap:10}}><GhostBtn onClick={()=>setReassign(null)}>Cancel</GhostBtn><PrimaryBtn color={T.red} onClick={completeReassignment}>Transfer Leads & Remove</PrimaryBtn></div>
          </div>
        </Modal>;
      })()}
      {sel&&<Modal title={`${sel.name}  Full Profile`} onClose={()=>setSel(null)} wide>
        {(()=>{ const m=calcSalesmanMetrics(sel); return <>
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20,padding:"16px 20px",background:"rgba(255,255,255,.04)",borderRadius:14}}>
          <Avatar name={sel.name} size={54} color={sel.color} />
          <div>
            <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:18,fontWeight:700,color:T.text}}>{sel.name}</div>
            <div style={{fontSize:13,color:T.muted,marginTop:2}}>{sel.mobile} | {sel.email}</div>
            <div style={{fontSize:12,color:T.sub,marginTop:2}}>{sel.area} | Joined {sel.joining} | Login ID: {sel.loginId} | Password: hidden for security</div>
            <div style={{marginTop:10}}><PrimaryBtn small color={T.blue} onClick={e=>changePassword(e,sel)}>Change Password</PrimaryBtn></div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:16}}>
          <StatKPI label="Assigned Leads" value={m.sLeads.length} color={T.blue} />
          <StatKPI label="Quoted Leads" value={m.quoted} color={T.purple} />
          <StatKPI label="Total Sales" value={inr(m.quotedTotal)} color={sel.color} />
          <StatKPI label="Collected" value={inr(m.collected)} color={T.green} />
          <StatKPI label="Pending" value={inr(m.pending)} color={T.red} />
          <StatKPI label="Open Follow-ups" value={m.openFollowups} color={T.sub} />
        </div>
        <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:10}}>Assigned Leads</div>
        <GlassCard style={{padding:0,marginBottom:0,maxHeight:320,overflowY:"auto"}}>
          <Table headers={["Lead ID","Customer","Product","Status","Quotation","Paid","Pending"]}>
            {m.sLeads.map(l=>{
              const quoted=Number(l.quotation?.amount||0);
              const recognized=isSalesRecognized(l,orders,payments);
              const paid=recognized?leadPaidFromOrders(l,orders,payments):0;
              const pending=recognized?(leadBalanceFromOrders(l,orders,payments)||Math.max(Number(l.paymentBalance ?? (quoted-paid)),0)):0;
              return <TR key={l.id}><TD mono color={T.muted}>{l.id}</TD><TD bold color={T.text}>{l.name}</TD><TD color={T.sub}>{l.product}</TD><TD><StatusPill s={l.status} /></TD><TD bold color={quoted?T.blue:T.muted}>{quoted?inr(quoted):"Not quoted"}</TD><TD color={paid?T.green:T.muted}>{paid?inr(paid):"-"}</TD><TD color={pending?T.red:T.muted}>{pending?inr(pending):"-"}</TD></TR>;
            })}
            {!m.sLeads.length&&<TR><TD colSpan={7} color={T.muted}>No leads assigned to this salesman yet.</TD></TR>}
          </Table>
        </GlassCard>
        </>; })()}
      </Modal>}
    </div>
  );
}

function ChannelPartners({ partners, setPartners, leads=[], orders=[], setLeads, setOrders, salesmen=SALESMEN, isManager }) {
  const [selectedMonth,setSelectedMonth]=useState("2024-12");
  const [selectedYear,setSelectedYear]=useState("2024");
  const [partnerSearch,setPartnerSearch]=useState("");
  const [selected,setSelected]=useState(null);
  const [showPartner,setShowPartner]=useState(false);
  const [showBusiness,setShowBusiness]=useState(false);
  const [editingBusiness,setEditingBusiness]=useState(null);
  const [approval,setApproval]=useState(null);
  const [savingPartner,setSavingPartner]=useState(false);
  const [savingApproval,setSavingApproval]=useState(false);
  const blankPartner={name:"",owner:"",mobile:"",city:"",category:"Dealer",loginId:"",password:""};
  const blankBusiness={partnerId:"",date:todayStr(),project:"",business:"",paid:"",status:"Part Paid"};
  const blankApproval={salesman:1,measurementDate:todayStr(),productionDate:"",installationDate:""};
  const [partnerForm,setPartnerForm]=useState(blankPartner);
  const [businessForm,setBusinessForm]=useState(blankBusiness);
  const [approvalForm,setApprovalForm]=useState(blankApproval);
  const EditActionBtn=({children,onClick})=><EditBtn onClick={onClick}>{children}</EditBtn>;

  const summarize=p=>{
    const tx=p.transactions||[];
    const rq=requestBusinessRows(p);
    const mtd=tx.filter(t=>t.date?.startsWith(selectedMonth)).reduce((s,t)=>s+Number(t.business||0),0);
    const requestMtd=rq.filter(t=>t.date?.startsWith(selectedMonth)).reduce((s,t)=>s+Number(t.business||0),0);
    const ytd=tx.filter(t=>t.date?.startsWith(selectedYear)).reduce((s,t)=>s+Number(t.business||0),0);
    const requestYtd=rq.filter(t=>t.date?.startsWith(selectedYear)).reduce((s,t)=>s+Number(t.business||0),0);
    const totalBusiness=tx.reduce((s,t)=>s+Number(t.business||0),0)+rq.reduce((s,t)=>s+Number(t.business||0),0);
    const totalPaid=tx.reduce((s,t)=>s+Number(t.paid||0),0)+rq.reduce((s,t)=>s+Number(t.paid||0),0);
    const pending=Math.max(totalBusiness-totalPaid,0);
    return { mtd:mtd+requestMtd,ytd:ytd+requestYtd,totalBusiness,totalPaid,pending };
  };
  const hasPendingRequest=p=>(p.requests||[]).some(r=>r.approval==="Pending"||r.status==="Pending Management Approval");
  const pendingRequestCount=p=>(p.requests||[]).filter(r=>r.approval==="Pending"||r.status==="Pending Management Approval").length;
  const visibleOrderRequests=p=>(p.requests||[]).filter(r=>r.approval==="Pending"||r.status==="Pending Management Approval");
  const requestBusinessRows=p=>(p.requests||[]).filter(r=>r.approval==="Approved"&&Number(r.quotationAmount||0)>0).map(r=>{
    const business=Number(r.quotationAmount||0);
    const paid=Number(r.paid||0);
    const status=r.orderId?"Production Started":paid>=business?"Paid":paid>0?"Part Paid":"No Paid";
    return {...r,date:r.date,project:r.project,business,paid,status,isRequestBusiness:true};
  });
  const totals=partners.reduce((acc,p)=>{ const s=summarize(p); acc.mtd+=s.mtd; acc.ytd+=s.ytd; acc.collected+=s.totalPaid; acc.pending+=s.pending; return acc; },{mtd:0,ytd:0,collected:0,pending:0});
  const pendingPartners=partners.filter(hasPendingRequest);
  const cpRequestSummary=req=>{
    const windows=(req.windows||req.measurement?.windows||[]).map((raw,i)=>enrichMeasurementLine({...raw,label:raw.label||`Window ${i+1}`}));
    return {
      windows,
      qty:windows.reduce((sum,w)=>sum+Number(w.qty||1),0),
      actualSqft:round2(windows.reduce((sum,w)=>sum+Number(w.sqft||0),0)),
      billingSqft:round2(windows.reduce((sum,w)=>sum+Number(w.chargeableSqft||w.sqft||0),0))
    };
  };
  const partnerMatches=p=>{
    const q=partnerSearch.trim().toLowerCase();
    if(!q)return true;
    const txText=(p.transactions||[]).map(t=>`${t.project} ${t.status} ${t.date}`).join(" ");
    const reqText=(p.requests||[]).map(r=>`${r.project} ${r.customer} ${r.mobile} ${r.product} ${r.status}`).join(" ");
    return `${p.name} ${p.owner} ${p.mobile} ${p.city} ${p.category} ${p.loginId||""} ${txText} ${reqText}`.toLowerCase().includes(q);
  };
  const filteredPartners=partners.filter(partnerMatches);

  const openAddPartner=()=>{ setPartnerForm(blankPartner); setSelected(null); setShowPartner(true); };
  const openEditPartner=p=>{ setPartnerForm({name:p.name,owner:p.owner,mobile:p.mobile,city:p.city,category:p.category,loginId:p.loginId||"",password:p.password||""}); setSelected(p); setShowPartner(true); };
  const savePartner=async ()=>{
    if(savingPartner)return;
    if(!partnerForm.name||!partnerForm.owner)return alert("Partner name and owner are required");
    const mobileError=validateMobile(partnerForm.mobile);
    if(mobileError)return alert(mobileError);
    if(!partnerForm.loginId||!partnerForm.password)return alert("Partner login ID and password are required");
    if(partners.some(p=>p.id!==selected?.id&&p.loginId?.toLowerCase()===partnerForm.loginId.trim().toLowerCase()))return alert("This partner login ID is already used");
    const duplicate=customerDuplicate({leads,orders,partners,mobile:partnerForm.mobile,excludePartnerId:selected?.id||""});
    if(duplicate){ duplicateAudit("Channel Partner",duplicateMsg(duplicate),{mobile:partnerForm.mobile}); return alert(duplicateMsg(duplicate)); }
    const key=`partner:${normalizeMobile(partnerForm.mobile)}:${partnerForm.loginId.trim().toLowerCase()}`;
    if(!selected&&onceKeyActive(key))return alert("Processing... duplicate channel partner blocked");
    setSavingPartner(true);
    const id=selected?.id||`CP${Date.now()}`;
    try {
      await createBackendAccessUser({name:partnerForm.name.trim(),loginId:partnerForm.loginId.trim(),password:partnerForm.password.trim(),role:"channel_partner",linkedEntityId:id});
    } catch (error) {
      setSavingPartner(false);
      return alert(error.message||"Could not create channel partner login");
    }
    const {password, ...safePayload}={...partnerForm,mobile:normalizeMobile(partnerForm.mobile),loginId:partnerForm.loginId.trim()};
    if(selected)setPartners(ps=>ps.map(p=>p.id===selected.id?{...p,...safePayload}:p));
    else {
      setPartners(ps=>[...ps,{...safePayload,id,transactions:[],requests:[],createdAt:new Date().toISOString(),createdBy:"Management"}]);
      auditLog({event:"Created",source:"Channel Partner",recordType:"Channel Partner",recordId:id,mobile:safePayload.mobile});
    }
    setSelected(null); setShowPartner(false); setPartnerForm(blankPartner);
    setSavingPartner(false);
  };
  const changePartnerPassword=async (partner)=>{
    const next=prompt(`Enter new password for ${partner.name}`, "");
    if(!next)return;
    try {
      await createBackendAccessUser({name:partner.name,loginId:partner.loginId,password:next,role:"channel_partner",linkedEntityId:partner.id});
    } catch (error) {
      return alert(error.message||"Could not update channel partner password");
    }
    const forcedLogoutAt=Date.now();
    setPartners(ps=>ps.map(p=>p.id===partner.id?{...p,password:"",forcedLogoutAt}:p));
    if(selected?.id===partner.id)setSelected(p=>({...p,password:"",forcedLogoutAt}));
    alert("Password changed. Any logged-in session for this channel partner will be logged out and old password will not work.");
  };
  const openAcceptRequest=(partner,req)=>{
    setApproval({partner,req});
    setApprovalForm({salesman:salesmen[0]?.id||1,measurementDate:todayStr(),productionDate:"",installationDate:""});
  };
  const acceptRequest=()=>{
    if(savingApproval)return;
    if(!approval)return;
    const {partner,req}=approval;
    const mobileError=validateMobile(req.mobile);
    if(mobileError)return alert(mobileError);
    const existing=customerDuplicate({leads,orders,partners,mobile:req.mobile,excludePartnerId:partner.id,excludeRequestId:req.id});
    if(existing&&existing.ref!==req.id){ duplicateAudit("Channel Partner Request Accept",duplicateMsg(existing),{requestId:req.id,mobile:req.mobile}); return alert(duplicateMsg(existing)); }
    if(onceKeyActive(`accept-request:${req.id}`))return alert("Processing... duplicate approval blocked");
    setSavingApproval(true);
    const leadId=req.leadId||`LCP${Date.now().toString().slice(-6)}`;
    const windows=req.windows||[];
    const measurement={type:req.product?.toLowerCase().includes("mesh")?"Mesh":"Blind",windows,budget:null,notes:req.notes};
    const schedule={measurementDate:approvalForm.measurementDate,productionDate:approvalForm.productionDate,installationDate:approvalForm.installationDate,salesman:Number(approvalForm.salesman)};
    setPartners(ps=>ps.map(p=>{
      if(p.id!==partner.id)return p;
      return {...p,requests:(p.requests||[]).map(r=>r.id===req.id?{...r,leadId,approval:"Approved",status:"Accepted - Assign Salesman",leadStatus:"New",measurement,...schedule}:r)};
    }));
    if(!req.leadId){ const stamp=new Date().toISOString(); setLeads?.(ls=>ls.some(l=>l.partnerRequestId===req.id||normalizeMobile(l.mobile)===normalizeMobile(req.mobile))?ls:[...ls,{id:leadId,name:req.customer,mobile:normalizeMobile(req.mobile),alt:"",email:"",source:"CP",product:req.product,location:req.project,budget:null,salesman:Number(approvalForm.salesman),status:"New",priority:"Warm",created:todayStr(),updated:todayStr(),createdAt:stamp,updatedAt:stamp,assignedAt:stamp,createdBy:"Management",notes:`Channel Partner: ${partner.name}. ${req.notes||""}`,channelPartnerId:partner.id,channelPartnerName:partner.name,partnerRequestId:req.id,measurement,...schedule}]); }
    auditLog({event:"Approved",source:"Channel Partner",recordType:"Order Request",recordId:req.id,mobile:normalizeMobile(req.mobile)});
    setApproval(null);
    setSavingApproval(false);
  };
  const rejectRequest=(partner,req)=>{
    if(!confirm("Reject this channel partner request?"))return;
    setPartners(ps=>ps.map(p=>p.id===partner.id?{...p,requests:(p.requests||[]).map(r=>r.id===req.id?{...r,approval:"Rejected",status:"Rejected"}:r)}:p));
  };
  const editRequestPayment=(partner,req)=>{
    if(!req.quotationAmount)return alert("Quotation is not generated yet");
    const paid=Number(prompt("Edit paid amount", req.paid||0)||0);
    if(paid<0)return;
    const capped=Math.min(paid,Number(req.quotationAmount||0));
    const balance=Math.max(Number(req.quotationAmount||0)-capped,0);
    const nextStatus=req.orderId?(capped>0?"Order Confirmed":"Quotation Sent"):(capped>0?"Payment Updated":"Quotation Sent");
    setPartners(ps=>ps.map(p=>{
      if(p.id!==partner.id)return p;
      const updated={...p,requests:(p.requests||[]).map(r=>r.id===req.id?{...r,paid:capped,balance,status:nextStatus}:r)};
      if(selected?.id===p.id)setSelected(updated);
      return updated;
    }));
    if(req.leadId)setLeads?.(ls=>ls.map(l=>l.id===req.leadId?{...l,paymentMarked:capped>0,paymentPaid:capped,paymentBalance:balance,paymentStatus:capped>=Number(req.quotationAmount||0)?"Fully Paid":capped>0?"Partially Paid":"No Paid",updated:todayStr()}:l));
    if(req.orderId)setOrders?.(os=>os.map(o=>o.id===req.orderId?{...o,advance:capped,balance}:o));
  };
  const confirmPaidRequest=(partner,req)=>{
    alert("Please create the production order from Lead Management > Order after checking the measurement.");
  };
  const openAddBusiness=partnerId=>{ setEditingBusiness(null); setBusinessForm({...blankBusiness,partnerId:partnerId||partners[0]?.id||"",date:selectedMonth?`${selectedMonth}-01`:todayStr()}); setShowBusiness(true); };
  const openEditBusiness=(partner,entry)=>{
    setEditingBusiness(entry);
    setBusinessForm({partnerId:partner.id,date:entry.date,project:entry.project,business:String(entry.business||""),paid:String(entry.paid||""),status:entry.status||"Part Paid"});
    setShowBusiness(true);
  };
  const saveBusiness=()=>{
    if(!businessForm.partnerId||!businessForm.project||!businessForm.business)return alert("Partner, project and business amount are required");
    const entry={...businessForm,id:editingBusiness?.id||`CPB${Date.now()}`,business:Number(businessForm.business||0),paid:Number(businessForm.paid||0)};
    setPartners(ps=>ps.map(p=>{
      if(p.id!==businessForm.partnerId)return p;
      const transactions=editingBusiness
        ? (p.transactions||[]).map(t=>t.id===editingBusiness.id?entry:t)
        : [...(p.transactions||[]),entry];
      const updated={...p,transactions};
      if(selected?.id===p.id)setSelected(updated);
      return updated;
    }));
    setEditingBusiness(null); setShowBusiness(false); setBusinessForm(blankBusiness);
  };

  return (
    <div>
      <SectionTitle action={!isManager&&<div style={{display:"flex",gap:10}}><GhostBtn onClick={()=>openAddBusiness()}>+ Add Business</GhostBtn><PrimaryBtn onClick={openAddPartner}>+ Channel Partner</PrimaryBtn></div>}>Channel Partners</SectionTitle>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:18}}>
        <StatKPI label="MTD Business" value={inr(totals.mtd)} sub={`month: ${selectedMonth}`} accent={T.blue} />
        <StatKPI label="YTD Business" value={inr(totals.ytd)} sub={`year: ${selectedYear}`} accent={T.green} />
        <StatKPI label="Collected Amount" value={inr(totals.collected)} sub="received from partners" accent={T.teal} />
        <StatKPI label="Pending Balance" value={inr(totals.pending)} sub="partner receivables" accent={T.red} />
      </div>

      <GlassCard style={{marginBottom:18}}>
        <div style={{display:"grid",gridTemplateColumns:"180px 160px minmax(260px,1fr)",gap:14,alignItems:"end"}}>
          <Field label="MTD Month"><input type="month" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)} /></Field>
          <Field label="YTD Year"><input value={selectedYear} onChange={e=>setSelectedYear(e.target.value.replace(/\D/g,"").slice(0,4))} placeholder="2024" /></Field>
          <Field label="Search Channel Partner"><input value={partnerSearch} onChange={e=>setPartnerSearch(e.target.value)} placeholder="Search name, owner, mobile, city, login ID..." /></Field>
        </div>
      </GlassCard>
      {pendingPartners.length>0&&<div style={{marginBottom:18,padding:"12px 16px",borderRadius:8,background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.22)",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
        <div style={{fontSize:13,fontWeight:800,color:T.red}}>{pendingPartners.length} channel partner{pendingPartners.length>1?"s":""} requested order approval</div>
        <div style={{fontSize:12,color:T.sub}}>{pendingPartners.map(p=>`${p.name} (${pendingRequestCount(p)})`).join(", ")}</div>
      </div>}

      <GlassCard style={{padding:0}}>
        <Table headers={["Partner","Owner","Category","MTD","YTD","Collected","Pending","Action"]}>
          {filteredPartners.map(p=>{
            const s=summarize(p);
            const pendingRequests=pendingRequestCount(p);
            return (
              <TR key={p.id} tone={pendingRequests?"red":"green"}>
                <TD><div style={{fontWeight:700,color:T.text,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>{p.name}{pendingRequests>0&&<Pill label={`${pendingRequests} New Request${pendingRequests>1?"s":""}`} color={T.red} />}</div><div style={{fontSize:11,color:T.muted}}>{p.id} - {p.city}</div></TD>
                <TD>{p.owner}<div style={{fontSize:11,color:T.muted}}>{p.mobile}</div></TD>
                <TD><Pill label={p.category} color={T.blue} /></TD>
                <TD color={T.blue} bold>{inr(s.mtd)}</TD>
                <TD color={T.green} bold>{inr(s.ytd)}</TD>
                <TD color={T.teal} bold>{inr(s.totalPaid)}</TD>
                <TD color={T.red} bold>{inr(s.pending)}</TD>
                <TD nowrap>
                  <div style={{display:"flex",gap:8}}>
                    <GhostBtn small onClick={()=>setSelected(p)}>View</GhostBtn>
                    {!isManager&&<EditActionBtn onClick={()=>openEditPartner(p)}>Edit</EditActionBtn>}
                  </div>
                </TD>
              </TR>
            );
          })}
        </Table>
        {filteredPartners.length===0&&<div style={{padding:34,textAlign:"center",fontSize:13,color:T.muted}}>No channel partner found for this search.</div>}
      </GlassCard>

      {selected&&!showPartner&&<Modal title={`${selected.name} - Business Details`} onClose={()=>setSelected(null)} wide>
        <div style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:12,color:T.muted}}>Login ID: <b style={{color:T.text}}>{selected.loginId}</b> | Password: <b style={{color:T.text}}>hidden for security</b></div>
          {!isManager&&<PrimaryBtn small color={T.blue} onClick={()=>changePartnerPassword(selected)}>Change Password</PrimaryBtn>}
        </div>
        <Table headers={["Date","Project","Business","Paid","Pending","Action"]}>
          {[...(selected.transactions||[]),...requestBusinessRows(selected)].map(t=><TR key={t.id}><TD>{t.date}</TD><TD bold>{t.project}{t.isRequestBusiness&&<div style={{fontSize:11,color:T.muted}}>{t.customer} | {t.mobile} | {t.product} | {(t.windows||[]).length} window(s)</div>}</TD><TD>{inr(t.business)}</TD><TD color={Number(t.paid||0)>0?T.green:T.red}>{inr(t.paid)}</TD><TD color={Number(t.business)-Number(t.paid)>0?T.red:T.green} bold>{inr(Math.max(Number(t.business)-Number(t.paid),0))}</TD><TD><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{t.isRequestBusiness?<EditActionBtn onClick={()=>editRequestPayment(selected,t)}>Edit</EditActionBtn>:!isManager&&<EditActionBtn onClick={()=>openEditBusiness(selected,t)}>Edit</EditActionBtn>}</div></TD></TR>)}
        </Table>
        <div style={{fontSize:13,fontWeight:800,color:T.text,margin:"18px 0 10px"}}>Order Requests</div>
        <Table headers={["Date","Project","Business","Paid","Pending","Status","Request","Action"]}>
          {visibleOrderRequests(selected).map(r=><TR key={r.id}><TD>{r.date}</TD><TD bold>{r.project}<div style={{fontSize:11,color:T.muted}}>{r.customer} | {r.mobile} | {r.product} | {(r.windows||[]).length} window(s)</div></TD><TD bold color={T.orange}>Waiting for approval</TD><TD color={T.red} bold>{inr(0)}</TD><TD color={T.orange} bold>Pending quote</TD><TD><Pill label={r.status} color={T.orange} /></TD><TD><GhostBtn small onClick={()=>openCpRequestPdf(selected,r)}>PDF</GhostBtn></TD><TD><div style={{display:"flex",gap:8,flexWrap:"wrap"}}><PrimaryBtn small onClick={()=>openAcceptRequest(selected,r)}>Accept</PrimaryBtn><DangerBtn small onClick={()=>rejectRequest(selected,r)}>Reject</DangerBtn></div></TD></TR>)}
        </Table>
        {visibleOrderRequests(selected).length===0&&<div style={{padding:32,textAlign:"center",fontSize:13,color:T.muted}}>No pending order request for approval.</div>}
      </Modal>}

      {approval&&(()=>{ const summary=cpRequestSummary(approval.req); return <Modal title="Review Channel Partner Order Request" onClose={()=>setApproval(null)} wide>
        <div style={{background:T.cardHi,border:`1px solid ${T.border}`,borderRadius:8,padding:12,marginBottom:14,fontSize:13,color:T.sub}}>
          <div style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"flex-start",flexWrap:"wrap"}}>
            <div>
              <b style={{color:T.text,fontSize:15}}>{approval.req.customer}</b>
              <div style={{marginTop:4}}>{approval.req.mobile} | {approval.req.project} | {approval.req.product}</div>
              <div style={{marginTop:4}}>Channel Partner: <b style={{color:T.text}}>{approval.partner.name}</b> | Request: <b style={{color:T.text}}>{approval.req.id}</b></div>
            </div>
            <GhostBtn small onClick={()=>openCpRequestPdf(approval.partner,approval.req)}>Print / Save PDF</GhostBtn>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
          <StatKPI label="Windows" value={summary.windows.length} accent={T.blue} />
          <StatKPI label="Total Qty" value={summary.qty} accent={T.teal} />
          <StatKPI label="Actual SQFT" value={summary.actualSqft} accent={T.orange} />
          <StatKPI label="Billing SQFT" value={summary.billingSqft} accent={T.green} />
        </div>
        <GlassCard style={{padding:0,marginBottom:14}}>
          <Table headers={["Window","Height","Width","Qty","Actual SQFT","Billing SQFT","Material / Color / Code"]}>
            {summary.windows.map((w,i)=><TR key={i}><TD bold>{w.label||`Window ${i+1}`}</TD><TD>{w.height||"-"} {w.heightUnit||"Feet"}</TD><TD>{w.width||"-"} {w.widthUnit||"Feet"}</TD><TD>{w.qty||1}</TD><TD>{w.sqft||0}</TD><TD bold color={T.green}>{w.chargeableSqft||w.sqft||0}</TD><TD>{w.material||"-"} / {w.color||"-"} / {w.code||"-"}</TD></TR>)}
          </Table>
        </GlassCard>
        <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:12,marginBottom:14,fontSize:13,color:"#92400e"}}>
          Check the above CP-filled order form first. After this, assign salesman and dates.
        </div>
        <Field label="Assign Salesman"><select value={approvalForm.salesman} onChange={e=>setApprovalForm(f=>({...f,salesman:Number(e.target.value)}))}>{salesmen.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></Field>
        <FormRow cols={3}>
          <Field label="Measurement Date"><input type="date" value={approvalForm.measurementDate} onChange={e=>setApprovalForm(f=>({...f,measurementDate:e.target.value}))} /></Field>
          <Field label="Production Date"><input type="date" value={approvalForm.productionDate} onChange={e=>setApprovalForm(f=>({...f,productionDate:e.target.value}))} /></Field>
          <Field label="Installation Date"><input type="date" value={approvalForm.installationDate} onChange={e=>setApprovalForm(f=>({...f,installationDate:e.target.value}))} /></Field>
        </FormRow>
        <div style={{display:"flex",gap:10,marginTop:18}}><GhostBtn onClick={()=>openCpRequestPdf(approval.partner,approval.req)}>View Request PDF</GhostBtn><PrimaryBtn onClick={acceptRequest} disabled={savingApproval}>{savingApproval?"Processing...":"Accept & Send To Lead Management"}</PrimaryBtn><GhostBtn onClick={()=>setApproval(null)}>Cancel</GhostBtn></div>
      </Modal>; })()}

      {showPartner&&<Modal title={selected?"Edit Channel Partner":"Add Channel Partner"} onClose={()=>{setShowPartner(false);setSelected(null);}}>
        <Field label="Partner Name"><input value={partnerForm.name} onChange={e=>setPartnerForm(f=>({...f,name:e.target.value}))} /></Field>
        <FormRow cols={2}><Field label="Owner"><input value={partnerForm.owner} onChange={e=>setPartnerForm(f=>({...f,owner:e.target.value}))} /></Field><Field label="Mobile"><input value={partnerForm.mobile} onChange={e=>setPartnerForm(f=>({...f,mobile:e.target.value}))} /></Field></FormRow>
        <FormRow cols={2}><Field label="City / Area"><input value={partnerForm.city} onChange={e=>setPartnerForm(f=>({...f,city:e.target.value}))} /></Field><Field label="Category"><select value={partnerForm.category} onChange={e=>setPartnerForm(f=>({...f,category:e.target.value}))}>{["Dealer","Architect","Interior Designer","Builder","Contractor"].map(c=><option key={c}>{c}</option>)}</select></Field></FormRow>
        <FormRow cols={2}><Field label="Login ID"><input value={partnerForm.loginId} onChange={e=>setPartnerForm(f=>({...f,loginId:e.target.value}))} /></Field><Field label="Password"><input type="text" value={partnerForm.password} onChange={e=>setPartnerForm(f=>({...f,password:e.target.value}))} /></Field></FormRow>
        <div style={{display:"flex",gap:10,marginTop:18}}><PrimaryBtn onClick={savePartner} disabled={savingPartner}>{savingPartner?"Processing...":"Save Partner"}</PrimaryBtn><GhostBtn onClick={()=>{setShowPartner(false);setSelected(null);}}>Cancel</GhostBtn></div>
      </Modal>}

      {showBusiness&&<Modal title={editingBusiness?"Edit Channel Partner Business":"Add Channel Partner Business"} onClose={()=>{setShowBusiness(false);setEditingBusiness(null);}}>
        <Field label="Channel Partner"><select value={businessForm.partnerId} onChange={e=>setBusinessForm(f=>({...f,partnerId:e.target.value}))}><option value="">Select partner</option>{filteredPartners.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></Field>
        <FormRow cols={2}><Field label="Date"><input type="date" value={businessForm.date} onChange={e=>setBusinessForm(f=>({...f,date:e.target.value}))} /></Field><Field label="Status"><select value={businessForm.status} onChange={e=>setBusinessForm(f=>({...f,status:e.target.value}))}>{["Part Paid","Paid","Pending"].map(s=><option key={s}>{s}</option>)}</select></Field></FormRow>
        <Field label="Project / Order"><input value={businessForm.project} onChange={e=>setBusinessForm(f=>({...f,project:e.target.value}))} /></Field>
        <FormRow cols={2}><Field label="Business Amount"><input type="number" value={businessForm.business} onChange={e=>setBusinessForm(f=>({...f,business:e.target.value}))} /></Field><Field label="Paid Amount"><input type="number" value={businessForm.paid} onChange={e=>setBusinessForm(f=>({...f,paid:e.target.value}))} /></Field></FormRow>
        <div style={{display:"flex",gap:10,marginTop:18}}><PrimaryBtn onClick={saveBusiness}>{editingBusiness?"Update Business":"Save Business"}</PrimaryBtn><GhostBtn onClick={()=>{setShowBusiness(false);setEditingBusiness(null);}}>Cancel</GhostBtn></div>
      </Modal>}
    </div>
  );
}

function Payments({ payments, setPayments, orders, expenses, setExpenses, isManager }) {
  const [tab,setTab]=useState("payments");
  const [showAdd,setShowAdd]=useState(false);
  const [showExp,setShowExp]=useState(false);
  const [savingPayment,setSavingPayment]=useState(false);
  const blankP={orderId:"",date:todayStr(),amount:"",mode:"UPI",notes:""};
  const blankE={date:todayStr(),cat:"Raw Material",desc:"",amount:""};
  const [form,setForm]=useState(blankP);
  const [eForm,setEForm]=useState(blankE);

  const rev=payments.reduce((s,p)=>s+p.amount,0);
  const exp=expenses.reduce((s,e)=>s+e.amount,0);
  const profit=rev-exp;
  const pending=orders.reduce((s,o)=>{ const paid=payments.filter(p=>p.orderId===o.id).reduce((ss,p)=>ss+p.amount,0); return s+(o.final-paid); },0);

  const saveP=()=>{
    if(savingPayment)return;
    if(!form.orderId||!form.amount)return alert("Order and amount required");
    if(onceKeyActive(`payment:${form.orderId}:${form.amount}:${form.date}`))return alert("Processing... duplicate payment blocked");
    setSavingPayment(true);
    const id=`PAY${Date.now()}`;
    setPayments(ps=>ps.some(p=>p.orderId===form.orderId&&p.date===form.date&&Number(p.amount)===Number(form.amount))?ps:[...ps,{...form,id,amount:Number(form.amount),createdAt:new Date().toISOString()}]);
    auditLog({event:"Created",source:"Payments",recordType:"Payment",recordId:id,orderId:form.orderId});
    setForm(blankP); setShowAdd(false);
    setSavingPayment(false);
  };
  const saveE=()=>{ if(!form.desc&&!eForm.desc||!eForm.amount)return alert("Description and amount required"); setExpenses(es=>[...es,{...eForm,id:`EXP${Date.now()}`,amount:Number(eForm.amount)}]); setEForm(blankE); setShowExp(false); };

  const catColors={"Raw Material":T.orange,Labor:T.purple,Logistics:T.teal,Utilities:T.blue,Marketing:T.amber,Other:T.sub};

  return (
    <div>
      <SectionTitle>Payments & Accounts</SectionTitle>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}}>
        <StatKPI label="Revenue Collected" value={inr(rev)} accent={T.green} icon="" />
        <StatKPI label="Total Expenses" value={inr(exp)} accent={T.red} icon="" />
        <StatKPI label="Net Profit" value={inr(profit)} accent={profit>=0?T.green:T.red} icon="" />
        <StatKPI label="Pending Balance" value={inr(pending)} sub="from active orders" accent={T.orange} icon="" />
      </div>

      <div style={{display:"flex",gap:4,marginBottom:20,background:T.surf,borderRadius:12,padding:4,width:"fit-content"}}>
        {[["payments","Payments"],["expenses","Expenses"],["outstanding","Outstanding"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} style={{padding:"7px 18px",borderRadius:9,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600,background:tab===v?T.amber:"transparent",color:tab===v?"#0f172a":T.sub}}>{l}</button>
        ))}
      </div>

      {tab==="payments"&&<>
        {!isManager&&<div style={{marginBottom:14}}><PrimaryBtn onClick={()=>setShowAdd(true)}>+ Record Payment</PrimaryBtn></div>}
        <GlassCard style={{padding:0}}>
          <Table headers={["Payment ID","Order","Date","Amount","Mode","Notes"]}>
            {payments.map(p=>(
              <TR key={p.id}><TD mono color={T.muted}>{p.id}</TD><TD bold color={T.amber}>{p.orderId}</TD><TD color={T.sub}>{p.date}</TD><TD bold color={T.green}>{inr(p.amount)}</TD><TD><Pill label={p.mode} color={T.blue} /></TD><TD color={T.muted}>{p.notes}</TD></TR>
            ))}
          </Table>
        </GlassCard>
      </>}

      {tab==="expenses"&&<>
        {!isManager&&<div style={{marginBottom:14}}><PrimaryBtn onClick={()=>setShowExp(true)} color={T.red}>+ Add Expense</PrimaryBtn></div>}
        <GlassCard style={{padding:0}}>
          <Table headers={["Date","Category","Description","Amount"]}>
            {expenses.map(e=>(
              <TR key={e.id}><TD color={T.sub}>{e.date}</TD><TD><Pill label={e.cat} color={catColors[e.cat]||T.sub} /></TD><TD color={T.text}>{e.desc}</TD><TD bold color={T.red}>{inr(e.amount)}</TD></TR>
            ))}

        </GlassCard>
        <div style={{marginTop:16,display:"flex",justifyContent:"flex-end",gap:24,fontSize:13,color:T.sub}}>
          {Object.entries(expenses.reduce((acc,e)=>({...acc,[e.cat]:(acc[e.cat]||0)+e.amount}),{})).map(([k,v])=>(
            <span key={k}>{k}: <b style={{color:catColors[k]||T.sub}}>{inr(v)}</b></span>
          ))}
        </div>
      </>}

      {tab==="outstanding"&&<>
        <GlassCard style={{padding:0}}>
          <Table headers={["Order","Customer","Total Value","Collected","Balance Due","Status"]}>
            {orders.filter(o=>{ const paid=payments.filter(p=>p.orderId===o.id).reduce((s,p)=>s+p.amount,0); return paid<o.final; }).map(o=>{
              const paid=payments.filter(p=>p.orderId===o.id).reduce((s,p)=>s+p.amount,0);
              const bal=o.final-paid;
              const pct=Math.round(paid/o.final*100);
              return (
                <TR key={o.id}>
                  <TD bold color={T.amber}>{o.id}</TD>
                  <TD bold color={T.text}>{o.customer}</TD>
                  <TD>{inr(o.final)}</TD>
                  <TD>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <div style={{width:40,height:4,background:"rgba(255,255,255,.1)",borderRadius:2,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:T.green}} /></div>
                      <span style={{color:T.green,fontSize:12}}>{inr(paid)}</span>
                    </div>
                  </TD>
                  <TD bold color={T.red}>{inr(bal)}</TD>
                  <TD><StatusPill s={o.status} /></TD>
                </TR>
              );
            })}

        </GlassCard>
      </>}

      {showAdd&&<Modal title="Record Payment" onClose={()=>setShowAdd(false)}>
        <Field label="Order"><select value={form.orderId} onChange={e=>setForm(f=>({...f,orderId:e.target.value}))}><option value="">Select Order...</option>{orders.map(o=><option key={o.id} value={o.id}>{o.id}  {o.customer}</option>)}</select></Field>
        <FormRow cols={2} ><Field label="Date"><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} /></Field><Field label="Amount (Rs.)"><input type="number" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} /></Field></FormRow>
        <FormRow cols={2}><Field label="Mode"><select value={form.mode} onChange={e=>setForm(f=>({...f,mode:e.target.value}))}>{["UPI","Cash","Bank Transfer","Cheque","Card"].map(m=><option key={m}>{m}</option>)}</select></Field><Field label="Notes"><input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} /></Field></FormRow>
        <div style={{display:"flex",gap:10,marginTop:20}}><PrimaryBtn onClick={saveP} color={T.green} disabled={savingPayment}>{savingPayment?"Processing...":"Save Payment"}</PrimaryBtn><GhostBtn onClick={()=>setShowAdd(false)}>Cancel</GhostBtn></div>
      </Modal>}

      {showExp&&<Modal title="Add Expense" onClose={()=>setShowExp(false)}>
        <FormRow cols={2}><Field label="Date"><input type="date" value={eForm.date} onChange={e=>setEForm(f=>({...f,date:e.target.value}))} /></Field><Field label="Category"><select value={eForm.cat} onChange={e=>setEForm(f=>({...f,cat:e.target.value}))}>{EXPENSE_CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></Field></FormRow>
        <Field label="Description"><input value={eForm.desc} onChange={e=>setEForm(f=>({...f,desc:e.target.value}))} /></Field>
        <div style={{marginTop:12}}><Field label="Amount (Rs.)"><input type="number" value={eForm.amount} onChange={e=>setEForm(f=>({...f,amount:e.target.value}))} /></Field></div>
        <div style={{display:"flex",gap:10,marginTop:20}}><DangerBtn onClick={saveE}>Save Expense</DangerBtn><GhostBtn onClick={()=>setShowExp(false)}>Cancel</GhostBtn></div>
      </Modal>}
    </div>
  );
}

          <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:16}}>Expense Breakdown</div>

            const pct=exp>0?Math.round(v/exp*100):0;
            const c={Raw:T.orange,Labor:T.purple,Logistics:T.teal,Utilities:T.blue,Marketing:T.amber}[k.split(" ")[0]]||T.sub;

  followups.filter(f=>f.date<todayStr()&&f.outcome!=="Completed").forEach(f=>{ const l=leads.find(ll=>ll.id===f.leadId); items.push({type:"warning",icon:"",title:"Overdue Follow-up",msg:`${l?.name||"Unknown"}  was due ${f.date}`,time:f.date}); });
