const csvCell = value => `"${String(value ?? "").replace(/"/g,'""')}"`;
const downloadCsv = (filename, rows) => {
  if(!rows?.length)return alert("No data available for selected date range");
  const headers=Object.keys(rows[0]);
  const csv=[headers.join(","),...rows.map(row=>headers.map(key=>csvCell(row[key])).join(","))].join("\n");
  const blob=new Blob([`\uFEFF${csv}`],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};
const inDateRange = (date, from, to) => {

  const idNum=Number(String(lead.id||"").replace(/\D/g,""));

};

const validateMobile = mobile => {

  if(!raw)return "Mobile number is mandatory";
  if(!/^\d+$/.test(raw))return "Mobile number must contain only numbers";
  if(raw.length!==10)return "Mobile number must be exactly 10 digits";

const validateEmail = email => {

const customerDuplicate = ({ leads=[], orders=[], partners=[], mobile="", email="", orderRef="", excludeLeadId="", excludeOrderId="", excludePartnerId="", excludeRequestId="" }) => {
  const m=normalizeMobile(mobile);
  const e=String(email||"").trim().toLowerCase();
  if(m){
    const lead=leads.find(l=>l.id!==excludeLeadId&&normalizeMobile(l.mobile)===m);
    if(lead)return {type:"Lead", ref:lead.id, name:lead.name};
    const order=orders.find(o=>o.id!==excludeOrderId&&normalizeMobile(o.mobile)===m);
    if(order)return {type:"Order", ref:order.id, name:order.customer};
    const partner=partners.find(p=>p.id!==excludePartnerId&&normalizeMobile(p.mobile)===m);
    if(partner)return {type:"Channel Partner", ref:partner.id, name:partner.name};
    const request=partners.flatMap(p=>(p.requests||[]).map(r=>({...r,partnerName:p.name}))).find(r=>r.id!==excludeRequestId&&normalizeMobile(r.mobile)===m&&["Pending","Pending Management Approval"].includes(r.approval||r.status));
    if(request)return {type:"Order Request", ref:request.id, name:request.customer};
  }
  if(e){
    const lead=leads.find(l=>l.id!==excludeLeadId&&String(l.email||"").trim().toLowerCase()===e);
    if(lead)return {type:"Lead", ref:lead.id, name:lead.name};
  }
  if(orderRef){
    const order=orders.find(o=>o.id!==excludeOrderId&&o.id===orderRef);
    if(order)return {type:"Order", ref:order.id, name:order.customer};
  }
  return null;
};

    const key=order.leadId ? `lead:${order.leadId}` : `mobile:${normalizeMobile(order.mobile)}:${order.customer||""}`;

    seen.add(key);

};

const onceKeyActive = key => {

    const now=Date.now();
    const keys=JSON.parse(localStorage.getItem(storeKey)||"{}");
    Object.keys(keys).forEach(k=>{ if(now-keys[k]>15000)delete keys[k]; });

const leadFollowupReason = lead => {
  if(lead.status==="Rejected")return "";
  if(lead.paymentOrderId&&Number(lead.paymentBalance||0)<=0)return "";
  if(lead.status==="Converted"&&Number(lead.paymentBalance||0)<=0&&Number(lead.paymentPaid||0)>0)return "";
  if(lead.followupReason)return lead.followupReason;
  const quote=lead.quotation;
  const quoteAmount=Number(quote?.amount||0);
  const paid=Number(lead.paymentPaid||0);
  const balance=lead.paymentBalance!==undefined?Number(lead.paymentBalance||0):quoteAmount-paid;
  const pending=Math.max(balance,0);
  if(quote&&!lead.paymentMarked&&!lead.paymentOrderId)return "Quotation Approval Pending";
  if(quote&&pending>0)return paid>0?"Payment Pending":"Advance Payment Pending";
  if(lead.measurement&&!quote)return "Measurement Done but Order Not Closed";
  if((lead.svDone||lead.status==="Site Visit Scheduled")&&!lead.measurement)return "Measurement Pending";
  if(lead.contactDone||lead.status==="Contacted")return "Customer Follow-up Pending";
  return "";
};
const unifiedFollowups = (leads=[], followups=[], salesmen=SALESMEN) => {
  const getLead=id=>leads.find(l=>l.id===id);
  const lastFollowFor=leadId=>[...followups].filter(f=>f.leadId===leadId).sort((a,b)=>(b.date||"").localeCompare(a.date||""))[0];
  const autoList=leads.map(lead=>{
    const reason=leadFollowupReason(lead);
    if(!reason)return null;
    const last=lastFollowFor(lead.id);
    const quoteAmount=Number(lead.quotation?.amount||0);
    const paid=Number(lead.paymentPaid||0);
    const recognized=!!lead.paymentOrderId;
    return {
      id:`AUTO-${lead.id}`, auto:true, leadId:lead.id, smId:lead.salesman,
      customer:lead.name, mobile:lead.mobile, project:lead.location||lead.product,
      source:lead.channelPartnerName?`Channel Partner - ${lead.channelPartnerName}`:(lead.source||"Salesman"),
      salesman:smName(lead.salesman,salesmen), reason, quoteAmount,
      pending:recognized?Math.max(quoteAmount-paid,0):0,
      lastDate:last?.date||lead.updated||lead.created||"",
      nextDate:last?.next||todayStr(), status:lead.status, notes:lead.notes||lead.measurement?.notes||"",
    };
  }).filter(Boolean);
  const manualList=followups.filter(f=>f.outcome!=="Completed").map(f=>{
    const lead=getLead(f.leadId);
    if(!lead)return null;
    const mappedReason=leadFollowupReason(lead);
    if(!mappedReason)return null;
    return {
      id:f.id, auto:false, leadId:f.leadId, smId:f.smId,
      customer:lead.name||"Unknown Lead", mobile:lead.mobile||"",
      project:lead.location||lead.product||f.action||"",
      source:lead.channelPartnerName?`Channel Partner - ${lead.channelPartnerName}`:(lead.source||"Salesman"),
      salesman:smName(f.smId,salesmen),
      reason:mappedReason,
      quoteAmount:Number(lead.quotation?.amount||0),
      pending:lead.paymentOrderId?Math.max(Number(lead.paymentBalance ?? (Number(lead.quotation?.amount||0)-Number(lead.paymentPaid||0))),0):0,
      lastDate:f.date, nextDate:f.next||f.date, status:f.outcome, notes:f.notes||"",
    };
  }).filter(Boolean);
  return [...autoList,...manualList].reduce((acc,item)=>{
    const existing=acc.find(x=>x.leadId===item.leadId);
    if(!existing){ acc.push(item); return acc; }
    if(item.auto)return acc;
    existing.lastDate=item.lastDate||existing.lastDate;
    existing.nextDate=item.nextDate||existing.nextDate;
    existing.notes=item.notes||existing.notes;
    existing.manualFollowupId=item.id;
    return acc;
  },[]);
};

const partnerTransactions = partners => partners.flatMap(p=>(p.transactions||[]).map(t=>({...t,partner:p.name,partnerId:p.id})));
const partnerBusinessRows = partners => partners.flatMap(p=>[
  ...(p.transactions||[]).map(t=>({...t,partner:p.name,partnerId:p.id,business:Number(t.business||0),paid:Number(t.paid||0)})),
  ...(p.requests||[])

]);
const paidForOrder = (order, payments=[]) => {
  const paymentTotal=payments.filter(p=>p.orderId===order.id).reduce((sum,p)=>sum+Number(p.amount||0),0);
  return Math.max(Number(order.advance||0),paymentTotal);
};
const leadPaidFromOrders = (lead, orders=[], payments=[]) => {
  const linkedOrder=orders.find(o=>o.id===lead.paymentOrderId||o.leadId===lead.id);
  return linkedOrder ? paidForOrder(linkedOrder,payments) : Number(lead.paymentPaid||0);
};
const leadBalanceFromOrders = (lead, orders=[], payments=[]) => {
  const linkedOrder=orders.find(o=>o.id===lead.paymentOrderId||o.leadId===lead.id);
  const total=Number(linkedOrder?.final ?? lead.quotation?.amount ?? lead.budget ?? 0);
  return Math.max(total-leadPaidFromOrders(lead,orders,payments),0);
};
const isSalesRecognized = (lead, orders=[], payments=[]) => {
  if(!lead)return false;
  return !!lead.paymentOrderId || orders.some(o=>o.leadId===lead.id);
};
const paymentStatusFromAmounts = (paid,total) => paid<=0 ? "No Paid" : paid>=Number(total||0) ? "Fully Paid" : "Partially Paid";
const financeTotals = ({ payments=[], orders=[], expenses=[], channelPartners=[] }) => {
  const orderCollected=orders.reduce((s,o)=>s+paidForOrder(o,payments),0);
  const partnerTx=partnerBusinessRows(channelPartners);
  const partnerBusiness=partnerTx.reduce((s,t)=>s+Number(t.business||0),0);
  const partnerCollected=partnerTx.reduce((s,t)=>s+Number(t.paid||0),0);
  const orderOutstanding=orders.reduce((s,o)=>{
    const paid=paidForOrder(o,payments);
    return s+Math.max(Number(o.final||0)-paid,0);
  },0);
  const partnerOutstanding=Math.max(partnerBusiness-partnerCollected,0);
  const expenseTotal=expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const revenue=orderCollected+partnerCollected;
  return { orderCollected, partnerBusiness, partnerCollected, orderOutstanding, partnerOutstanding, expenseTotal, revenue, net:revenue-expenseTotal };
};
const MEASUREMENT_UNITS = ["MM","CM","Inches","Feet"];
const normalizeUnit = unit => MEASUREMENT_UNITS.includes(unit) ? unit : "Feet";
const toFeet = (value, unit="Feet") => {
  const n=Number(value||0);
  if(!Number.isFinite(n)||n<=0)return 0;
  const u=normalizeUnit(unit);
  if(u==="MM")return n/304.8;
  if(u==="CM")return n/30.48;
  if(u==="Inches")return n/12;
  return n;
};
const round2 = value => Math.round((Number(value||0)+Number.EPSILON)*100)/100;
const enrichMeasurementLine = line => {
  const heightUnit=normalizeUnit(line.heightUnit||line.unit);
  const widthUnit=normalizeUnit(line.widthUnit||line.unit);
  const qty=Number(line.qty||1);
  const heightFt=toFeet(line.height,heightUnit);
  const widthFt=toFeet(line.width,widthUnit);
  const actualPerPiece=heightFt*widthFt;
  const actualSqft=round2(actualPerPiece*qty);
  const chargeableSqft=actualPerPiece>0 ? round2(Math.max(actualPerPiece,MIN_BILLING_SQFT)*qty) : 0;
  return {...line,heightUnit,widthUnit,qty,heightFt:round2(heightFt),widthFt:round2(widthFt),sqft:actualSqft,actualSqft,chargeableSqft};
};
const measurementDisplay = line => {
  const l=enrichMeasurementLine(line);
  return `${l.height||0} ${l.heightUnit} H x ${l.width||0} ${l.widthUnit} W x ${l.qty||1}`;
};
const validateMeasurementRows = rows => {
  if(!rows.length)return "At least one window measurement is required";
  const bad=rows.find(w=>Number(w.height||0)<=0||Number(w.width||0)<=0||Number(w.qty||0)<=0||!MEASUREMENT_UNITS.includes(normalizeUnit(w.heightUnit||w.unit))||!MEASUREMENT_UNITS.includes(normalizeUnit(w.widthUnit||w.unit))||!w.color||!w.material);
  return bad ? "Each window needs valid height, width, unit, quantity, color and material details" : "";
};
const productionTrackLabel = (stage,status,installationDate="") => {
  if(["Completed","Delivered","Installed","Closed"].includes(status)||stage==="Completed")return "Completed";
  if(status==="Approval Pending"||stage==="Approval")return "Approval Pending";
  if(stage==="Order Done")return "Order Done";
  if(stage==="Cutting")return "Cutting Done";
  if(stage==="Assembly"||stage==="Assembling")return "Assembling Done";
  if(stage==="Quality Check & Finishing"||stage==="Quality Check")return "Quality Check Done";
  if(stage==="Packing & Dispatch")return "Packing & Dispatch Done";
  if(stage==="Installation Pending"||status==="Installation Pending")return installationDate ? "Installation Scheduled" : "Installation Pending";
  if(status==="In Production")return "In Production";
  return status||"Order Pending";
};
const measurementWindows = lead => {
  const m=lead.measurement||{};
  if(Array.isArray(m.windows)&&m.windows.length)return m.windows.map(enrichMeasurementLine);
  if(m.height||m.width)return [enrichMeasurementLine({label:"Window 1",height:m.height,width:m.width,heightUnit:m.heightUnit||m.unit,widthUnit:m.widthUnit||m.unit,qty:m.qty||1,color:m.color,material:m.material})];
  return [];
};
const lineAreaSqft = line => enrichMeasurementLine(line).sqft;
const lineChargeableSqft = line => enrichMeasurementLine(line).chargeableSqft;
const leadAreaSqft = lead => round2(measurementWindows(lead).reduce((s,line)=>s+lineAreaSqft(line),0));
const leadChargeableSqft = lead => round2(measurementWindows(lead).reduce((s,line)=>s+lineChargeableSqft(line),0));
const quotedProductType = lead => lead.measurement?.type==="Mesh" ? "Mosquito Mesh" : "Window Blinds";
const quoteLineRate = (quote, line, idx) => Number(quote?.lineItems?.[idx]?.rate ?? line?.rate ?? quote?.rate ?? 0);
const quoteLineItems = (lead, quote={}) => measurementWindows(lead).map((raw,i)=>{
  const line=enrichMeasurementLine(raw);
  const rate=quoteLineRate(quote,line,i);
  const productType=quote?.lineItems?.[i]?.productType || quote?.productType || quotedProductType(lead);
  return {
    ...line,
    productType,
    rate,
    amount:Math.round(lineChargeableSqft(line)*rate)
  };
});
const quoteTotals = (lead, quote={}) => {
  const lines=quoteLineItems(lead,quote);
  const gross=lines.reduce((s,line)=>s+Number(line.amount||0),0);
  const discountPct=Number(quote.discount||0);
  const discount=Math.round(gross*discountPct/100);
  const taxable=Math.max(gross-discount,0);
  const gstPct=Number(quote.gst||18);
  const gstAmount=Math.round(taxable*gstPct/100);
  const total=taxable+gstAmount;
  return {lines,gross,discountPct,discount,taxable,gstPct,gstAmount,total};
};

const billTotals = order => {
  const gross=(order.products||[]).reduce((s,p)=>s+Number(p.total||0),0);
  const discountPct=Number(order.discount||0);
  const discount=order.discountType==="percent"?Math.round(gross*discountPct/100):discountPct;
  const taxable=Number(order.taxable||Math.max(gross-discount,0));
  const gstPct=Number(order.gst||18);
  const gstAmount=Number(order.gstAmount||Math.round(taxable*gstPct/100));
  const final=Number(order.final||taxable+gstAmount);
  const paid=Number(order.advance||0);
  const balance=Number(order.balance||Math.max(final-paid,0));
  return {gross,discount,taxable,gstPct,gstAmount,final,paid,balance};
};
const billTaxDetails = (order, bill={}) => {
  const totals=billTotals(order);
  const taxType=bill.taxType||(((bill.place||"Karnataka").toLowerCase()==="karnataka")?"Intra-State":"Inter-State");
  const isInter=taxType==="Inter-State";
  const cgstRate=isInter?0:Number(bill.cgstRate ?? (totals.gstPct/2));
  const sgstRate=isInter?0:Number(bill.sgstRate ?? (totals.gstPct/2));
  const igstRate=isInter?Number(bill.igstRate ?? totals.gstPct):0;
  const gstRate=cgstRate+sgstRate+igstRate;
  const cgst=Math.round(totals.taxable*cgstRate/100);
  const sgst=Math.round(totals.taxable*sgstRate/100);
  const igst=Math.round(totals.taxable*igstRate/100);
  const gstAmount=cgst+sgst+igst;
  const final=totals.taxable+gstAmount;
  const balance=Math.max(final-totals.paid,0);
  return {...totals,taxType,cgstRate,sgstRate,igstRate,gstRate,cgst,sgst,igst,gstAmount,final,balance};
};

  const totalExp = expenses.reduce((s,e)=>s+e.amount,0);

      <div style={{display:"grid",gridTemplateColumns:"1.2fr 1fr 1fr",gap:16,marginBottom:20}}>

function Leads({ leads, setLeads, orders, setOrders, payments, setPayments, followups, setFollowups, salesmen=SALESMEN, partners, setPartners, isManager, smartInventory, setSmartInventory }) {
  const [search,setSearch]=useState("");
  const [fStatus,setFStatus]=useState("All");
  const [fSource,setFSource]=useState("All");
  const [fSM,setFSM]=useState("All");
  const [showAdd,setShowAdd]=useState(false);
  const [showDetail,setShowDetail]=useState(null);
  const [showCall,setShowCall]=useState(null);
  const [showConvert,setShowConvert]=useState(null);
  const [showRejected,setShowRejected]=useState(false);
  const [reassignRejected,setReassignRejected]=useState(null);
  const [orderMeasurements,setOrderMeasurements]=useState([]);
  const [paymentEditLead,setPaymentEditLead]=useState(null);
  const [editId,setEditId]=useState(null);
  const [saving,setSaving]=useState(false);
  const [converting,setConverting]=useState(false);
  const blankLead={name:"",mobile:"",alt:"",email:"",source:"Google Ads",product:PRODUCTS[0],location:"",budget:"",salesman:1,status:"New",priority:"Warm",notes:""};
  const [form,setForm]=useState(blankLead);
  const [callLog,setCallLog]=useState({outcome:"Answered",notes:"",nextDate:todayStr()});
  const [paymentEditForm,setPaymentEditForm]=useState({status:"No Paid",paid:""});

  const activeLeads=leads.filter(l=>l.status!=="Rejected");
  const rejectedLeads=sortLeadsNewest(leads.filter(l=>l.status==="Rejected"));
  const filtered=sortLeadsNewest(activeLeads.filter(l=>{
    const q=search.toLowerCase();
    return (!q||l.name.toLowerCase().includes(q)||l.mobile.includes(q)||l.location.toLowerCase().includes(q))
      &&(fStatus==="All"||l.status===fStatus)
      &&(fSource==="All"||l.source===fSource)
      &&(fSM==="All"||l.salesman===Number(fSM));
  }));
  const linkedRequest=lead=>partners?.find(p=>p.id===lead.channelPartnerId)?.requests?.find(r=>r.id===lead.partnerRequestId);
  const leadQuote=lead=>lead.quotation||linkedRequest(lead)?.quotation||null;
  const leadPaid=lead=>leadPaidFromOrders(lead,orders,payments)||Number(linkedRequest(lead)?.paid||0);
  const leadBalance=lead=>{
    const quote=leadQuote(lead);
    const order=orders.find(o=>o.id===lead.paymentOrderId||o.leadId===lead.id);
    return order?leadBalanceFromOrders(lead,orders,payments):(quote?Math.max(Number(quote.amount||0)-leadPaid(lead),0):0);
  };
  const leadPaymentStatus=lead=>{
    const order=orders.find(o=>o.id===lead.paymentOrderId||o.leadId===lead.id);
    const total=Number(order?.final ?? leadQuote(lead)?.amount ?? lead.budget ?? 0);
    return paymentStatusFromAmounts(leadPaid(lead),total);
  };
  const openLeadEdit=lead=>{
    const quotation=leadQuote(lead);
    const total=Number(quotation?.amount||lead.budget||0);
    const paid=leadPaid(lead);
    const status=lead.paymentStatus||(paid<=0?"No Paid":paid>=total?"Fully Paid":"Partially Paid");
    setForm({...lead,quotation:lead.quotation||quotation});
    setPaymentEditForm({status,paid:status==="Fully Paid"?total:status==="No Paid"?0:paid});
    setEditId(lead.id);
    setShowAdd(true);
  };
  const rejectLead=lead=>{
    if(!confirm(`Move ${lead.name} to Rejected Leads?`))return;
    const stamp=new Date().toISOString();
    setLeads(ls=>ls.map(l=>l.id===lead.id?{...l,status:"Rejected",rejectedAt:stamp,updated:todayStr(),updatedAt:stamp}:l));
    if(lead.channelPartnerId&&lead.partnerRequestId){
      setPartners?.(ps=>ps.map(p=>p.id===lead.channelPartnerId?{...p,requests:(p.requests||[]).map(r=>r.id===lead.partnerRequestId?{...r,status:"Rejected By Management",leadStatus:"Rejected"}:r)}:p));
    }
    setFollowups?.(fs=>fs.filter(f=>f.leadId!==lead.id));
    setShowDetail(d=>d&&d.id===lead.id?{...d,status:"Rejected",rejectedAt:stamp,updated:todayStr()}:d);
  };
  const reassignRejectedLead=()=>{
    if(!reassignRejected?.salesman)return alert("Select salesman");
    const stamp=new Date().toISOString();
    setLeads(ls=>ls.map(l=>{
      if(l.id!==reassignRejected.lead.id)return l;
      const linkedReq=linkedRequest(l);
      const cpDraftMeasurement=l.measurement||linkedReq?.measurement||null;
      const {rejectedAt,contactDone,svDone,measurement,quotation,paymentMarked,paymentStatus,paymentPaid,paymentBalance,paymentOrderId,followupReason,cpAccepted,cpAcceptedAt,cpAcceptedDate,...rest}=l;
      return {...rest,status:"New",salesman:Number(reassignRejected.salesman),notes:l.notes||"",cpDraftMeasurement,reassignedAt:stamp,assignedAt:stamp,updated:todayStr(),updatedAt:stamp};
    }));
    const lead=reassignRejected.lead;
    if(lead.channelPartnerId&&lead.partnerRequestId){
      setPartners?.(ps=>ps.map(p=>p.id===lead.channelPartnerId?{...p,requests:(p.requests||[]).map(r=>{
        if(r.id!==lead.partnerRequestId)return r;
        const {quotation,cpAccepted,cpAcceptedAt,cpAcceptedDate,...safe}=r;
        return {...safe,quotationAmount:0,paid:0,balance:0,status:"Reassigned - Salesman Visit Pending",leadStatus:"New",stage:"Salesman Visit Pending",pdfReady:false};
      })}:p));
    }
    setReassignRejected(null);
    setShowRejected(false);
  };

  const save=()=>{
    if(saving)return;
    const mobileError=validateMobile(form.mobile);
    const emailError=validateEmail(form.email);
    if(!form.name)return alert("Name is required");
    if(mobileError)return alert(mobileError);
    if(emailError)return alert(emailError);
    const normalizedMobile=normalizeMobile(form.mobile);
    const duplicate=customerDuplicate({leads,orders,partners,mobile:normalizedMobile,email:form.email,excludeLeadId:editId||""});
    if(duplicate){ duplicateAudit("Lead Management",duplicateMsg(duplicate),{mobile:normalizedMobile,email:form.email}); return alert(duplicateMsg(duplicate)); }
    const key=`lead:${normalizedMobile}:${String(form.email||"").toLowerCase()}`;
    if(!editId&&onceKeyActive(key))return alert("Processing... duplicate submit blocked");
    setSaving(true);
    if(editId){
      const quotation=leadQuote(form)||form.quotation;
      const total=Number(quotation?.amount||form.budget||0);
      const shouldUpdatePayment=!!quotation;
      const paid=shouldUpdatePayment?(paymentEditForm.status==="Fully Paid"?total:(paymentEditForm.status==="No Paid"?0:Number(paymentEditForm.paid||0))):0;
      if(shouldUpdatePayment&&paid>total){ setSaving(false); return alert("Paid amount cannot be more than quotation amount"); }
      const balance=Math.max(total-paid,0);
      const linkedOrder=orders.find(o=>o.id===form.paymentOrderId||o.leadId===editId);
      const orderId=form.paymentOrderId||linkedOrder?.id;
      const paymentPatch=shouldUpdatePayment?{paymentMarked:true,paymentStatus:paymentEditForm.status,paymentPaid:paid,paymentBalance:balance}:{};
      setLeads(ls=>ls.map(l=>l.id===editId?{...l,...form,...paymentPatch,mobile:normalizedMobile,updated:todayStr(),updatedAt:new Date().toISOString()}:l));
      if(shouldUpdatePayment&&orderId){
        setOrders(os=>os.map(o=>o.id===orderId?{...o,advance:paid,balance}:o));
        setPayments(ps=>{
          const existing=ps.find(p=>p.orderId===orderId);
          if(paid<=0)return ps.filter(p=>p.orderId!==orderId);
          if(existing)return ps.map(p=>p.orderId===orderId?{...p,amount:paid,mode:paymentEditForm.status,notes:"Updated from lead edit"}:p);
          return [...ps,{id:`PAY${Date.now()}`,orderId,date:todayStr(),amount:paid,mode:paymentEditForm.status,notes:"Added from lead edit"}];
        });
      }
      if(shouldUpdatePayment&&form.channelPartnerId&&form.partnerRequestId){
        setPartners?.(ps=>ps.map(p=>p.id===form.channelPartnerId?{...p,requests:(p.requests||[]).map(r=>r.id===form.partnerRequestId?{...r,paid,balance,status:orderId?(paid>0?"Order Confirmed":"Quotation Sent"):(paid>0?"Payment Updated":"Quotation Sent")}:r)}:p));
      }
    } else {
      const nid=`L${String(leads.length+1).padStart(3,"0")}`;
      const now=new Date().toISOString();
      setLeads(ls=>[...ls,{...form,mobile:normalizedMobile,id:nid,created:todayStr(),updated:todayStr(),createdAt:now,updatedAt:now,assignedAt:now,createdBy:"Management"}]);
      auditLog({event:"Created",source:"Lead Management",recordType:"Lead",recordId:nid,mobile:normalizedMobile});
    }
    setForm(blankLead);setShowAdd(false);setEditId(null);setPaymentEditForm({status:"No Paid",paid:""});
    setSaving(false);
  };

  const logCall=()=>{
    if(!showCall)return;
    setFollowups(fs=>[...fs,{id:`FU${Date.now()}`,leadId:showCall.id,smId:showCall.salesman,date:todayStr(),time:new Date().toTimeString().slice(0,5),type:"Call",outcome:"Completed",action:callLog.notes,next:callLog.nextDate,notes:callLog.notes}]);
    setLeads(ls=>ls.map(l=>l.id===showCall.id?{...l,updated:todayStr(),updatedAt:new Date().toISOString(),status:callLog.outcome==="Interested"?"Contacted":l.status}:l));
    setShowCall(null);setCallLog({outcome:"Answered",notes:"",nextDate:todayStr()});
    alert("Call logged & follow-up created ");
  };

  const openOrderApproval=lead=>{
    const quotation=leadQuote(lead);
    if(!quotation)return alert("Quotation is required before production order");
    if(!lead.paymentMarked)return alert("Payment status must be marked before production order");
    const windows=measurementWindows(lead).map((w,i)=>({...w,label:w.label||`Window ${i+1}`,qty:Number(w.qty||1)}));
    if(!windows.length)return alert("Measurement is required before production order");
    setOrderMeasurements(windows);
    setShowConvert({...lead,quotation,paymentPaid:leadPaid(lead),paymentBalance:leadBalance(lead)});
  };
  const updateOrderMeasurement=(idx,patch)=>setOrderMeasurements(rows=>rows.map((w,i)=>i===idx?{...w,...patch}:w));
  const applyOrderInventoryChoice=(idx,value,type)=>{
    const opt=inventoryChoiceOptions(smartInventory,type).find(o=>o.value===value);
    if(!opt)return;
    updateOrderMeasurement(idx,{inventoryChoice:value,color:opt.color,material:opt.material,code:opt.code});
  };
  const applyOrderInventoryCode=(idx,value,type)=>{
    const opt=inventoryCodeOptions(smartInventory,type).find(o=>o.value===value);
    if(!opt)return;
    updateOrderMeasurement(idx,{inventoryChoice:opt.material,color:opt.color,material:opt.material,code:opt.value});
  };
  const mergeCutPiecesLocal=lengths=>{
    const map={};
    (lengths||[]).forEach(l=>{
      const size=round2(ftFromSize(l.size));
      if(size>0)map[size]=(map[size]||0)+Number(l.qty||0);
    });
    return Object.entries(map).map(([size,qty])=>({size:fmtFt(size),qty})).filter(l=>l.qty>0).sort((a,b)=>ftFromSize(a.size)-ftFromSize(b.size));
  };
  const matchText=(...parts)=>parts.filter(Boolean).join(" ").toLowerCase();
  const pickMeshMaterialForProduct=(product,inv)=>{
    const text=matchText(product.color,product.material,product.name,product.code);
    const list=inv.meshComponents||[];
    const profiles=list.filter(i=>(i.item||"").toLowerCase().includes("aluminium profile"));
    return profiles.find(i=>text.includes((i.code||"").toLowerCase()))
      || profiles.find(i=>text.includes("white")&&(i.item||"").toLowerCase().includes("white"))
      || profiles.find(i=>text.includes("brown")&&(i.item||"").toLowerCase().includes("brown"))
      || profiles.find(i=>text.includes("black")&&(i.item||"").toLowerCase().includes("black"))
      || profiles[0]
      || list[0];
  };
  const pickBlindRollForProduct=(product,inv)=>{
    const text=matchText(product.color,product.material,product.name,product.code);
    return (inv.blindRolls||[]).find(r=>text.includes((r.code||"").toLowerCase()))
      || (inv.blindRolls||[]).find(r=>text.includes((r.shade||"").toLowerCase()))
      || (inv.blindRolls||[])[0];
  };
  const meshRequirementFt=product=>{
    const h=Number(product.heightFt||0);
    const w=Number(product.widthFt||0);
    const q=Number(product.qty||1);
    if(h>0&&w>0)return round2((h+w)*2*q);
    const sq=Number(product.sqft||String(product.size||"").replace(/[^0-9.]/g,"")||0);
    return round2(sq>0?Math.sqrt(sq)*4:12*q);
  };
  const consumeInventoryForOrder=(order)=>{
    if(!setSmartInventory||!smartInventory)return order;
    const inv={...smartInventory};
    const consumptions={};
    const movements=[...(inv.movements||[])];
    inv.meshComponents=[...(inv.meshComponents||[])];
    inv.blindRolls=[...(inv.blindRolls||[])];
    (order.products||[]).forEach((product,idx)=>{
      const productType=(product.type||product.name||"").toLowerCase();
      const key=`${order.id}-${idx}`;
      if(productType.includes("mesh")){
        const material=pickMeshMaterialForProduct(product,inv);
        if(!material)return;
        const materialIndex=inv.meshComponents.findIndex(i=>i.id===material.id);
        let remaining=meshRequirementFt(product);
        const requiredFt=remaining;
        const cutUses=[];
        const cutRemainders=[];
        let availableCuts=(material.lengths||[]).flatMap(l=>Array.from({length:Number(l.qty||0)},()=>ftFromSize(l.size))).filter(n=>n>0).sort((a,b)=>b-a);
        while(remaining>0.05){
          const fit=availableCuts.findIndex(n=>n<=remaining+0.05);
          if(fit<0)break;
          const size=availableCuts.splice(fit,1)[0];
          cutUses.push(size);
          remaining=round2(remaining-size);
        }
        if(remaining>0.05){
          const largerIndex=availableCuts.findLastIndex(n=>n>remaining+0.05);
          if(largerIndex>=0){
            const size=availableCuts.splice(largerIndex,1)[0];
            cutUses.push(size);
            const leftover=round2(size-remaining);
            if(leftover>=2)cutRemainders.push(leftover);
            remaining=0;
          }
        }
        const fullLength=Number(material.fullLengthFt||12);
        const fullUsed=remaining>0.05?Math.ceil(remaining/fullLength):0;
        if(Number(material.full||0)<fullUsed)return;
        const leftoverFt=round2(Math.max((fullUsed*fullLength)-remaining,0));
        const reusableCutFt=leftoverFt>=2?leftoverFt:0;
        const wasteFt=leftoverFt>0&&leftoverFt<2?leftoverFt:0;
        const cutGrouped=mergeCutPiecesLocal(cutUses.map(size=>({size:fmtFt(size),qty:1})));
        let lengths=mergeCutPiecesLocal(material.lengths||[]);
        cutGrouped.forEach(use=>{
          let left=Number(use.qty||0);
          lengths=lengths.map(l=>{
            if(ftFromSize(l.size)!==ftFromSize(use.size)||left<=0)return l;
            const take=Math.min(Number(l.qty||0),left);
            left-=take;
            return {...l,qty:Number(l.qty||0)-take};
          }).filter(l=>Number(l.qty||0)>0);
        });
        if(cutRemainders.length)lengths=mergeCutPiecesLocal([...lengths,...cutRemainders.map(size=>({size:fmtFt(size),qty:1}))]);
        if(reusableCutFt)lengths=mergeCutPiecesLocal([...lengths,{size:fmtFt(reusableCutFt),qty:1}]);
        const remainingFull=Number(material.full||0)-fullUsed;
        inv.meshComponents[materialIndex]={...material,full:remainingFull,lengths,cut:lengths.reduce((s,l)=>s+Number(l.qty||0),0)};
        consumptions[key]={job:{id:key,orderId:order.id},kind:"mesh",materialId:material.id,materialName:material.item,requiredFt,cutGrouped,cutRemainders:mergeCutPiecesLocal(cutRemainders.map(size=>({size:fmtFt(size),qty:1}))),fullUsed,fullLength,leftoverFt,reusableCutFt,wasteFt,afterFull:remainingFull,consumedAt:new Date().toISOString()};
        movements.unshift({id:Date.now()+idx,kind:"mesh",date:todayStr(),orderId:order.id,material:material.item,usedFt:requiredFt,cutUsed:cutGrouped,cutRemainders,fullUsed,fullLength,remainingFull,reusableCutFt,wasteFt,text:`${material.item} consumed for ${order.id}: ${fmtFt(requiredFt)} used`});
      } else {
        const roll=pickBlindRollForProduct(product,inv);
        if(!roll)return;
        const rollIndex=inv.blindRolls.findIndex(r=>r.id===roll.id);
        const requiredSqft=Number(product.actualSqft||product.sqft||String(product.size||"").replace(/[^0-9.]/g,"")||0);
        const usedMetres=round2(requiredSqft*0.092903);
        const beforeMetres=Number(roll.remainingMetres ?? (Number(roll.rolls||0)*Number(roll.metres||0)));
        const remainingMetres=round2(Math.max(beforeMetres-usedMetres,0));
        const metresPerRoll=Number(roll.metres||30);
        inv.blindRolls[rollIndex]={...roll,remainingMetres,rolls:Math.ceil(remainingMetres/Math.max(metresPerRoll,1))};
        consumptions[key]={job:{id:key,orderId:order.id},kind:"blind",materialId:roll.id,materialName:roll.name,usedSqft:requiredSqft,usedMetres,remainingMetres,consumedAt:new Date().toISOString()};
        movements.unshift({id:Date.now()+idx,kind:"blinds",date:todayStr(),orderId:order.id,material:roll.name,usedSqft:requiredSqft,usedMetres,remainingMetres,text:`${roll.name} consumed for ${order.id}: ${requiredSqft} SQFT / ${usedMetres} m used`});
      }
    });
    setSmartInventory({...inv,movements:movements.slice(0,30)});
    return {...order,inventoryConsumptions:consumptions};
  };
  const convertToOrder=lead=>{

    if(onceKeyActive(`convert-order:${lead.id}`))return alert("Processing... duplicate order creation blocked");
    const quotation=leadQuote(lead)||lead.quotation;
    if(!quotation)return alert("Quotation is required before production order");
    if(!orderMeasurements.length)return alert("Measurement is required");
    const nid=`ORD-${String(orders.length+1).padStart(3,"0")}`;
    const amount=Number(quotation.amount||0);
    const paid=Number(lead.paymentPaid||leadPaid(lead)||0);
    const balance=Math.max(amount-paid,0);
    const productionProduct=quotation.productType||quotedProductType(lead);
    const measurementError=validateMeasurementRows(orderMeasurements);
    if(measurementError)return alert(measurementError);
    setConverting(true);
    const quoteLines=quoteLineItems(lead,{...quotation,productType:productionProduct});
    const orderPayload={id:nid,leadId:lead.id,customer:lead.name,mobile:lead.mobile,products:orderMeasurements.map((raw,i)=>{ const w=enrichMeasurementLine(raw); const qLine=quoteLines[i]||{}; return {name:qLine.productType||productionProduct,type:lead.measurement?.type||"Blind",sourceLeadProduct:lead.product,size:`Actual ${w.sqft} SQFT / Billing ${w.chargeableSqft} SQFT`,qty:Number(w.qty||1),unitPrice:Number(qLine.rate||quotation.rate||0),total:Number(qLine.amount ?? (w.chargeableSqft*Number(quotation.rate||0))),window:w.label||`Window ${i+1}`,height:w.height,width:w.width,heightUnit:w.heightUnit,widthUnit:w.widthUnit,heightFt:w.heightFt,widthFt:w.widthFt,sqft:w.sqft,actualSqft:w.sqft,chargeableSqft:w.chargeableSqft,billingSqft:w.chargeableSqft,color:w.color,material:w.material,code:w.code}; }),discount:Number(quotation.discount||0),discountType:"percent",gst:Number(quotation.gst||0),gstAmount:Number(quotation.gstAmount||0),taxable:Number(quotation.taxable||0),final:amount,advance:paid,balance,delivery:"",install:true,installer:"",status:"Approval Pending",approval:"Pending",created:todayStr(),createdAt:new Date().toISOString()};
    setOrders(os=>{
      if(os.some(o=>o.leadId===lead.id||o.id===nid||(normalizeMobile(o.mobile)===normalizeMobile(lead.mobile)&&o.status==="Approval Pending"))){
        duplicateAudit("Lead Management Order",`Duplicate production order blocked for lead ${lead.id}`,{leadId:lead.id,mobile:lead.mobile});
        return os;
      }
      return [...os,consumeInventoryForOrder(orderPayload)];
    });
    if(paid>0)setPayments(ps=>[...ps,{id:`PAY${Date.now()}`,orderId:nid,date:todayStr(),amount:paid,mode:lead.paymentStatus||"Payment",notes:"Payment linked during management production approval"}]);
    setLeads(ls=>ls.map(l=>l.id===lead.id?{...l,status:"Converted",paymentOrderId:nid,updated:todayStr(),updatedAt:new Date().toISOString()}:l));
    if(lead.channelPartnerId&&lead.partnerRequestId){
      setPartners?.(ps=>ps.map(p=>p.id===lead.channelPartnerId?{...p,requests:(p.requests||[]).map(r=>r.id===lead.partnerRequestId?{...r,orderId:nid,status:"Order Sent For Approval",stage:"Approval Pending"}:r)}:p));
    }
    setShowConvert(null);setConverting(false);alert(`Order ${nid} created `);
  };
  const openPaymentEdit=lead=>{
    const quotation=leadQuote(lead)||lead.quotation;
    const total=Number(quotation?.amount||lead.budget||0);

    const status=lead.paymentStatus||(paid<=0?"No Paid":paid>=total?"Fully Paid":"Partially Paid");

  const savePaymentEdit=()=>{

        return [...ps,{id:`PAY${Date.now()}`,orderId,date:todayStr(),amount:paid,mode:paymentEditForm.status,notes:"Added by management"}];
      });

      setPartners?.(ps=>ps.map(p=>p.id===paymentEditLead.channelPartnerId?{...p,requests:(p.requests||[]).map(r=>r.id===paymentEditLead.partnerRequestId?{...r,paid,balance,status:orderId?(paid>0?"Order Confirmed":"Quotation Sent"):(paid>0?"Payment Updated":"Quotation Sent")}:r)}:p));
    }
    setShowDetail(d=>d&&d.id===paymentEditLead.id?{...d,paymentMarked:true,paymentStatus:paymentEditForm.status,paymentPaid:paid,paymentBalance:balance,updated:todayStr()}:d);

  return (
    <div>
      <SectionTitle action={!isManager&&<PrimaryBtn onClick={()=>{setForm(blankLead);setEditId(null);setPaymentEditForm({status:"No Paid",paid:""});setShowAdd(true)}}>+ Add Lead</PrimaryBtn>}>
        Lead Management <span style={{fontSize:14,fontWeight:400,color:T.muted}}>({filtered.length})</span>
      </SectionTitle>
      <div style={{display:"flex",justifyContent:"flex-end",margin:"-10px 0 14px"}}>
        <GhostBtn onClick={()=>setShowRejected(true)}>Rejected Leads ({rejectedLeads.length})</GhostBtn>
      </div>

      {/* Filters */}
      <GlassCard style={{marginBottom:16,padding:"14px 18px"}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <div style={{flex:"1 1 200px"}}><SearchBar value={search} onChange={setSearch} placeholder="Search name, mobile, location..." /></div>
          <div style={{minWidth:130}}>
            <FilterSelect value={fStatus} onChange={setFStatus} options={[{v:"All",l:"All Status"},...["New","Contacted","Site Visit Scheduled","Quoted","Negotiation","Converted","Lost","On Hold"].map(s=>({v:s,l:s}))]} />
          </div>
          <div style={{minWidth:120}}>
            <FilterSelect value={fSource} onChange={setFSource} options={[{v:"All",l:"All Sources"},...["Google Ads","JustDial","Referral","Walk-in","Social Media","CP","Other"].map(s=>({v:s,l:s}))]} />
          </div>
          {!isManager&&<div style={{minWidth:130}}>
            <FilterSelect value={fSM} onChange={setFSM} options={[{v:"All",l:"All Salesmen"},...salesmen.map(s=>({v:s.id,l:s.name}))]} />

            return (

              <TD mono color={T.muted}>{l.id}</TD>
              <TD>
                <div style={{fontWeight:500,color:T.text}}>{l.name}</div>

              <TD><span style={{fontSize:12,color:T.sub}}>{l.product}</span></TD>
              <TD><Pill label={l.source} color={l.source==="Google Ads"?T.blue:l.source==="JustDial"?T.orange:l.source==="Referral"?T.purple:l.source==="Walk-in"?T.teal:T.sub} /></TD>
              <TD>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:smColor(l.salesman),flexShrink:0}} />

                  {!l.paymentOrderId&&!orders.some(o=>o.leadId===l.id)&&<button onClick={()=>rejectLead(l)} style={{background:`${T.red}18`,border:`1px solid ${T.red}33`,borderRadius:7,padding:"4px 8px",color:T.red,cursor:"pointer",fontSize:11,fontWeight:700}} title="Reject Lead">Rejected</button>}

      </GlassCard>

      {/* Add/Edit Modal */}

          <div style={{display:"flex",gap:10,marginTop:20}}>

            <GhostBtn onClick={()=>{setShowAdd(false);setEditId(null);setPaymentEditForm({status:"No Paid",paid:""});}}>Cancel</GhostBtn>
          </div>
        </Modal>
      )}

      {/* Detail Modal */}
      {showDetail&&(
        <Modal title={`Lead - ${showDetail.id}`} onClose={()=>setShowDetail(null)} wide>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
            {[["Customer",showDetail.name],["Mobile",showDetail.mobile],["Email",showDetail.email||""],["Location",showDetail.location],["Source",showDetail.source],["Product",showDetail.product],["Budget",showDetail.budget?inr(showDetail.budget):""],["Salesman",smName(showDetail.salesman,salesmen)],["Status",showDetail.status],["Priority",showDetail.priority],["Created",showDetail.created],["Updated",showDetail.updated]].map(([k,v])=>(
              <div key={k} style={{background:"rgba(255,255,255,.04)",borderRadius:10,padding:"10px 14px"}}>
                <div style={{fontSize:11,color:T.muted,marginBottom:3,textTransform:"uppercase",letterSpacing:.4}}>{k}</div>
                <div style={{fontSize:13,color:T.text,fontWeight:500}}>{v}</div>
              </div>
            ))}
          </div>
          {showDetail.notes&&<div style={{background:"rgba(245,158,11,.07)",border:"1px solid rgba(245,158,11,.2)",borderRadius:10,padding:"10px 14px",marginBottom:20}}>
            <div style={{fontSize:11,color:T.amber,marginBottom:4,fontWeight:600}}>NOTES</div>
            <div style={{fontSize:13,color:T.sub}}>{showDetail.notes}</div>
          </div>}
          {showDetail.quotation&&<div style={{background:T.cardHi,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"center",flexWrap:"wrap"}}>
              <div>
                <div style={{fontSize:11,color:T.muted,marginBottom:4,fontWeight:700}}>PAYMENT DETAILS</div>
              <div style={{fontSize:13,color:T.sub}}>Order Amount: <b style={{color:T.text}}>{inr(showDetail.quotation.amount||0)}</b>{isSalesRecognized(showDetail,orders,payments)&&<> | Status: <b style={{color:T.blue}}>{leadPaymentStatus(showDetail)}</b> | Collected: <b style={{color:T.green}}>{inr(leadPaid(showDetail))}</b> | Left: <b style={{color:leadBalance(showDetail)>0?T.red:T.green}}>{inr(leadBalance(showDetail))}</b></>}</div>
              </div>
            </div>
          </div>}
          <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:12}}>Follow-up Timeline</div>
          {followups.filter(f=>f.leadId===showDetail.id).length===0
            ? <div style={{fontSize:13,color:T.muted}}>No follow-ups logged yet.</div>
            : followups.filter(f=>f.leadId===showDetail.id).map(f=>(
              <div key={f.id} style={{display:"flex",gap:12,marginBottom:12}}>
                <div style={{width:2,background:`${T.teal}44`,borderRadius:1,flexShrink:0}} />
                <div style={{padding:"6px 0"}}>
                  <div style={{fontSize:12,color:T.teal,fontWeight:600}}>{f.date} {f.time} | {f.type}</div>
                  <div style={{fontSize:13,color:T.sub,marginTop:2}}>{f.notes||f.action||"No notes"}</div>
                </div>
              </div>
            ))
          }
        </Modal>
      )}

      {paymentEditLead&&(
        <Modal title="Edit Payment Details" onClose={()=>setPaymentEditLead(null)}>
          <div style={{background:T.cardHi,border:`1px solid ${T.border}`,borderRadius:8,padding:12,marginBottom:14,fontSize:13,color:T.sub}}>
            Order Amount: <b style={{color:T.text}}>{inr(paymentEditLead.quotation?.amount||paymentEditLead.budget||0)}</b> | Payment Left: <b style={{color:T.red}}>{inr(Math.max(Number(paymentEditLead.quotation?.amount||paymentEditLead.budget||0)-(paymentEditForm.status==="Fully Paid"?Number(paymentEditLead.quotation?.amount||paymentEditLead.budget||0):(paymentEditForm.status==="No Paid"?0:Number(paymentEditForm.paid||0))),0))}</b>
          </div>
          <FormRow cols={2}>
            <Field label="Payment Status"><select value={paymentEditForm.status} onChange={e=>setPaymentEditForm(f=>({...f,status:e.target.value,paid:e.target.value==="Fully Paid"?(paymentEditLead.quotation?.amount||paymentEditLead.budget||0):e.target.value==="No Paid"?0:f.paid}))}>{["No Paid","Partially Paid","Fully Paid"].map(s=><option key={s}>{s}</option>)}</select></Field>
            <Field label="How Much Paid"><input type="number" disabled={paymentEditForm.status!=="Partially Paid"} value={paymentEditForm.status==="Fully Paid"?(paymentEditLead.quotation?.amount||paymentEditLead.budget||0):paymentEditForm.status==="No Paid"?0:paymentEditForm.paid} onChange={e=>setPaymentEditForm(f=>({...f,paid:e.target.value}))} /></Field>
          </FormRow>
          <div style={{display:"flex",gap:10,marginTop:18}}><PrimaryBtn onClick={savePaymentEdit}>Save Payment</PrimaryBtn><GhostBtn onClick={()=>setPaymentEditLead(null)}>Cancel</GhostBtn></div>
        </Modal>
      )}
      {showRejected&&<Modal title="Rejected Leads" onClose={()=>setShowRejected(false)} wide>
        <GlassCard style={{padding:0}}>
          <Table headers={["Lead","Customer","Product","Salesman","Rejected Date","Action"]}>
            {rejectedLeads.map(l=><TR key={l.id}>
              <TD mono>{l.id}</TD>
              <TD bold>{l.name}<div style={{fontSize:11,color:T.muted}}>{l.mobile} | {l.location}</div></TD>
              <TD>{l.product}</TD>
              <TD>{smName(l.salesman,salesmen)||"-"}</TD>
              <TD color={T.muted}>{l.rejectedAt?new Date(l.rejectedAt).toLocaleDateString("en-IN"):l.updated}</TD>
              <TD><PrimaryBtn small onClick={()=>setReassignRejected({lead:l,salesman:l.salesman||salesmen[0]?.id||""})}>Reassign Lead</PrimaryBtn></TD>
            </TR>)}
          </Table>
          {rejectedLeads.length===0&&<div style={{padding:32,textAlign:"center",color:T.muted,fontSize:13}}>No rejected leads.</div>}
        </GlassCard>
      </Modal>}
      {reassignRejected&&<Modal title={`Reassign ${reassignRejected.lead.name}`} onClose={()=>setReassignRejected(null)}>
        <Field label="Select Salesman"><select value={reassignRejected.salesman} onChange={e=>setReassignRejected(r=>({...r,salesman:e.target.value}))}><option value="">Select salesman</option>{salesmen.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></Field>
        <div style={{display:"flex",gap:10,marginTop:18}}><PrimaryBtn onClick={reassignRejectedLead}>Reassign As New Lead</PrimaryBtn><GhostBtn onClick={()=>setReassignRejected(null)}>Cancel</GhostBtn></div>
      </Modal>}

      {/* Convert Modal */}
      {showConvert&&(
        <Modal title="Send Order To Production Approval" onClose={()=>setShowConvert(null)} wide>
          <div style={{background:"rgba(167,139,250,.08)",border:"1px solid rgba(167,139,250,.2)",borderRadius:12,padding:"16px 18px",marginBottom:20}}>
            <div style={{fontSize:13,fontWeight:600,color:T.text}}>{showConvert.name}</div>
            <div style={{fontSize:12,color:T.muted,marginTop:4}}>{showConvert.product} | Quoted {inr(showConvert.quotation?.amount||0)} | Paid {inr(showConvert.paymentPaid||0)}</div>
          </div>
          <p style={{fontSize:13,color:T.sub,marginBottom:16,lineHeight:1.6}}>Use the quoted measurements below, or correct height, width, quantity, color and material before sending to Production. Production will still start only after approval in the Production tab.</p>
          <div style={{display:"grid",gap:10,marginBottom:18}}>
            {orderMeasurements.map((w,i)=><div key={i} style={{display:"grid",gridTemplateColumns:"1.2fr repeat(8,1fr)",gap:8,alignItems:"end",border:`1px solid ${T.border}`,borderRadius:8,padding:10}}>
              <Field label="Window"><input value={w.label||""} onChange={e=>updateOrderMeasurement(i,{label:e.target.value})} /></Field>
              <Field label="Height"><input type="number" min="0.01" step="0.01" value={w.height||""} onChange={e=>updateOrderMeasurement(i,{height:e.target.value})} /></Field>
              <Field label="Height Unit"><select value={normalizeUnit(w.heightUnit||w.unit)} onChange={e=>updateOrderMeasurement(i,{heightUnit:e.target.value})}>{MEASUREMENT_UNITS.map(u=><option key={u}>{u}</option>)}</select></Field>
              <Field label="Width"><input type="number" min="0.01" step="0.01" value={w.width||""} onChange={e=>updateOrderMeasurement(i,{width:e.target.value})} /></Field>
              <Field label="Width Unit"><select value={normalizeUnit(w.widthUnit||w.unit)} onChange={e=>updateOrderMeasurement(i,{widthUnit:e.target.value})}>{MEASUREMENT_UNITS.map(u=><option key={u}>{u}</option>)}</select></Field>
              <Field label="Qty"><input type="number" min="1" value={w.qty||1} onChange={e=>updateOrderMeasurement(i,{qty:e.target.value})} /></Field>
              <Field label="Color / Material / Code"><select value={w.inventoryChoice||""} onChange={e=>applyOrderInventoryChoice(i,e.target.value,showConvert.measurement?.type||showConvert.product)}><option value="">Select inventory material...</option>{inventoryChoiceOptions(smartInventory,showConvert.measurement?.type||showConvert.product).map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select></Field>
              <Field label="Selected Code"><select value={w.code||""} onChange={e=>applyOrderInventoryCode(i,e.target.value,showConvert.measurement?.type||showConvert.product)}><option value="">Select password code...</option>{inventoryCodeOptions(smartInventory,showConvert.measurement?.type||showConvert.product).map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select></Field>
              <Field label="Billing SQFT"><input disabled value={lineChargeableSqft(w)} /></Field>
            </div>)}
          </div>
          <div style={{display:"flex",gap:10}}>
            <PrimaryBtn disabled={converting} onClick={()=>convertToOrder(showConvert)} color={T.purple}>{converting?"Processing...":"Send For Production Approval"}</PrimaryBtn>
            <GhostBtn onClick={()=>setShowConvert(null)}>Cancel</GhostBtn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// 
// MODULE: FOLLOW-UPS
// 
function FollowUps({ followups, setFollowups, leads, setLeads, salesmen=SALESMEN, isManager, canEditReason=false }) {
  const [filter,setFilter]=useState("all");
  const [showAdd,setShowAdd]=useState(false);
  const [saving,setSaving]=useState(false);
  const blank={leadId:leads[0]?.id||"",smId:1,date:todayStr(),time:"10:00",type:"Call",outcome:"Pending",action:"",next:todayStr(),notes:""};
  const [form,setForm]=useState(blank);

  const save=()=>{
    if(saving)return;
    if(!form.leadId)return alert("Lead is required");
    const key=`followup:${form.leadId}:${form.date}:${form.type}`;
    if(onceKeyActive(key))return alert("Processing... duplicate follow-up blocked");
    setSaving(true);
    setFollowups(fs=>[...fs.filter(f=>f.leadId!==form.leadId||f.outcome==="Completed"),{...form,id:`FU${Date.now()}`,smId:Number(form.smId),createdBy:isManager?"Salesman":"Management",createdAt:new Date().toISOString()}]);
    auditLog({event:"Created",source:"Follow-ups",recordType:"Follow-up",leadId:form.leadId});
    setShowAdd(false); setSaving(false);
  };
  const markDone=id=>setFollowups(fs=>fs.map(f=>f.id===id?{...f,outcome:"Completed"}:f));
  const combined=unifiedFollowups(leads,followups,salesmen);
  const categories=["Payment Pending","Quotation Approval Pending","Order Confirmation Pending","Customer Not Responding","Measurement Done but Order Not Closed","Advance Payment Pending","Channel Partner Pending Confirmation"];
  const updateReason=(leadId,reason)=>setLeads?.(ls=>ls.map(l=>l.id===leadId?{...l,followupReason:reason,updated:todayStr()}:l));
  const list=combined.filter(item=>filter==="all"||item.reason===filter).sort((a,b)=>(a.nextDate||"").localeCompare(b.nextDate||""));

  const tabs=[["all","All"],...categories.map(c=>[c,c])];

  return (
    <div>
      <SectionTitle action={!isManager&&<PrimaryBtn onClick={()=>setShowAdd(true)}>+ Log Follow-up</PrimaryBtn>}>Follow-Ups</SectionTitle>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:18}}>
        <StatKPI label="Total Follow-ups" value={combined.length} accent={T.sub} />
        <StatKPI label="Payment Pending" value={combined.filter(i=>i.reason.includes("Payment")).length} accent={T.sub} />
        <StatKPI label="Quotation Pending" value={combined.filter(i=>i.reason==="Quotation Approval Pending").length} accent={T.sub} />
        <StatKPI label="CP Pending" value={combined.filter(i=>i.reason==="Channel Partner Pending Confirmation").length} accent={T.sub} />
      </div>

      <div style={{display:"flex",gap:4,marginBottom:20,background:T.surf,borderRadius:12,padding:4,width:"100%",overflowX:"auto"}}>
        {tabs.map(([v,l])=>{
          const cnt=combined.filter(i=>v==="all"||i.reason===v).length;
          return (
            <button key={v} onClick={()=>setFilter(v)} style={{
              padding:"7px 13px",borderRadius:9,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600,transition:"all .15s",whiteSpace:"nowrap",
              background:filter===v?T.amber:"transparent",
              color:filter===v?"#0f172a":T.sub,
            }}>{l} <span style={{opacity:.7}}>({cnt})</span></button>
          );
        })}
      </div>

      <GlassCard style={{padding:0}}>
        <Table headers={["Customer","Contact","Project / Source","Salesman","Reason","Quotation","Pending"]}>
        {list.map(f=>{
          const over=f.nextDate<todayStr();
          return (
            <TR key={f.id}>
              <TD bold>{f.customer}<div style={{fontSize:11,color:T.muted}}>{f.leadId}</div></TD>
              <TD>{f.mobile||"-"}</TD>
              <TD>{f.project}<div style={{fontSize:11,color:T.muted}}>{f.source}</div></TD>
              <TD>{f.salesman}</TD>
              <TD>{canEditReason?<select value={f.reason} onChange={e=>updateReason(f.leadId,e.target.value)} style={{minWidth:190,padding:"6px 8px",fontSize:12}}>{categories.map(c=><option key={c}>{c}</option>)}</select>:<Pill label={f.reason} color={T.sub} />}</TD>
              <TD bold color={f.quoteAmount?T.green:T.muted}>{f.quoteAmount?inr(f.quoteAmount):"-"}</TD>
              <TD bold color={f.pending>0?T.red:T.muted}>{f.pending?inr(f.pending):"-"}</TD>
            </TR>
          );
        })}
        </Table>
        {list.length===0&&<div style={{textAlign:"center",padding:60,color:T.muted,fontSize:13}}>No follow-ups in this view</div>}
      </GlassCard>

      {showAdd&&(
        <Modal title="Log Follow-up" onClose={()=>setShowAdd(false)}>
          <Field label="Lead"><select value={form.leadId} onChange={e=>setForm(f=>({...f,leadId:e.target.value}))}>{leads.map(l=><option key={l.id} value={l.id}>{l.id}  {l.name}</option>)}</select></Field>
          <div style={{marginTop:12}}><Field label="Salesman"><select value={form.smId} onChange={e=>setForm(f=>({...f,smId:e.target.value}))}>{salesmen.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></Field></div>
          <FormRow cols={2} ><Field label="Date"><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} /></Field><Field label="Time"><input type="time" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))} /></Field></FormRow>
          <FormRow cols={2}><Field label="Type"><select value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>{["Call","WhatsApp","Visit","Email"].map(s=><option key={s}>{s}</option>)}</select></Field><Field label="Outcome"><select value={form.outcome} onChange={e=>setForm(f=>({...f,outcome:e.target.value}))}>{["Pending","Completed","No Response"].map(s=><option key={s}>{s}</option>)}</select></Field></FormRow>
          <Field label="Notes"><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={2} /></Field>
          <div style={{marginTop:12}}><Field label="Next Follow-up Date"><input type="date" value={form.next} onChange={e=>setForm(f=>({...f,next:e.target.value}))} /></Field></div>
          <div style={{display:"flex",gap:10,marginTop:20}}><PrimaryBtn onClick={save} disabled={saving}>{saving?"Processing...":"Save Follow-up"}</PrimaryBtn><GhostBtn onClick={()=>setShowAdd(false)}>Cancel</GhostBtn></div>
        </Modal>
      )}
    </div>
  );
}

// 
// MODULE: ORDERS
// 
function Orders({ orders, setOrders, workOrders, setWorkOrders, payments, isManager }) {
  const [fSt,setFSt]=useState("All");
  const [showDetail,setShowDetail]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [saving,setSaving]=useState(false);
  const blank={customer:"",mobile:"",products:[{name:PRODUCTS[0],size:"",qty:1,unitPrice:0,total:0}],discount:0,final:0,advance:0,balance:0,delivery:"",install:false,installer:"",status:"Pending",leadId:""};
  const [form,setForm]=useState(blank);

  const filtered=orders.filter(o=>fSt==="All"||o.status===fSt);

  const calcFinal=f=>{ const sub=f.products.reduce((s,p)=>s+p.total,0); return {sub,final:sub-f.discount,balance:sub-f.discount-f.advance}; };

  const save=()=>{
    if(saving)return;
    if(!form.customer)return alert("Customer name required");
    const mobileError=validateMobile(form.mobile);
    if(mobileError)return alert(mobileError);
    const normalizedMobile=normalizeMobile(form.mobile);
    const existing=orders.find(o=>normalizeMobile(o.mobile)===normalizedMobile);
    if(existing){ duplicateAudit("Order Management",`Order already exists for ${normalizedMobile}`,{existingOrder:existing.id}); return alert(`Customer already exists in Order ${existing.id}`); }
    const key=`order:${normalizedMobile}:${form.products.map(p=>p.name).join("|")}`;
    if(onceKeyActive(key))return alert("Processing... duplicate order blocked");
    setSaving(true);
    const {final,balance}=calcFinal(form);
    const id=`ORD-${String(orders.length+1).padStart(3,"0")}`;
    setOrders(os=>[...os,{...form,mobile:normalizedMobile,id,final,balance,created:todayStr(),createdAt:new Date().toISOString(),createdBy:"Management"}]);
    auditLog({event:"Created",source:"Order Management",recordType:"Order",recordId:id,mobile:normalizedMobile});
    setShowAdd(false);setForm(blank);
    setSaving(false);
  };

  const makeWO=order=>{ setWorkOrders(ws=>[...ws,{id:`WO-${String(workOrders.length+1).padStart(3,"0")}`,orderId:order.id,product:order.products[0]?.name||"Custom",qty:order.products[0]?.qty||1,staff:"To Assign",start:todayStr(),end:order.delivery||todayStr(),status:"Pending",bom:BOM_MAP[order.products[0]?.name]||[]}]); alert("Work Order created "); };

  const getPaid=oid=>payments.filter(p=>p.orderId===oid).reduce((s,p)=>s+p.amount,0);

  const statusList=["All","Pending","In Production","Ready","Delivered","Installed","Closed"];

  return (
    <div>
      <SectionTitle action={!isManager&&<PrimaryBtn onClick={()=>setShowAdd(true)}>+ New Order</PrimaryBtn>}>Order Management</SectionTitle>

      {/* Status Filter Pills */}
      <div style={{display:"flex",gap:6,marginBottom:20,flexWrap:"wrap"}}>
        {statusList.map(s=>{
          const cnt=orders.filter(o=>s==="All"||o.status===s).length;
          return <button key={s} onClick={()=>setFSt(s)} style={{padding:"6px 14px",borderRadius:99,border:`1px solid ${fSt===s?T.amber:"rgba(255,255,255,.1)"}`,background:fSt===s?`${T.amber}22`:"transparent",color:fSt===s?T.amber:T.sub,cursor:"pointer",fontSize:12,fontWeight:500,transition:"all .15s"}}>{s} ({cnt})</button>
        })}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {filtered.map(o=>{
          const paid=getPaid(o.id);
          const over=o.delivery&&o.delivery<todayStr()&&!["Delivered","Installed","Closed"].includes(o.status);
          return (
            <GlassCard key={o.id} style={{borderColor:over?"rgba(251,146,60,.3)":T.border}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:16,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap"}}>
                    <span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,color:T.amber,fontSize:15}}>{o.id}</span>
                    <StatusPill s={o.status} />
                    {o.leadId&&<span style={{fontSize:11,color:T.muted}}> {o.leadId}</span>}
                    {over&&<Pill label="DELIVERY OVERDUE" color={T.orange} />}
                  </div>
                  <div style={{fontWeight:600,fontSize:15,color:T.text,marginBottom:4}}>{o.customer}</div>
                  <div style={{fontSize:12,color:T.muted}}> {o.mobile}</div>
                  <div style={{fontSize:12,color:T.sub,marginTop:4}}>{o.products.map(p=>`${p.name} ${p.qty}`).join(", ")}</div>
                  {o.delivery&&<div style={{fontSize:11,color:T.muted,marginTop:3}}> Delivery: {o.delivery}{o.install&&` |  Installation: ${o.installer||"TBD"}`}</div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:20,fontWeight:700,color:T.text}}>{inr(o.final)}</div>
                  <div style={{fontSize:12,color:T.green,marginTop:4}}>Paid: {inr(paid)}</div>
                  <div style={{fontSize:12,color:T.red}}>Balance: {inr(o.final-paid)}</div>
                </div>
              </div>
              <Divider />
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <GhostBtn small onClick={()=>setShowDetail(o)}>View Details</GhostBtn>
                {!isManager&&<>
                  <select value={o.status} onChange={e=>setOrders(os=>os.map(oo=>oo.id===o.id?{...oo,status:e.target.value}:oo))} style={{padding:"6px 10px",borderRadius:9,fontSize:12,width:"auto",minWidth:130}}>
                    {["Pending","In Production","Ready","Delivered","Installed","Closed"].map(s=><option key={s}>{s}</option>)}
                  </select>
                  {!workOrders.find(w=>w.orderId===o.id)&&<PrimaryBtn small onClick={()=>makeWO(o)} color={T.teal}>+ Work Order</PrimaryBtn>}
                </>}
                <button onClick={()=>alert(` Invoice for ${o.id}\n\nIn production: PDF generated with:\n Company letterhead & GSTIN\n Order details & line items\n Payment terms & balance due\n Digital signature field\n\nPowered by jsPDF + backend service`)} style={{padding:"6px 12px",background:`${T.green}15`,border:`1px solid ${T.green}30`,borderRadius:9,color:T.green,cursor:"pointer",fontSize:12}}> Invoice PDF</button>
                <button onClick={()=>alert(` Quotation for ${o.id}\n\nIn production: formal quotation PDF with validity, terms and conditions`)} style={{padding:"6px 12px",background:`${T.blue}15`,border:`1px solid ${T.blue}30`,borderRadius:9,color:T.blue,cursor:"pointer",fontSize:12}}> Quotation</button>
              </div>
            </GlassCard>
          );
        })}
        {filtered.length===0&&<div style={{textAlign:"center",padding:60,color:T.muted}}>No orders found</div>}
      </div>

      {showDetail&&(
        <Modal title={`Order Details  ${showDetail.id}`} onClose={()=>setShowDetail(null)} wide>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {[["Customer",showDetail.customer],["Mobile",showDetail.mobile],["Delivery",showDetail.delivery||""],["Installation",showDetail.install?`Yes | ${showDetail.installer}`:"No"],["Status",showDetail.status],["Created",showDetail.created]].map(([k,v])=>(
              <div key={k} style={{background:"rgba(255,255,255,.04)",borderRadius:10,padding:"10px 14px"}}>

            <span style={{color:T.muted}}>Total: <b style={{color:T.text,fontFamily:"'Space Grotesk',sans-serif",fontSize:16}}>{inr(showDetail.final)}</b></span>
          </div>
          <div style={{fontSize:13,fontWeight:600,color:T.text,margin:"16px 0 10px"}}>Payment History</div>
          {payments.filter(p=>p.orderId===showDetail.id).map(p=>(
            <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${T.border}`,fontSize:13}}>
              <span style={{color:T.sub}}>{p.date} | {p.mode}</span>
              <span style={{fontWeight:600,color:T.green}}>{inr(p.amount)}</span>
            </div>
          ))}
          {payments.filter(p=>p.orderId===showDetail.id).length===0&&<div style={{fontSize:13,color:T.muted}}>No payments recorded yet.</div>}
        </Modal>

            <Field label="Mobile"><input value={form.mobile} onChange={e=>setForm(f=>({...f,mobile:e.target.value}))} /></Field>
          </FormRow>
          <FormRow cols={2}>
            <Field label="Delivery Date"><input type="date" value={form.delivery} onChange={e=>setForm(f=>({...f,delivery:e.target.value}))} /></Field>
            <div style={{display:"flex",alignItems:"center",gap:8,paddingTop:22}}><input type="checkbox" id="inst" checked={form.install} onChange={e=>setForm(f=>({...f,install:e.target.checked}))} style={{width:"auto"}} /><label htmlFor="inst" style={{textTransform:"none",letterSpacing:0}}>Installation Required</label></div>
          </FormRow>
          <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:10}}>Products</div>
          {form.products.map((p,i)=>(
            <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:10,marginBottom:8}}>
              <select value={p.name} onChange={e=>setForm(f=>({...f,products:f.products.map((pp,ii)=>ii===i?{...pp,name:e.target.value}:pp)}))}>{PRODUCTS.map(pr=><option key={pr}>{pr}</option>)}</select>
              <input placeholder="Size" value={p.size} onChange={e=>setForm(f=>({...f,products:f.products.map((pp,ii)=>ii===i?{...pp,size:e.target.value}:pp)}))} />
              <input type="number" placeholder="Qty" value={p.qty} onChange={e=>{ const q=Number(e.target.value);setForm(f=>({...f,products:f.products.map((pp,ii)=>ii===i?{...pp,qty:q,total:q*pp.unitPrice}:pp)})); }} />
              <input type="number" placeholder="Unit Price " value={p.unitPrice} onChange={e=>{ const up=Number(e.target.value);setForm(f=>({...f,products:f.products.map((pp,ii)=>ii===i?{...pp,unitPrice:up,total:up*pp.qty}:pp)})); }} />
            </div>

          <button onClick={()=>setForm(f=>({...f,products:[...f.products,{name:PRODUCTS[0],size:"",qty:1,unitPrice:0,total:0}]}))} style={{background:"none",border:"none",color:T.teal,cursor:"pointer",fontSize:12,padding:"4px 0",fontFamily:"inherit"}}>+ Add Product Line</button>

          <div style={{background:"rgba(245,158,11,.07)",border:"1px solid rgba(245,158,11,.2)",borderRadius:10,padding:"10px 14px",fontSize:12,color:T.sub}}>

          </div>
          <div style={{display:"flex",gap:10,marginTop:20}}><PrimaryBtn onClick={save} disabled={saving}>{saving?"Processing...":"Save Order"}</PrimaryBtn><GhostBtn onClick={()=>setShowAdd(false)}>Cancel</GhostBtn></div>
        </Modal>
      )}

  );
}

function Production({ workOrders, setWorkOrders, inventory, setInventory, orders, isManager }) {
  const [showAdd,setShowAdd]=useState(false);
  const [showBOM,setShowBOM]=useState(null);
  const [saving,setSaving]=useState(false);
  const blank={orderId:"",product:PRODUCTS[0],qty:1,staff:"",start:todayStr(),end:"",status:"Pending"};
  const [form,setForm]=useState(blank);

  const save=()=>{
    if(saving)return;
    if(!form.orderId)return alert("Order reference is required");
    if(workOrders.some(w=>w.orderId===form.orderId&&w.product===form.product&&w.status!=="Cancelled"))return alert("Production work order already exists for this order/product");
    if(onceKeyActive(`workorder:${form.orderId}:${form.product}`))return alert("Processing... duplicate work order blocked");
    setSaving(true);
    const id=`WO-${String(workOrders.length+1).padStart(3,"0")}`;
    setWorkOrders(ws=>[...ws,{...form,id,qty:Number(form.qty),bom:BOM_MAP[form.product]||[],createdAt:new Date().toISOString(),createdBy:"Management"}]);
    auditLog({event:"Created",source:"Production",recordType:"Work Order",recordId:id,orderId:form.orderId});
    setShowAdd(false); setSaving(false);
  };

  const complete=wo=>{
    const bomItems=BOM_MAP[wo.product]||[];
    for(const b of bomItems){ const item=inventory.rawMaterials.find(r=>r.id===b.id); if(item&&item.stock<b.qty*wo.qty)return alert(`Insufficient: ${item.name} needs ${b.qty*wo.qty} but only ${item.stock} available!`); }
    setInventory(inv=>({...inv,rawMaterials:inv.rawMaterials.map(r=>{ const b=bomItems.find(bb=>bb.id===r.id); return b?{...r,stock:r.stock-b.qty*wo.qty}:r; }),finishedGoods:inv.finishedGoods.map(fg=>fg.name.toLowerCase().includes(wo.product.toLowerCase().split(" ")[0].toLowerCase())?{...fg,qty:fg.qty+wo.qty}:fg)}));
    setWorkOrders(ws=>ws.map(w=>w.id===wo.id?{...w,status:"Completed"}:w));
    alert(`WO ${wo.id} completed! Raw materials deducted `);
  };

  const statusOrder=["Pending","In Progress","QC Check","Completed"];

  return (
    <div>
      <SectionTitle action={!isManager&&<PrimaryBtn onClick={()=>setShowAdd(true)}>+ New Work Order</PrimaryBtn>}>Production / Work Orders</SectionTitle>

      {/* BOM Quick Ref */}
      <GlassCard style={{marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:12}}> Bill of Materials  Quick Reference</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {PRODUCTS.map(p=>(
            <button key={p} onClick={()=>setShowBOM(p)} style={{padding:"6px 12px",background:"rgba(20,184,166,.1)",border:"1px solid rgba(20,184,166,.2)",borderRadius:8,color:T.teal,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}> {p.split(" ").slice(0,2).join(" ")}</button>
          ))}
        </div>
      </GlassCard>

      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {workOrders.map(wo=>{
          const order=orders.find(o=>o.id===wo.orderId);
          const over=wo.end&&wo.end<todayStr()&&wo.status!=="Completed";
          const bomItems=wo.bom||[];
          return (
            <GlassCard key={wo.id} style={{borderColor:over?"rgba(248,113,113,.3)":T.border}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:16,flexWrap:"wrap"}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap"}}>
                    <span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,color:T.teal,fontSize:15}}>{wo.id}</span>
                    <StatusPill s={wo.status} />
                    {over&&<Pill label="OVERDUE" color={T.red} />}
                    {wo.orderId&&<span style={{fontSize:11,color:T.muted}}> {wo.orderId}{order?` (${order.customer})`:""}</span>}
                  </div>
                  <div style={{fontWeight:600,fontSize:15,color:T.text,marginBottom:4}}>{wo.product} <span style={{color:T.amber}}>{wo.qty} units</span></div>
                  <div style={{fontSize:12,color:T.muted}}> {wo.staff||"Unassigned"} | Start: {wo.start} | Due: {wo.end||""}</div>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                  {!isManager&&<>
                    <select value={wo.status} onChange={e=>setWorkOrders(ws=>ws.map(w=>w.id===wo.id?{...w,status:e.target.value}:w))} style={{padding:"6px 10px",borderRadius:9,fontSize:12,width:"auto"}}>
                      {statusOrder.map(s=><option key={s}>{s}</option>)}
                    </select>
                    {wo.status!=="Completed"&&<SuccessBtn small onClick={()=>complete(wo)}> Complete</SuccessBtn>}
                  </>}
                </div>
              </div>
              {bomItems.length>0&&(
                <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${T.border}`}}>
                  <div style={{fontSize:11,color:T.muted,marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:.4}}>Materials Required</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {bomItems.map((b,i)=>{
                      const item=inventory.rawMaterials.find(r=>r.id===b.id);
                      const needed=b.qty*wo.qty;
                      const ok=item&&item.stock>=needed;
                      return <span key={i} style={{padding:"4px 10px",borderRadius:6,fontSize:11,background:ok?"rgba(34,197,94,.1)":"rgba(248,113,113,.1)",border:`1px solid ${ok?"rgba(34,197,94,.2)":"rgba(248,113,113,.2)"}`,color:ok?T.green:T.red}}>{item?.name||`Item ${b.id}`}: {needed}{b.u} {ok?"":""}</span>;
                    })}
                  </div>
                </div>
              )}
            </GlassCard>
          );
        })}
        {workOrders.length===0&&<div style={{textAlign:"center",padding:60,color:T.muted}}>No work orders yet</div>}
      </div>

      {showBOM&&(
        <Modal title={`BOM - ${showBOM}`} onClose={()=>setShowBOM(null)}>
          <p style={{fontSize:13,color:T.muted,marginBottom:16}}>Raw materials per unit of <b style={{color:T.text}}>{showBOM}</b>:</p>
          {(BOM_MAP[showBOM]||[]).map((b,i)=>{ const item=inventory.rawMaterials.find(r=>r.id===b.id); return (
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${T.border}`,fontSize:13}}>
              <span style={{color:T.sub}}>{item?.name||`Item ${b.id}`}</span>
              <span style={{fontWeight:600,color:T.amber}}>{b.qty} {b.u}</span>
            </div>
          );})}
          {(!BOM_MAP[showBOM]||BOM_MAP[showBOM].length===0)&&<div style={{color:T.muted,fontSize:13}}>No BOM defined.</div>}
        </Modal>
      )}

      {showAdd&&(
        <Modal title="New Work Order" onClose={()=>setShowAdd(false)}>
          <Field label="Linked Order ID"><input value={form.orderId} onChange={e=>setForm(f=>({...f,orderId:e.target.value}))} placeholder="ORD-XXX" /></Field>
          <div style={{marginTop:12}}><Field label="Product"><select value={form.product} onChange={e=>setForm(f=>({...f,product:e.target.value}))}>{PRODUCTS.map(p=><option key={p}>{p}</option>)}</select></Field></div>
          <FormRow cols={2} ><Field label="Quantity"><input type="number" value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))} /></Field><Field label="Assigned Staff"><input value={form.staff} onChange={e=>setForm(f=>({...f,staff:e.target.value}))} placeholder="Staff name(s)" /></Field></FormRow>
          <FormRow cols={2}><Field label="Start Date"><input type="date" value={form.start} onChange={e=>setForm(f=>({...f,start:e.target.value}))} /></Field><Field label="Expected End"><input type="date" value={form.end} onChange={e=>setForm(f=>({...f,end:e.target.value}))} /></Field></FormRow>
          <div style={{display:"flex",gap:10,marginTop:20}}><PrimaryBtn onClick={save} disabled={saving}>{saving?"Processing...":"Create Work Order"}</PrimaryBtn><GhostBtn onClick={()=>setShowAdd(false)}>Cancel</GhostBtn></div>
        </Modal>
      )}
    </div>
  );
}
