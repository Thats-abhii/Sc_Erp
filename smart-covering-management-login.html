// MODULE: INVENTORY
// 
function ProductionBoard({ orders, setOrders, partners, setPartners, smartInventory, setSmartInventory, canManageApproval=true, canManageInstallation=true }) {
  const [view,setView]=useState("mesh");
  const [bucket,setBucket]=useState("ongoing");
  const [selectedOngoing,setSelectedOngoing]=useState([]);
  const [selectedCompleted,setSelectedCompleted]=useState([]);
  const [installOrder,setInstallOrder]=useState(null);
  const [installDate,setInstallDate]=useState("");
  const [materialPreview,setMaterialPreview]=useState(null);
  const stages=["Approval","Cutting","Assembling","Quality Check","Completed"];
  const stageRank=stage=>Math.max(0,stages.indexOf(stageMap(stage)));
  const stageMap=stage=>{
    if(stage==="Order Done")return "Cutting";
    if(stage==="Assembly")return "Assembling";
    if(stage==="Quality Check & Finishing")return "Quality Check";
    if(stage==="Packing & Dispatch"||stage==="Installation Pending")return "Completed";
    return stages.includes(stage)?stage:"Approval";
  };
  const productMatches=(name,type)=>{
    const n=(name||"").toLowerCase();
    return type==="mesh"?n.includes("mesh"):n.includes("blind");
  };
  const productTypeMatches=(product,type)=>{
    const t=(product.type||"").toLowerCase();
    if(t)return type==="mesh"?t.includes("mesh"):t.includes("blind");
    return productMatches(product.name,type);
  };
  const allJobs=orders.filter(order=>!order.productionArchived).flatMap(order=>(order.products||[]).map((product,idx)=>{
    const jobId=`${order.id}-${idx}`;
    const itemState=order.itemStates?.[jobId]||{};
    return {
    id:jobId,
    orderId:order.id,
    customer:order.customer,
    product:product.name,
    productType:product.type,
    size:product.size,
    heightFt:product.heightFt,
    widthFt:product.widthFt,
    sqft:product.sqft,
    actualSqft:product.actualSqft,
    chargeableSqft:product.chargeableSqft,
    billingSqft:product.billingSqft,
    color:product.color,
    material:product.material,
    code:product.code,
    window:product.window,
    qty:product.qty,
    inventoryConsumption:order.inventoryConsumptions?.[`${order.id}-${idx}`],
    delivery:order.delivery,
    installationDate:order.installationDate,
    completedAt:order.completedAt,
    completedDate:order.completedDate,
    orderStatus:order.status,
    orderStage:order.productionStage,
    itemStage:itemState.stage,
    approval:itemState.approval||order.approval||"Approved",
    hold:itemState.hold??false,
    type:productTypeMatches(product,"mesh")?"mesh":"blind",
  };
  })).filter(job=>job.type===view);
  const syncPartnerOrder=(orderId,patch)=>{
    setPartners?.(ps=>ps.map(p=>({
      ...p,
      requests:(p.requests||[]).map(r=>r.orderId===orderId?{...r,...patch}:r)
    })));
  };
  const seedStage=job=>{
    if(job.itemStage)return job.itemStage;
    if(job.orderStage)return job.orderStage;
    if(job.orderStatus==="Completed"||job.orderStatus==="Installed"||job.orderStatus==="Closed")return "Completed";
    if(job.orderStatus==="Installation Pending")return "Completed";
    if(job.approval==="Pending")return "Approval";
    return "Cutting";
  };
  const [stageByJob,setStageByJob]=useState({});
  const jobs=allJobs.map(job=>({...job,stage:stageMap(stageByJob[job.id]||seedStage(job)),hold:!!job.hold}));
  const isInstallationCompletedJob=job=>job.itemStage==="Installation Completed"||job.orderStage==="Installation Completed";
  const isCompletedJob=job=>job.stage==="Completed"&&!isInstallationCompletedJob(job);
  const ongoingJobs=jobs.filter(job=>!isCompletedJob(job)&&!isInstallationCompletedJob(job));
  const completedJobs=jobs.filter(isCompletedJob);
  const installationCompletedJobs=jobs.filter(isInstallationCompletedJob);
  const moveJob=(id,stage)=>setStageByJob(map=>({...map,[id]:stage}));
  const updateItemState=(job,patch)=>{
    setOrders?.(os=>os.map(o=>{
      if(o.id!==job.orderId)return o;
      const itemStates={...(o.itemStates||{})};
      const current=itemStates[job.id]||{};
      itemStates[job.id]={...current,...patch,updatedAt:new Date().toISOString()};
      const productIds=(o.products||[]).map((_,idx)=>`${o.id}-${idx}`);
      const allCompleted=productIds.length>0&&productIds.every(id=>stageMap(itemStates[id]?.stage||o.productionStage||"Approval")==="Completed");
      const anyHold=productIds.some(id=>itemStates[id]?.hold);
      const status=anyHold?"On Hold":allCompleted?"Completed":(patch.status==="Approval Pending"?"Approval Pending":"In Production");
      return {...o,itemStates,status,productionStage:allCompleted?"Completed":o.productionStage};
    }));
  };
  const markJobsInstallationCompleted=(selectedJobs)=>{
    const stamp=new Date().toISOString();
    const date=todayStr();
    const selectedByOrder=selectedJobs.reduce((map,job)=>{
      if(!map[job.orderId])map[job.orderId]=new Set();
      map[job.orderId].add(job.id);
      return map;
    },{});
    setOrders?.(os=>os.map(o=>{
      const selectedIds=selectedByOrder[o.id];
      if(!selectedIds)return o;
      const itemStates={...(o.itemStates||{})};
      selectedIds.forEach(id=>{
        itemStates[id]={...(itemStates[id]||{}),stage:"Installation Completed",status:"Installed",installationCompletedDate:date,installationCompletedAt:stamp,updatedAt:stamp};
      });
      const productIds=(o.products||[]).map((_,idx)=>`${o.id}-${idx}`);
      const allInstalled=productIds.length>0&&productIds.every(id=>itemStates[id]?.stage==="Installation Completed");
      return {
        ...o,
        itemStates,
        ...(allInstalled?{status:"Installed",productionStage:"Installation Completed",installationCompletedDate:date,installationCompletedAt:stamp}:{})
      };
    }));
    selectedJobs.forEach(job=>syncPartnerOrder(job.orderId,{status:"Installed",stage:"Installation Completed",trackStatus:"Installation Completed",installationCompletedDate:date,installationCompletedAt:stamp}));
  };
  const setOrderStage=(job,stage,extra={})=>{
    const nextStatus=stage==="Completed"?"Completed":stage==="Approval"?"Approval Pending":"In Production";
    updateItemState(job,{stage,status:nextStatus,...extra});
    syncPartnerOrder(job.orderId,{stage,status:nextStatus,trackStatus:productionTrackLabel(stage,nextStatus,extra.installationDate||job.installationDate),...extra});
    moveJob(job.id,stage);
  };
  const approveJob=job=>{
    if(!job.inventoryConsumption){
      const preview=buildMaterialPreview(job);
      if(preview?.kind==="mesh"&&preview.ok)applyConsumption(preview,false);
    }
    updateItemState(job,{approval:"Approved",stage:"Cutting",status:"In Production",hold:false});
    syncPartnerOrder(job.orderId,{approval:"Approved",stage:"Cutting",status:"In Production",trackStatus:"Cutting"});
    moveJob(job.id,"Cutting");
  };
  const toggleHold=job=>{
    if(!canManageApproval)return alert("Hold can be managed by Management only.");
    if(job.approval==="Pending")return;
    const next=!job.hold;
    const status=next?"On Hold":"In Production";
    updateItemState(job,{hold:next,status});
    syncPartnerOrder(job.orderId,{hold:next,status,trackStatus:next?"On Hold":productionTrackLabel(job.stage,"In Production",job.installationDate)});
  };
  const moveStage=job=>stage=>{
    if(stage==="Approval"){
      if(!canManageApproval)return alert("Approval and Hold can be managed by Management only.");
      return job.approval==="Pending"?approveJob(job):null;
    }
    if(job.approval==="Pending")return alert("Management approval is required before production can start.");
    if(job.hold)return alert("This production order is on Hold. Turn Hold off to continue.");
    if(stageRank(stage)<=stageRank(job.stage))return alert("Production can move forward only. Previous stages cannot be selected.");
    if(stage==="Cutting"&&!job.inventoryConsumption){
      const preview=buildMaterialPreview(job);
      if(preview?.kind==="mesh"&&preview.ok)applyConsumption(preview,false);
    }
    return setOrderStage(job,stage);
  };
  const openInstallDate=job=>{
    if(!canManageInstallation)return alert("Installation date can be managed by Management only.");
    setInstallOrder(job);
    setInstallDate(job.installationDate||todayStr());
  };
  const saveInstallDate=()=>{
    if(!installOrder||!installDate)return alert("Please select installation date");
    setOrderStage(installOrder,"Installation Pending",{installationDate:installDate});
    setInstallOrder(null);
  };
  const completeInstallation=job=>{
    if(!canManageInstallation)return alert("Installation completion can be managed by Management only.");
    if(!confirm("Move this order to Installation Completed bucket?"))return;
    markJobsInstallationCompleted([job]);
    setBucket("installationCompleted");
  };
  const toggleOngoingSelection=job=>{
    setSelectedOngoing(ids=>ids.includes(job.id)?ids.filter(id=>id!==job.id):[...ids,job.id]);
  };
  const moveOngoingToCompleted=()=>{
    const selectedJobs=ongoingJobs.filter(job=>selectedOngoing.includes(job.id));
    const selectedOrders=[...new Set(selectedJobs.map(job=>job.orderId))];
    if(!selectedOrders.length)return alert("Select ongoing production orders to move to completed");
    if(!confirm("Move selected ongoing orders to Completed?"))return;
    setOrders?.(os=>os.map(o=>selectedOrders.includes(o.id)?{...o,productionStage:"Completed",status:"Completed",completedDate:todayStr(),completedAt:new Date().toISOString()}:o));
    selectedOrders.forEach(orderId=>syncPartnerOrder(orderId,{status:"Completed",stage:"Completed",trackStatus:"Completed",completedDate:todayStr(),completedAt:new Date().toISOString()}));
    setSelectedOngoing([]);
    setBucket("completed");
  };
  const toggleCompletedSelection=job=>{
    setSelectedCompleted(ids=>ids.includes(job.id)?ids.filter(id=>id!==job.id):[...ids,job.id]);
  };
  const moveCompletedOut=()=>{
    if(!canManageInstallation)return alert("Installation completion can be managed by Management only.");
    const selectedJobs=completedJobs.filter(job=>selectedCompleted.includes(job.id));
    if(!selectedJobs.length)return alert("Select completed production orders to move to Installation Completed");
    if(!confirm("Move selected completed orders to Installation Completed?"))return;
    markJobsInstallationCompleted(selectedJobs);
    setSelectedCompleted([]);
    setBucket("installationCompleted");
  };
  const stageColor={
    "Approval":T.green,
    "Order Done":T.blue,
    "Cutting":T.orange,
    "Assembling":T.purple,
    "Assembly":T.purple,
    "Quality Check":T.teal,
    "Quality Check & Finishing":T.teal,
    "Packing & Dispatch":T.green,
    "Installation Pending":T.purple,
    "Completed":T.green,
  };
  const requirementFt=job=>{
    const h=Number(job.heightFt||0);
    const w=Number(job.widthFt||0);
    const q=Number(job.qty||1);
    if(h>0&&w>0)return round2((h+w)*2*q);
    const sq=Number(job.sqft||String(job.size||"").replace(/[^0-9.]/g,"")||0);
    return round2(sq>0?Math.sqrt(sq)*4*q:12*q);
  };
  const mergeCutPieces=lengths=>{
    const map={};
    (lengths||[]).forEach(l=>{
      const size=round2(ftFromSize(l.size));
      if(size>0)map[size]=(map[size]||0)+Number(l.qty||0);
    });
    return Object.entries(map).map(([size,qty])=>({size:fmtFt(size),qty})).filter(l=>l.qty>0).sort((a,b)=>ftFromSize(a.size)-ftFromSize(b.size));
  };
  const pickMeshMaterial=job=>{
    const list=smartInventory?.meshComponents||[];
    const text=`${job.color||""} ${job.material||""} ${job.product||""}`.toLowerCase();
    const profile=list.filter(i=>(i.item||"").toLowerCase().includes("aluminium profile"));
    return profile.find(i=>text.includes("white")&&(i.item||"").toLowerCase().includes("white"))
      || profile.find(i=>text.includes("brown")&&(i.item||"").toLowerCase().includes("brown"))
      || profile.find(i=>text.includes("black")&&(i.item||"").toLowerCase().includes("black"))
      || profile[0]
      || list[0];
  };
  const buildMaterialPreview=job=>{
    if(job.type!=="mesh")return {job,kind:"blind",message:"Blind production is tracked in inventory; automatic fabric-roll cutting rules are pending setup.",requiredFt:0,ok:true,materialName:job.material,code:job.code};
    const material=pickMeshMaterial(job);
    if(!material)return {job,kind:"mesh",ok:false,message:"No mesh material found in inventory."};
    let remaining=requirementFt(job);
    const originalRequired=remaining;
    const cutUses=[];
    const cutRemainders=[];
    const availableCuts=(material.lengths||[]).flatMap(l=>Array.from({length:Number(l.qty||0)},()=>ftFromSize(l.size))).filter(n=>n>0).sort((a,b)=>b-a);
    while(remaining>0.05){
      const fit=availableCuts.findIndex(n=>n<=remaining+0.05);
      if(fit<0)break;
      const size=availableCuts.splice(fit,1)[0];
      cutUses.push(size);
      remaining=round2(remaining-size);
    }
    if(remaining>0.05){
      const largerIndex=availableCuts.findLastIndex(n=>n>remaining+0.05);
      if(largerIndex>=0){
        const size=availableCuts.splice(largerIndex,1)[0];
        cutUses.push(size);
        const leftover=round2(size-remaining);
        if(leftover>=2)cutRemainders.push(leftover);
        remaining=0;
      }
    }
    const fullLength=Number(material.fullLengthFt||12);
    const fullUsed=remaining>0.05?Math.ceil(remaining/fullLength):0;
    const fullNeededFt=round2(fullUsed*fullLength);
    const leftoverFt=round2(Math.max(fullNeededFt-remaining,0));
    const reusableCutFt=leftoverFt>=2?leftoverFt:0;
    const wasteFt=leftoverFt>0&&leftoverFt<2?leftoverFt:0;
    const ok=Number(material.full||0)>=fullUsed;
    const cutGrouped=mergeCutPieces(cutUses.map(size=>({size:fmtFt(size),qty:1})));
    const afterFull=Number(material.full||0)-fullUsed;
    const cutRemainderGrouped=mergeCutPieces(cutRemainders.map(size=>({size:fmtFt(size),qty:1})));
    const afterCuts=mergeCutPieces([...(material.lengths||[]),...cutGrouped.map(l=>({size:l.size,qty:-l.qty})),...cutRemainderGrouped,...(reusableCutFt?[{size:fmtFt(reusableCutFt),qty:1}]:[])]);
    return {job,kind:"mesh",ok,materialId:material.id,materialName:material.item,code:job.code||material.code,requiredFt:round2(originalRequired),cutGrouped,cutRemainders:cutRemainderGrouped,fullUsed,fullLength,leftoverFt,reusableCutFt,wasteFt,afterFull,afterCuts,message:ok?"Ready to consume inventory":"Insufficient full-length stock for this order."};
  };
  const openMaterialPreview=job=>setMaterialPreview(buildMaterialPreview(job));
  const updateOrderConsumption=(job,consumption,remove=false)=>{
    setOrders?.(os=>os.map(o=>{
      if(o.id!==job.orderId)return o;
      const inventoryConsumptions={...(o.inventoryConsumptions||{})};
      if(remove)delete inventoryConsumptions[job.id]; else inventoryConsumptions[job.id]=consumption;
      return {...o,inventoryConsumptions};
    }));
  };
  const applyConsumption=(preview,closeModal=true)=>{
    if(!preview?.ok)return alert(preview?.message||"Inventory cannot be consumed");
    if(preview.kind!=="mesh"){ if(closeModal)setMaterialPreview(null); return; }
    setSmartInventory?.(si=>{
      const next={...si};
      let remainingFull=0;
      next.meshComponents=(si.meshComponents||[]).map(item=>{
        if(item.id!==preview.materialId)return item;
        let lengths=mergeCutPieces(item.lengths||[]);
        preview.cutGrouped.forEach(use=>{
          let left=Number(use.qty||0);
          lengths=lengths.map(l=>{
            if(ftFromSize(l.size)!==ftFromSize(use.size)||left<=0)return l;
            const take=Math.min(Number(l.qty||0),left);
            left-=take;
            return {...l,qty:Number(l.qty||0)-take};
          }).filter(l=>Number(l.qty||0)>0);
        });
        if(preview.cutRemainders?.length)lengths=mergeCutPieces([...lengths,...preview.cutRemainders]);
        if(preview.reusableCutFt)lengths=mergeCutPieces([...lengths,{size:fmtFt(preview.reusableCutFt),qty:1}]);
        remainingFull=Number(item.full||0)-Number(preview.fullUsed||0);
        return {...item,full:remainingFull,lengths,cut:lengths.reduce((s,l)=>s+Number(l.qty||0),0)};
      });
      next.movements=[{
        id:Date.now(),
        kind:"mesh",
        date:todayStr(),
        orderId:preview.job.orderId,
        material:preview.materialName,
        usedFt:preview.requiredFt,
        cutUsed:preview.cutGrouped,
        cutRemainders:preview.cutRemainders,
        fullUsed:preview.fullUsed,
        fullLength:preview.fullLength,
        remainingFull,
        reusableCutFt:preview.reusableCutFt,
        wasteFt:preview.wasteFt,
        text:`${preview.materialName} consumed for ${preview.job.orderId}: ${fmtFt(preview.requiredFt)} used`
      },...(si.movements||[])].slice(0,20);
      return next;
    });
    updateOrderConsumption(preview.job,{...preview,consumedAt:new Date().toISOString()});
    if(closeModal)setMaterialPreview(null);
  };
  const confirmConsumption=preview=>applyConsumption(preview,true);
  const restoreConsumption=job=>{
    const c=job.inventoryConsumption;
    if(!c||!confirm("Restore consumed inventory for this production order?"))return;
    setSmartInventory?.(si=>{
      const next={...si};
      next.meshComponents=(si.meshComponents||[]).map(item=>{
        if(item.id!==c.materialId)return item;
        let lengths=mergeCutPieces([...(item.lengths||[]),...(c.cutGrouped||[])]);
        (c.cutRemainders||[]).forEach(rem=>{
          let removed=Number(rem.qty||0);
          lengths=lengths.map(l=>{
            if(ftFromSize(l.size)!==ftFromSize(rem.size)||removed<=0)return l;
            const take=Math.min(Number(l.qty||0),removed);
            removed-=take;
            return {...l,qty:Number(l.qty||0)-take};
          }).filter(l=>Number(l.qty||0)>0);
        });
        if(Number(c.reusableCutFt||0)>0){
          let removed=false;
          lengths=lengths.map(l=>{
            if(!removed&&ftFromSize(l.size)===ftFromSize(fmtFt(c.reusableCutFt))){
              removed=true;
              return {...l,qty:Number(l.qty||0)-1};
            }
            return l;
          }).filter(l=>Number(l.qty||0)>0);
        }
        return {...item,full:Number(item.full||0)+Number(c.fullUsed||0),lengths,cut:lengths.reduce((s,l)=>s+Number(l.qty||0),0)};
      });
      next.movements=[{id:Date.now(),kind:"mesh",date:todayStr(),text:`Restored inventory for ${job.orderId}`},...(si.movements||[])].slice(0,20);
      return next;
    });
    updateOrderConsumption(job,null,true);
  };

  return (
    <div>
      <SectionTitle>Production</SectionTitle>
      <div style={{display:"flex",gap:10,alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",marginBottom:18}}>
        <div style={{display:"inline-flex",gap:4,padding:4,border:`1px solid ${T.border}`,borderRadius:8,background:T.card}}>
          {[["ongoing","Ongoing"],["completed","Completed"],["installationCompleted","Installation Completed"]].map(([id,label])=>(
            <button key={id} onClick={()=>setBucket(id)} style={{border:0,borderRadius:6,padding:"9px 16px",fontSize:12,fontWeight:700,cursor:"pointer",background:bucket===id?T.green:"transparent",color:bucket===id?"#fff":T.sub}}>
              {label}
            </button>
          ))}
        </div>
        <div style={{display:"inline-flex",gap:4,padding:4,border:`1px solid ${T.border}`,borderRadius:8,background:T.card}}>
          {[["mesh","Mesh"],["blind","Blind"]].map(([id,label])=>(
            <button key={id} onClick={()=>setView(id)} style={{border:0,borderRadius:6,padding:"9px 16px",fontSize:12,fontWeight:700,cursor:"pointer",background:view===id?T.blue:"transparent",color:view===id?"#fff":T.sub}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {bucket==="ongoing"&&<GlassCard style={{padding:0,overflow:"hidden"}}>
        <div style={{padding:"14px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
          <div><b style={{color:T.text}}>Ongoing Production</b><div style={{fontSize:12,color:T.muted,marginTop:3}}>Select orders here and move them to Completed when production is done.</div></div>
          {canManageApproval&&<PrimaryBtn small color={T.green} onClick={moveOngoingToCompleted}>Move Selected To Completed</PrimaryBtn>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:`72px 1.2fr repeat(${stages.length},minmax(120px,1fr))`,borderBottom:`1px solid ${T.border}`,background:T.cardHi}}>
          <div style={{padding:"12px 14px",fontSize:12,fontWeight:700,color:T.sub}}>{canManageApproval?"Select":"Update"}</div>
          <div style={{padding:"12px 14px",fontSize:12,fontWeight:700,color:T.sub}}>Order</div>
          {stages.map(stage=><div key={stage} style={{padding:"12px 10px",fontSize:12,fontWeight:700,color:stageColor[stage],borderLeft:`1px solid ${T.border}`}}>{stage}</div>)}
        </div>
        {ongoingJobs.map(job=>(
          <div key={job.id} style={{display:"grid",gridTemplateColumns:`72px 1.2fr repeat(${stages.length},minmax(120px,1fr))`,borderBottom:`1px solid ${T.border}`}}>
            <div style={{padding:14,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {canManageApproval?<input type="checkbox" checked={selectedOngoing.includes(job.id)} onChange={()=>toggleOngoingSelection(job)} />:<span style={{fontSize:12,color:T.muted}}>Stage</span>}
            </div>
            <div style={{padding:14}}>
              <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,color:T.text,fontSize:14}}>{job.orderId}</div>
              <div style={{fontSize:12,color:T.sub,marginTop:3}}>{job.customer}</div>
              <div style={{fontSize:12,color:T.muted,marginTop:3}}>{job.product} | {job.size} | Qty {job.qty}</div>
              <div style={{fontSize:11,color:T.muted,marginTop:5}}>Dispatch target: {job.delivery||"Not set"}</div>
              <div style={{fontSize:11,color:T.muted,marginTop:3}}>Installation: {job.installationDate||"Not set"}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                <GhostBtn small onClick={()=>openMaterialPreview(job)}>{job.inventoryConsumption?"View Materials":"Preview Materials"}</GhostBtn>
                {canManageApproval&&job.inventoryConsumption&&<DangerBtn small onClick={()=>restoreConsumption(job)}>Restore Stock</DangerBtn>}
              </div>
            </div>
            {stages.map(stage=>{
              const pendingApproval=stage==="Approval"&&job.approval==="Pending";
              const approvalDone=stage==="Approval"&&job.approval!=="Pending";
              const holdOn=stage==="Approval"&&approvalDone&&job.hold;
              const approvalColor=holdOn?T.red:(approvalDone?T.green:T.red);
              const active=job.stage===stage;
              const color=stage==="Approval"?approvalColor:stageColor[stage];
              const done=stageRank(job.stage)>stageRank(stage);
              const blocked=job.hold&&stage!=="Approval";
              return (
                <button key={stage} disabled={stage==="Approval"&&!canManageApproval} onClick={()=>stage==="Approval"?(approvalDone?toggleHold(job):approveJob(job)):moveStage(job)(stage)} style={{minHeight:92,border:0,borderLeft:`1px solid ${T.border}`,background:active||approvalDone||done?`${color}12`:"transparent",cursor:(blocked||stage==="Approval"&&!canManageApproval)?"not-allowed":"pointer",padding:10,textAlign:"left",opacity:(blocked||stage==="Approval"&&!canManageApproval)?0.72:1}}>
                  <div style={{width:16,height:16,borderRadius:"50%",border:`2px solid ${color}`,background:active||approvalDone||done?color:"#fff",marginBottom:8}} />
                  <div style={{fontSize:11,fontWeight:700,color:active||approvalDone||done?color:T.muted}}>{stage==="Approval"?(approvalDone?(canManageApproval?(holdOn?"Hold ON":"Hold OFF"):"Approval Done"):pendingApproval?(canManageApproval?"Approve":"Approval Pending"):"Approval"):done?"Done":active?"Current Stage":"Move Forward"}</div>
                  {stage==="Completed"&&active&&<div onClick={e=>e.stopPropagation()} style={{display:"grid",gap:6,marginTop:8}}>
                    {canManageInstallation&&<SuccessBtn small onClick={()=>completeInstallation(job)}>Move Completed</SuccessBtn>}
                  </div>}
                </button>
              );
            })}
          </div>
        ))}
        {ongoingJobs.length===0&&<div style={{padding:50,textAlign:"center",color:T.muted,fontSize:13}}>No ongoing {view==="mesh"?"mesh":"blind"} production orders available.</div>}
      </GlassCard>}
      {bucket==="completed"&&<GlassCard style={{padding:0}}>
        <div style={{padding:"14px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
          <div><b style={{color:T.text}}>Completed</b><div style={{fontSize:12,color:T.muted,marginTop:3}}>Select completed production orders and move them after installation is completed.</div></div>
          {canManageInstallation&&<PrimaryBtn small color={T.green} onClick={moveCompletedOut}>Move To Installation Completed</PrimaryBtn>}
        </div>
        <Table headers={["Select","Order","Customer","Product","Size","Installation","Completed"]}>
          {completedJobs.map(job=>(
            <TR key={`done-${job.id}`}>
              <TD>{canManageInstallation?<input type="checkbox" checked={selectedCompleted.includes(job.id)} onChange={()=>toggleCompletedSelection(job)} />:<span style={{fontSize:12,color:T.muted}}>Locked</span>}</TD>
              <TD mono>{job.orderId}</TD>
              <TD bold>{job.customer}</TD>
              <TD>{job.product}</TD>
              <TD>{job.size}</TD>
              <TD>{job.installationDate||"Not set"}</TD>
              <TD><Pill label="Completed" color={T.green} /></TD>
            </TR>
          ))}
        </Table>
        {completedJobs.length===0&&<div style={{padding:32,textAlign:"center",fontSize:13,color:T.muted}}>No completed {view==="mesh"?"mesh":"blind"} production orders.</div>}
      </GlassCard>}
      {bucket==="installationCompleted"&&<GlassCard style={{padding:0}}>
        <div style={{padding:"14px 16px",borderBottom:`1px solid ${T.border}`}}>
          <div><b style={{color:T.text}}>Installation Completed</b><div style={{fontSize:12,color:T.muted,marginTop:3}}>Orders where production and installation are both completed.</div></div>
        </div>
        <Table headers={["Order","Customer","Product","Size","Installation Date","Completed Date","Status"]}>
          {installationCompletedJobs.map(job=>(
            <TR key={`installed-${job.id}`}>
              <TD mono>{job.orderId}</TD>
              <TD bold>{job.customer}</TD>
              <TD>{job.product}</TD>
              <TD>{job.size}</TD>
              <TD>{job.installationDate||"Not set"}</TD>
              <TD>{job.completedDate||job.installationCompletedDate||todayStr()}</TD>
              <TD><Pill label="Installation Completed" color={T.green} /></TD>
            </TR>
          ))}
        </Table>
        {installationCompletedJobs.length===0&&<div style={{padding:32,textAlign:"center",fontSize:13,color:T.muted}}>No installation completed {view==="mesh"?"mesh":"blind"} orders.</div>}
      </GlassCard>}
      {installOrder&&<Modal title={`Set Installation Date - ${installOrder.orderId}`} onClose={()=>setInstallOrder(null)}>
        <div style={{background:T.cardHi,border:`1px solid ${T.border}`,borderRadius:8,padding:12,marginBottom:14,fontSize:13,color:T.sub}}>
          <b style={{color:T.text}}>{installOrder.customer}</b> | {installOrder.product} | {installOrder.size}
        </div>
        <Field label="Installation Date"><input type="date" value={installDate} onChange={e=>setInstallDate(e.target.value)} /></Field>
        <div style={{display:"flex",gap:10,marginTop:18}}><PrimaryBtn onClick={saveInstallDate}>Save Date</PrimaryBtn><GhostBtn onClick={()=>setInstallOrder(null)}>Cancel</GhostBtn></div>
      </Modal>}
      {materialPreview&&<Modal title={`Material Consumption Preview - ${materialPreview.job.orderId}`} onClose={()=>setMaterialPreview(null)} wide>
        <div style={{background:T.cardHi,border:`1px solid ${T.border}`,borderRadius:8,padding:12,marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:800,color:T.muted,marginBottom:8}}>Order Material Details From Management Approved Quotation</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,fontSize:13}}>
            <div><b style={{color:T.text}}>Window:</b> {materialPreview.job.window||materialPreview.job.id}</div>
            <div><b style={{color:T.text}}>Color:</b> {materialPreview.job.color||"-"}</div>
            <div><b style={{color:T.text}}>Material:</b> {materialPreview.job.material||materialPreview.materialName||"-"}</div>
            <div><b style={{color:T.text}}>Password Code:</b> <Code>{materialPreview.job.code||materialPreview.code||"-"}</Code></div>
            <div><b style={{color:T.text}}>Actual SQFT:</b> {materialPreview.job.actualSqft||materialPreview.job.sqft||0}</div>
            <div><b style={{color:T.text}}>Billing SQFT:</b> {materialPreview.job.billingSqft||materialPreview.job.chargeableSqft||materialPreview.job.sqft||0}</div>
          </div>
        </div>
        {materialPreview.kind==="mesh"?<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:14}}>
            <div style={{background:T.cardHi,border:`1px solid ${T.border}`,borderRadius:8,padding:12}}><div style={{fontSize:11,fontWeight:800,color:T.muted}}>Requirement</div><div style={{fontSize:22,fontWeight:900,color:T.text}}>{fmtFt(materialPreview.requiredFt)}</div></div>
            <div style={{background:T.cardHi,border:`1px solid ${T.border}`,borderRadius:8,padding:12}}><div style={{fontSize:11,fontWeight:800,color:T.muted}}>Material</div><div style={{fontSize:16,fontWeight:900,color:T.blue}}>{materialPreview.materialName}</div></div>
            <div style={{background:T.cardHi,border:`1px solid ${T.border}`,borderRadius:8,padding:12}}><div style={{fontSize:11,fontWeight:800,color:T.muted}}>Status</div><div style={{fontSize:16,fontWeight:900,color:materialPreview.ok?T.green:T.red}}>{materialPreview.message}</div></div>
          </div>
          <Table headers={["Suggested Consumption","Quantity","After Production"]}>
            <TR><TD bold>Cut Pieces</TD><TD>{materialPreview.cutGrouped.length?materialPreview.cutGrouped.map(l=>`${l.size} x ${l.qty}`).join(", "):"No suitable cut piece"}</TD><TD>{materialPreview.afterCuts?.length?materialPreview.afterCuts.map(l=>`${l.size}:${l.qty}`).join(", "):"No cut pieces left"}</TD></TR>
            <TR><TD bold>Full Lengths</TD><TD>{materialPreview.fullUsed} full length(s) of {materialPreview.fullLength} ft</TD><TD>{materialPreview.afterFull} full length(s) remaining</TD></TR>
            <TR><TD bold>Cut Piece Leftover Saved</TD><TD>{materialPreview.cutRemainders?.length?materialPreview.cutRemainders.map(l=>`${l.size} x ${l.qty}`).join(", "):"None"}</TD><TD>{materialPreview.cutRemainders?.length?"Saved back into Cut Piece Inventory":"No larger cut piece trimmed"}</TD></TR>
            <TR><TD bold>Reusable Cut Added</TD><TD>{materialPreview.reusableCutFt?fmtFt(materialPreview.reusableCutFt):"None"}</TD><TD>{materialPreview.reusableCutFt?"Saved into Cut Piece Inventory":"Below reusable size"}</TD></TR>
            <TR><TD bold>Waste / Scrap</TD><TD>{materialPreview.wasteFt?fmtFt(materialPreview.wasteFt):"No waste"}</TD><TD>Leftover below 2 ft is treated as scrap</TD></TR>
          </Table>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:18}}>
            <GhostBtn onClick={()=>setMaterialPreview(null)}>Close</GhostBtn>
            {canManageApproval&&!materialPreview.job.inventoryConsumption&&<SuccessBtn onClick={()=>confirmConsumption(materialPreview)}>Confirm And Consume Stock</SuccessBtn>}
          </div>
        </>:<div style={{fontSize:13,color:T.sub,display:"grid",gap:8}}><div>{materialPreview.message}</div><div><b style={{color:T.text}}>Fabric / Roll:</b> {materialPreview.job.material||materialPreview.materialName||"-"} | <b style={{color:T.text}}>Code:</b> <Code>{materialPreview.job.code||materialPreview.code||"-"}</Code></div></div>}
      </Modal>}
    </div>
  );
}

function BillingSession({ orders, setOrders, payments=[], setPayments, bills, setBills, leads=[], setLeads, partners=[], setPartners }) {
  const [filter,setFilter]=useState("billable");
  const [billOrder,setBillOrder]=useState(null);
  const [payOrder,setPayOrder]=useState(null);
  const [savingBill,setSavingBill]=useState(false);
  const [exportFrom,setExportFrom]=useState(todayStr().slice(0,7)+"-01");
  const [exportTo,setExportTo]=useState(todayStr());
  const [billForm,setBillForm]=useState({invoiceNo:"",date:todayStr(),customerGstin:"",customerAddress:"",place:"Karnataka",hsn:"",notes:"",taxType:"Intra-State",cgstRate:9,sgstRate:9,igstRate:0});
  const [payForm,setPayForm]=useState({paid:""});
  const billGstinError=gstin=>{
    const raw=String(gstin||"").trim().toUpperCase();
    if(!raw)return "";
    if(raw.length!==15)return "Customer GSTIN must be exactly 15 characters";
    if(!/^\d{2}[A-Z]{5}\d{4}[A-Z][A-Z\d]Z[A-Z\d]$/.test(raw))return "GSTIN format should be like 29ABCDE1234F1Z5";
    return "";
  };
  const applyCustomerGstin=value=>{
    const gstin=String(value||"").toUpperCase();
    const stateCode=gstin.slice(0,2);
    setBillForm(f=>({
      ...f,
      customerGstin:gstin,
      ...(gstin.startsWith("29")?{taxType:"Intra-State",place:"Karnataka",igstRate:0,cgstRate:f.cgstRate||9,sgstRate:f.sgstRate||9}:{}),
      ...(/^\d{2}$/.test(stateCode)&&stateCode!=="29"?{taxType:"Inter-State",place:"Inter-State",cgstRate:0,sgstRate:0,igstRate:f.igstRate||18}:{})
    }));
  };
  const billFor=orderId=>bills.find(b=>b.orderId===orderId);
  const paidFor=o=>paidForOrder(o,payments);
  const billableOrders=orders.filter(o=>Number(o.final||0)>0);
  const shown=billableOrders.filter(o=>{ const b=billFor(o.id); return filter==="billable"?!b:filter==="billed"?b?.type==="GST Bill":filter==="cash"?b?.type==="Cash No Bill":true; });
  const totals=billableOrders.reduce((acc,o)=>{ const b=billFor(o.id); acc.total+=Number(o.final||0); if(b?.type==="GST Bill")acc.billed+=Number(o.final||0); if(b?.type==="Cash No Bill")acc.cash+=Number(o.final||0); if(!b)acc.pending+=Number(o.final||0); return acc; },{total:0,billed:0,cash:0,pending:0});
  const openBill=order=>{
    setBillOrder(order);
    setBillForm({invoiceNo:`SC/${new Date().getFullYear()}/${String(bills.length+1).padStart(4,"0")}`,date:todayStr(),customerGstin:"",customerAddress:"",place:"Karnataka",hsn:"",notes:"",taxType:"Intra-State",cgstRate:9,sgstRate:9,igstRate:0});
  };
  const saveBill=()=>{
    if(savingBill)return;
    if(!billOrder)return;
    if(bills.some(b=>b.orderId===billOrder.id&&b.type==="GST Bill"))return alert("Bill already generated for this order");
    if(onceKeyActive(`bill:${billOrder.id}:gst`))return alert("Processing... duplicate bill blocked");
    const gstError=billGstinError(billForm.customerGstin);
    if(gstError)return alert(gstError);
    const tax=billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm);
    if(tax.taxType!=="Inter-State"&&tax.cgstRate+tax.sgstRate>18)return alert("CGST + SGST cannot exceed 18%");
    if(tax.taxType!=="Inter-State"&&tax.cgstRate!==tax.sgstRate)return alert("CGST and SGST must be equal");
    if(tax.taxType==="Inter-State"&&tax.igstRate>18)return alert("IGST cannot exceed 18%");
    setSavingBill(true);
    const record={...billForm,id:`BILL${Date.now()}`,orderId:billOrder.id,type:"GST Bill",amount:tax.final,taxType:tax.taxType,cgstRate:tax.cgstRate,sgstRate:tax.sgstRate,igstRate:tax.igstRate,gstRate:tax.gstRate,gstAmount:tax.gstAmount,cgst:tax.cgst,sgst:tax.sgst,igst:tax.igst,created:todayStr()};
    setBills(bs=>[...bs.filter(b=>b.orderId!==billOrder.id),record]);
    auditLog({event:"Created",source:"Billing",recordType:"GST Bill",recordId:record.id,orderId:billOrder.id});
    openBillPdf(billOrder,record);
    setBillOrder(null);
    setSavingBill(false);
  };
  const markCash=order=>{
    if(!confirm(`Mark ${order.id} as Cash / No Bill?`))return;
    if(bills.some(b=>b.orderId===order.id&&b.type==="Cash No Bill"))return alert("Cash / No Bill record already exists for this order");
    if(onceKeyActive(`bill:${order.id}:cash`))return alert("Processing... duplicate cash billing blocked");
    setBills(bs=>[...bs.filter(b=>b.orderId!==order.id),{id:`CASH${Date.now()}`,orderId:order.id,type:"Cash No Bill",amount:Number(order.final||0),created:todayStr(),notes:"Cash work without GST bill"}]);
  };
  const openPaymentEdit=order=>{
    setPayOrder(order);
    setPayForm({paid:String(Number(order.advance||0))});
  };
  const savePaymentEdit=()=>{
    if(!payOrder)return;
    const paid=Number(payForm.paid||0);
    const total=Number(payOrder.final||0);
    if(paid<0)return alert("Paid amount cannot be negative");
    if(paid>total)return alert("Paid amount cannot be more than order value");
    const balance=Math.max(total-paid,0);
    setOrders(os=>os.map(o=>o.id===payOrder.id?{...o,advance:paid,balance}:o));
    setPayments?.(ps=>{
      const existing=ps.find(p=>p.orderId===payOrder.id);
      if(paid<=0)return ps.filter(p=>p.orderId!==payOrder.id);
      if(existing)return ps.map(p=>p.orderId===payOrder.id?{...p,amount:paid,date:todayStr(),mode:p.mode||"Payment",notes:"Updated from billing"}:p);
      return [...ps,{id:`PAY${Date.now()}`,orderId:payOrder.id,date:todayStr(),amount:paid,mode:"Payment",notes:"Added from billing"}];
    });
    const status=paid<=0?"No Paid":paid>=total?"Fully Paid":"Partially Paid";
    setLeads?.(ls=>ls.map(l=>l.id===payOrder.leadId?{...l,paymentMarked:true,paymentStatus:status,paymentPaid:paid,paymentBalance:balance,updated:todayStr(),updatedAt:new Date().toISOString()}:l));
    setPartners?.(ps=>ps.map(p=>({...p,requests:(p.requests||[]).map(r=>r.orderId===payOrder.id||r.leadId===payOrder.leadId?{...r,paid,balance,status:paid>0?"Payment Updated":"Payment Pending"}:r)})));
    setPayOrder(null);
  };
  const exportBillingCsv=()=>{
    const rows=billableOrders
      .filter(o=>inDateRange(o.created||billFor(o.id)?.created,exportFrom,exportTo))
      .map(o=>{
        const bill=billFor(o.id);
        const isGstBill=bill?.type==="GST Bill";
        const isCash=bill?.type==="Cash No Bill";
        const totals=isGstBill?billTaxDetails({...o,advance:paidFor(o)},bill):billTotals({...o,advance:paidFor(o)});
        const lineRows=(o.products||[]).map((p,i)=>[
          `${i+1}. ${p.name||""}`,
          p.window?`Window: ${p.window}`:"",
          p.size?`Size: ${p.size}`:"",
          p.qty?`Qty: ${p.qty}`:"",
          p.unitPrice?`Rate: ${p.unitPrice}`:"",
          p.total?`Amount: ${p.total}`:"",
          p.color?`Color: ${p.color}`:"",
          p.material?`Material: ${p.material}`:"",
          p.code?`Code: ${p.code}`:""
        ].filter(Boolean).join(" | "));
        return {
          Order_Date:o.created||"",
          Bill_Record_Date:bill?.created||"",
          Invoice_Date:bill?.date||"",
          Order_ID:o.id,
          Lead_ID:o.leadId||"",
          Customer_Name:o.customer||"",
          Mobile:o.mobile||"",
          Product_Summary:(o.products||[]).map(p=>p.name).join(" | "),
          Product_Line_Details:lineRows.join(" || "),
          Gross_Amount_Without_Discount:totals.gross,
          Discount_Amount:totals.discount,
          Amount_Without_GST_Taxable:totals.taxable,
          Tax_Type:isGstBill?totals.taxType:"",
          CGST_Percent:isGstBill?totals.cgstRate:0,
          SGST_Percent:isGstBill?totals.sgstRate:0,
          IGST_Percent:isGstBill?totals.igstRate:0,
          Total_GST_Percent:isGstBill?totals.gstRate:0,
          GST_Percent:isGstBill?totals.gstRate:0,
          CGST:isGstBill?totals.cgst:0,
          SGST:isGstBill?totals.sgst:0,
          IGST:isGstBill?totals.igst:0,
          GST_Amount:isGstBill?totals.gstAmount:0,
          Amount_With_GST:isGstBill?totals.final:0,
          Cash_No_Bill_Amount:isCash?totals.final:0,
          Final_Order_Amount:totals.final,
          Paid_Amount:totals.paid,
          Balance_Amount:totals.balance,
          Payment_Status:totals.paid<=0?"No Paid":totals.balance>0?"Partially Paid":"Fully Paid",
          Billing_Status:bill?.type||"Pending",
          Invoice_No:bill?.invoiceNo||"",
          Customer_GSTIN:bill?.customerGstin||"",
          Customer_Address:bill?.customerAddress||"",
          Place_Of_Supply:bill?.place||"",
          HSN_SAC:bill?.hsn||"",
          Order_Status:o.status||"",
          Production_Stage:o.productionStage||"",
          Installation_Required:o.install?"Yes":"No",
          Installer:o.installer||"",
          Delivery_Date:o.delivery||"",
          Cash_Details:isCash?(bill?.notes||"Cash work without GST bill"):"",
          Internal_Notes:bill?.notes||"",
          Created_At:o.createdAt||""
        };
      });
    downloadCsv(`smartcovering-billing-${exportFrom||"all"}-to-${exportTo||"all"}.csv`,rows);
  };
  return (
    <div>
      <SectionTitle>Billing Session</SectionTitle>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:18}}>
        <StatKPI label="Total Order Value" value={inr(totals.total)} accent={T.blue} />
        <StatKPI label="GST Bills Generated" value={inr(totals.billed)} accent={T.green} />
        <StatKPI label="Cash / No Bill" value={inr(totals.cash)} accent={T.orange} />
        <StatKPI label="Pending Billing" value={inr(totals.pending)} accent={T.red} />
      </div>
      <GlassCard style={{marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"center",flexWrap:"wrap"}}>
          <div><div style={{fontWeight:800,color:T.text}}>Invoice control</div><div style={{fontSize:12,color:T.muted,marginTop:3}}>Generate GST bill PDFs, or mark selected work as cash/no-bill for internal tracking.</div></div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{[["billable","Pending"],["billed","Billed"],["cash","Cash / No Bill"],["all","All"]].map(([id,label])=><button key={id} onClick={()=>setFilter(id)} style={{border:`1px solid ${filter===id?T.blue:T.border}`,background:filter===id?T.blue:T.cardHi,color:filter===id?"#fff":T.sub,borderRadius:7,padding:"8px 12px",fontSize:12,fontWeight:800,cursor:"pointer"}}>{label}</button>)}</div>
        </div>
      </GlassCard>
      <GlassCard style={{marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"end",flexWrap:"wrap"}}>
          <div><div style={{fontWeight:800,color:T.text}}>Export billing CSV</div><div style={{fontSize:12,color:T.muted,marginTop:3}}>Choose date range and download billing data for audit.</div></div>
          <div style={{display:"flex",gap:10,alignItems:"end",flexWrap:"wrap"}}>
            <Field label="From"><input type="date" value={exportFrom} onChange={e=>setExportFrom(e.target.value)} /></Field>
            <Field label="To"><input type="date" value={exportTo} onChange={e=>setExportTo(e.target.value)} /></Field>
            <PrimaryBtn onClick={exportBillingCsv}>Export CSV</PrimaryBtn>
          </div>
        </div>
      </GlassCard>
      <GlassCard style={{padding:0}}>
        <Table headers={["Order","Customer","Products","Order Value","Paid","Balance","Payment","Billing Status","Action"]}>
          {shown.map(o=>{ const status=billFor(o.id); const t=billTotals({...o,advance:paidFor(o)}); return <TR key={o.id}><TD bold color={T.amber}>{o.id}<div style={{fontSize:11,color:T.muted}}>{o.created||""}</div></TD><TD bold>{o.customer}<div style={{fontSize:11,color:T.muted}}>{o.mobile}</div></TD><TD>{(o.products||[]).map(p=>p.name).join(", ")}</TD><TD bold color={T.green}>{inr(t.final)}</TD><TD color={T.teal} bold>{inr(t.paid)}</TD><TD color={t.balance>0?T.red:T.green} bold>{inr(t.balance)}</TD><TD><GhostBtn small onClick={()=>openPaymentEdit(o)}>Edit Payment</GhostBtn></TD><TD><Pill label={status?.type||"Pending"} color={status?.type==="GST Bill"?T.green:status?.type==="Cash No Bill"?T.orange:T.red} /></TD><TD><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{status?.type==="GST Bill"?<GhostBtn small onClick={()=>openBillPdf(o,status)}>Download PDF</GhostBtn>:<><PrimaryBtn small onClick={()=>openBill(o)}>Generate Bill</PrimaryBtn><GhostBtn small onClick={()=>markCash(o)}>Cash / No Bill</GhostBtn></>}</div></TD></TR>; })}
        </Table>
        {shown.length===0&&<div style={{padding:42,textAlign:"center",fontSize:13,color:T.muted}}>No orders in this billing view.</div>}
      </GlassCard>
      {billOrder&&<Modal title={`Generate Bill - ${billOrder.id}`} onClose={()=>setBillOrder(null)} wide>
        <div style={{background:T.cardHi,border:`1px solid ${T.border}`,borderRadius:8,padding:12,marginBottom:14,fontSize:13,color:T.sub}}>Order Value: <b style={{color:T.text}}>{inr(billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).final)}</b> | Paid: <b style={{color:T.green}}>{inr(paidFor(billOrder))}</b> | Balance: <b style={{color:T.red}}>{inr(billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).balance)}</b></div>
        <FormRow cols={3}><Field label="Invoice No"><input value={billForm.invoiceNo} onChange={e=>setBillForm(f=>({...f,invoiceNo:e.target.value}))} /></Field><Field label="Invoice Date"><input type="date" value={billForm.date} onChange={e=>setBillForm(f=>({...f,date:e.target.value}))} /></Field><Field label="Place of Supply"><input value={billForm.place} onChange={e=>setBillForm(f=>({...f,place:e.target.value}))} /></Field></FormRow>
        <FormRow cols={3}><Field label="Customer GSTIN"><input maxLength={15} value={billForm.customerGstin} onChange={e=>applyCustomerGstin(e.target.value)} placeholder="Optional for B2C" />{billGstinError(billForm.customerGstin)&&<div style={{fontSize:11,color:T.red,marginTop:4}}>{billGstinError(billForm.customerGstin)}</div>}</Field><Field label="HSN / SAC"><input value={billForm.hsn} onChange={e=>setBillForm(f=>({...f,hsn:e.target.value}))} placeholder="Enter applicable HSN/SAC" /></Field><Field label="Tax Type"><input disabled value={billForm.taxType||"Intra-State"} /></Field></FormRow>
        <FormRow cols={4}><Field label="CGST %"><input type="number" disabled={billForm.taxType==="Inter-State"} value={billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).cgstRate} onChange={e=>setBillForm(f=>({...f,cgstRate:e.target.value,sgstRate:e.target.value}))} /></Field><Field label="SGST %"><input type="number" disabled={billForm.taxType==="Inter-State"} value={billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).sgstRate} onChange={e=>setBillForm(f=>({...f,cgstRate:e.target.value,sgstRate:e.target.value}))} /></Field><Field label="IGST %"><input type="number" disabled={billForm.taxType!=="Inter-State"} value={billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).igstRate} onChange={e=>setBillForm(f=>({...f,igstRate:e.target.value}))} /></Field><Field label="Total GST %"><input disabled value={billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).gstRate} /></Field></FormRow>
        {(billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).cgstRate+billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).sgstRate>18||billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).igstRate>18)&&<div style={{fontSize:12,color:T.red,marginBottom:10}}>Total GST cannot exceed 18%.</div>}
        {billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).taxType!=="Inter-State"&&billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).cgstRate!==billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).sgstRate&&<div style={{fontSize:12,color:T.red,marginBottom:10}}>CGST and SGST must be equal.</div>}
        <div style={{background:T.cardHi,border:`1px solid ${T.border}`,borderRadius:8,padding:12,marginBottom:14,fontSize:13,color:T.sub}}>Taxable: <b style={{color:T.text}}>{inr(billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).taxable)}</b> | CGST: <b style={{color:T.green}}>{inr(billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).cgst)}</b> | SGST: <b style={{color:T.green}}>{inr(billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).sgst)}</b> | IGST: <b style={{color:T.green}}>{inr(billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).igst)}</b> | Total GST: <b style={{color:T.green}}>{inr(billTaxDetails({...billOrder,advance:paidFor(billOrder)},billForm).gstAmount)}</b></div>
        <Field label="Customer Address"><textarea rows={2} value={billForm.customerAddress} onChange={e=>setBillForm(f=>({...f,customerAddress:e.target.value}))} /></Field>
        <Field label="Internal Notes"><textarea rows={2} value={billForm.notes} onChange={e=>setBillForm(f=>({...f,notes:e.target.value}))} /></Field>
        <div style={{display:"flex",gap:10,marginTop:18}}><SuccessBtn onClick={saveBill} disabled={savingBill}>{savingBill?"Processing...":"Generate & Download PDF"}</SuccessBtn><GhostBtn onClick={()=>setBillOrder(null)}>Cancel</GhostBtn></div>
      </Modal>}
      {payOrder&&<Modal title={`Edit Payment - ${payOrder.id}`} onClose={()=>setPayOrder(null)}>
        <div style={{background:T.cardHi,border:`1px solid ${T.border}`,borderRadius:8,padding:12,marginBottom:14,fontSize:13,color:T.sub}}>
          Order Value: <b style={{color:T.text}}>{inr(payOrder.final)}</b> | Remaining after edit: <b style={{color:T.red}}>{inr(Math.max(Number(payOrder.final||0)-Number(payForm.paid||0),0))}</b>
        </div>
        <Field label="How much paid"><input type="number" value={payForm.paid} onChange={e=>setPayForm({paid:e.target.value})} /></Field>
        <div style={{display:"flex",gap:10,marginTop:18}}><SuccessBtn onClick={savePaymentEdit}>Update Payment</SuccessBtn><GhostBtn onClick={()=>setPayOrder(null)}>Cancel</GhostBtn></div>
      </Modal>}
    </div>
  );
}

function PurchaseSession({ purchases, setPurchases, expenses=[], setExpenses }) {
  const [filter,setFilter]=useState("all");
  const [showAdd,setShowAdd]=useState(false);
  const [editId,setEditId]=useState(null);
  const [exportFrom,setExportFrom]=useState(todayStr().slice(0,7)+"-01");
  const [exportTo,setExportTo]=useState(todayStr());
  const blank={date:todayStr(),vendor:"",vendorGstin:"",invoiceNo:"",invoiceDate:todayStr(),place:"Karnataka",category:"Raw Material",item:"",hsn:"",qty:1,unit:"pcs",taxable:"",cgstRate:9,sgstRate:9,igstRate:0,taxType:"Intra-State",paid:""};
  const [form,setForm]=useState(blank);
  const gstinError=gstin=>{
    const raw=String(gstin||"").trim().toUpperCase();
    if(!raw)return "";
    if(raw.length!==15)return "Vendor GSTIN must be exactly 15 characters";
    if(!/^\d{2}[A-Z]{5}\d{4}[A-Z][A-Z\d]Z[A-Z\d]$/.test(raw))return "GSTIN format should be like 29ABCDE1234F1Z5";
    return "";
  };
  const applyVendorGstin=value=>{
    const gstin=String(value||"").toUpperCase();
    const stateCode=gstin.slice(0,2);
    setForm(f=>({
      ...f,
      vendorGstin:gstin,
      ...(gstin.startsWith("29")?{taxType:"Intra-State",place:"Karnataka",igstRate:0,cgstRate:f.cgstRate||9,sgstRate:f.sgstRate||9}:{}),
      ...(/^\d{2}$/.test(stateCode)&&stateCode!=="29"?{taxType:"Inter-State",place:"Inter-State",cgstRate:0,sgstRate:0,igstRate:f.igstRate||18}:{})
    }));
  };
  const purchaseTotals=p=>{
    const taxable=Number(p.taxable||0);
    const isInter=p.taxType==="Inter-State";
    const cgstRate=isInter?0:Number(p.cgstRate ?? (p.gstRate?Number(p.gstRate)/2:9));
    const sgstRate=isInter?0:Number(p.sgstRate ?? (p.gstRate?Number(p.gstRate)/2:9));
    const igstRate=isInter?Number(p.igstRate ?? p.gstRate ?? 18):0;
    const gstRate=cgstRate+sgstRate+igstRate;
    const cgst=Math.round(taxable*cgstRate/100);
    const sgst=Math.round(taxable*sgstRate/100);
    const igst=Math.round(taxable*igstRate/100);
    const gstAmount=cgst+sgst+igst;
    const total=taxable+gstAmount;
    const paid=Number(p.paid||0);
    const balance=Math.max(total-paid,0);
    return {taxType:p.taxType||"Intra-State",taxable,gstRate,cgstRate,sgstRate,igstRate,gstAmount,cgst,sgst,igst,total,paid,balance};
  };
  const totals=purchases.reduce((acc,p)=>{ const t=purchaseTotals(p); acc.taxable+=t.taxable; acc.gst+=t.gstAmount; acc.total+=t.total; acc.paid+=t.paid; acc.balance+=t.balance; return acc; },{taxable:0,gst:0,total:0,paid:0,balance:0});
  const shown=purchases.filter(p=>{
    const t=purchaseTotals(p);
    if(filter==="all")return true;
    if(filter==="paid")return t.balance<=0;
    if(filter==="pending")return t.balance>0;
    return p.category==="Raw Material";
  });
  const save=()=>{
    if(!form.vendor.trim()||!form.invoiceNo.trim()||!form.item.trim()||!form.taxable)return alert("Vendor, invoice number, item and taxable amount are required");
    const gstError=gstinError(form.vendorGstin);
    if(gstError)return alert(gstError);
    const t=purchaseTotals(form);
    if(t.taxType!=="Inter-State"&&t.cgstRate+t.sgstRate>18)return alert("CGST + SGST cannot exceed 18%");
    if(t.taxType!=="Inter-State"&&t.cgstRate!==t.sgstRate)return alert("CGST and SGST must be equal");
    if(t.taxType==="Inter-State"&&t.igstRate>18)return alert("IGST cannot exceed 18%");
    const purchaseId=editId||`PUR${Date.now()}`;
    const payload={...form,id:purchaseId,category:"Raw Material",vendor:form.vendor.trim(),vendorGstin:form.vendorGstin.trim().toUpperCase(),invoiceNo:form.invoiceNo.trim(),item:form.item.trim(),taxable:Number(form.taxable||0),cgstRate:t.cgstRate,sgstRate:t.sgstRate,igstRate:t.igstRate,gstRate:t.gstRate,paid:Number(form.paid||0),updatedAt:new Date().toISOString()};
    const record=editId?payload:{createdAt:new Date().toISOString(),createdBy:"Management",...payload};
    const total=purchaseTotals(record).total;
    setPurchases(ps=>editId?ps.map(p=>p.id===editId?{...p,...record}:p):[record,...ps]);
    setExpenses?.(es=>{
      const expense={id:`EXP-${purchaseId}`,date:record.date||todayStr(),cat:"Raw Material",name:"Raw Material",amount:total,reason:record.item,desc:record.item,purchaseId,invoiceNo:record.invoiceNo,vendor:record.vendor,gstin:record.vendorGstin,gstAmount:purchaseTotals(record).gstAmount,taxable:purchaseTotals(record).taxable,amountWithGst:total,createdBy:"Purchase",createdAt:record.createdAt||new Date().toISOString()};
      return es.some(e=>e.purchaseId===purchaseId||e.id===expense.id)?es.map(e=>(e.purchaseId===purchaseId||e.id===expense.id)?{...e,...expense}:e):[expense,...es];
    });
    setForm(blank);
    setEditId(null);
    setShowAdd(false);
  };
  const openEdit=p=>{
    const merged={...blank,...p};
    const t=purchaseTotals(merged);
    setEditId(p.id);
    setForm({...merged,taxable:String(p.taxable||""),cgstRate:t.cgstRate,sgstRate:t.sgstRate,igstRate:t.igstRate,gstRate:t.gstRate,paid:String(p.paid||"")});
    setShowAdd(true);
  };
  const exportPurchasesCsv=()=>{
    const rows=purchases.filter(p=>inDateRange(p.invoiceDate||p.date,exportFrom,exportTo)).map(p=>{
      const t=purchaseTotals(p);
      return {
        Purchase_Date:p.date||"",
        Invoice_Date:p.invoiceDate||"",
        Purchase_ID:p.id||"",
        Vendor_Name:p.vendor||"",
        Vendor_GSTIN:p.vendorGstin||"",
        Supplier_Invoice_No:p.invoiceNo||"",
        Place_Of_Supply:p.place||"",
        Category:"Raw Material",
        Item_Description:p.item||"",
        HSN_SAC:p.hsn||"",
        Quantity:p.qty||"",
        Unit:p.unit||"",
        Tax_Type:p.taxType||"",
        Amount_Without_GST_Taxable:t.taxable,
        CGST_Percent:t.cgstRate,
        SGST_Percent:t.sgstRate,
        IGST_Percent:t.igstRate,
        Total_GST_Percent:t.gstRate,
        CGST:t.cgst,
        SGST:t.sgst,
        IGST:t.igst,
        Total_GST:t.gstAmount,
        Amount_With_GST:t.total,
        Paid_Amount:t.paid,
        Balance_Amount:t.balance,
        Payment_Status:t.balance<=0?"Paid":"Pending",
        Created_By:p.createdBy||"",
        Created_At:p.createdAt||"",
        Raw_Record:JSON.stringify(p)
      };
    });
    downloadCsv(`smartcovering-purchases-${exportFrom||"all"}-to-${exportTo||"all"}.csv`,rows);
  };
  return <div>
    <SectionTitle action={<PrimaryBtn onClick={()=>{setEditId(null);setForm(blank);setShowAdd(true);}}>+ Add Purchase</PrimaryBtn>}>Purchase</SectionTitle>
    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,marginBottom:18}}>
      <StatKPI label="Purchase Value" value={inr(totals.total)} sub="with GST" accent={T.blue} />
      <StatKPI label="Taxable Value" value={inr(totals.taxable)} sub="without GST" accent={T.teal} />
      <StatKPI label="Input GST" value={inr(totals.gst)} sub="CGST + SGST + IGST" accent={T.green} />
      <StatKPI label="Paid" value={inr(totals.paid)} accent={T.purple} />
      <StatKPI label="Balance" value={inr(totals.balance)} accent={T.red} />
    </div>
    <GlassCard style={{marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"center",flexWrap:"wrap"}}>
        <div><div style={{fontWeight:800,color:T.text}}>Purchase control</div><div style={{fontSize:12,color:T.muted,marginTop:3}}>Record raw material purchases with GST. Saved purchases also appear automatically in Expenses.</div></div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{[["all","All"],["pending","Pending"],["paid","Paid"],["Raw Material","Raw Material"]].map(([id,label])=><button key={id} onClick={()=>setFilter(id)} style={{border:`1px solid ${filter===id?T.blue:T.border}`,background:filter===id?T.blue:T.cardHi,color:filter===id?"#fff":T.sub,borderRadius:7,padding:"8px 12px",fontSize:12,fontWeight:800,cursor:"pointer"}}>{label}</button>)}</div>
      </div>
    </GlassCard>
    <GlassCard style={{marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"end",flexWrap:"wrap"}}>
        <div><div style={{fontWeight:800,color:T.text}}>Export purchase CSV</div><div style={{fontSize:12,color:T.muted,marginTop:3}}>Choose invoice date range and download purchase data for CA audit and GST input check.</div></div>
        <div style={{display:"flex",gap:10,alignItems:"end",flexWrap:"wrap"}}>
          <Field label="From"><input type="date" value={exportFrom} onChange={e=>setExportFrom(e.target.value)} /></Field>
          <Field label="To"><input type="date" value={exportTo} onChange={e=>setExportTo(e.target.value)} /></Field>
          <PrimaryBtn onClick={exportPurchasesCsv}>Export CSV</PrimaryBtn>
        </div>
      </div>
    </GlassCard>
    <GlassCard style={{padding:0}}>
      <Table headers={["Invoice","Vendor","Item","Taxable","GST","Total","Paid","Balance","Status","Action"]}>
        {shown.map(p=>{ const t=purchaseTotals(p); const gstBreakup=t.taxType==="Inter-State"?`IGST ${t.igstRate}%`:`CGST ${t.cgstRate}% + SGST ${t.sgstRate}%`; return <TR key={p.id}><TD bold color={T.blue}>{p.invoiceNo}<div style={{fontSize:11,color:T.muted}}>{p.invoiceDate||p.date}</div></TD><TD bold>{p.vendor}<div style={{fontSize:11,color:T.muted}}>{p.vendorGstin||"-"}</div></TD><TD>{p.item}<div style={{fontSize:11,color:T.muted}}>Raw Material | HSN {p.hsn||"-"}</div></TD><TD bold>{inr(t.taxable)}</TD><TD color={T.green} bold>{inr(t.gstAmount)}<div style={{fontSize:11,color:T.muted}}>{gstBreakup}</div></TD><TD bold color={T.blue}>{inr(t.total)}</TD><TD color={T.purple} bold>{inr(t.paid)}</TD><TD color={t.balance>0?T.red:T.green} bold>{inr(t.balance)}</TD><TD><Pill label={t.balance>0?"Pending":"Paid"} color={t.balance>0?T.red:T.green} /></TD><TD><EditBtn onClick={()=>openEdit(p)}>Edit</EditBtn></TD></TR>; })}
      </Table>
      {shown.length===0&&<div style={{padding:42,textAlign:"center",fontSize:13,color:T.muted}}>No purchase records in this view.</div>}
    </GlassCard>
    {showAdd&&<Modal title={editId?"Edit Purchase":"Add Purchase"} onClose={()=>{setShowAdd(false);setEditId(null);setForm(blank);}} wide>
      <FormRow cols={3}><Field label="Purchase Date"><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} /></Field><Field label="Invoice Date"><input type="date" value={form.invoiceDate} onChange={e=>setForm(f=>({...f,invoiceDate:e.target.value}))} /></Field><Field label="Supplier Invoice No *"><input value={form.invoiceNo} onChange={e=>setForm(f=>({...f,invoiceNo:e.target.value}))} /></Field></FormRow>
      <FormRow cols={3}><Field label="Vendor Name *"><input value={form.vendor} onChange={e=>setForm(f=>({...f,vendor:e.target.value}))} /></Field><Field label="Vendor GSTIN"><input maxLength={15} value={form.vendorGstin} onChange={e=>applyVendorGstin(e.target.value)} placeholder="29ABCDE1234F1Z5" />{gstinError(form.vendorGstin)&&<div style={{fontSize:11,color:T.red,marginTop:4}}>{gstinError(form.vendorGstin)}</div>}</Field><Field label="Place of Supply"><input value={form.place} onChange={e=>setForm(f=>({...f,place:e.target.value}))} /></Field></FormRow>
      <FormRow cols={4}><Field label="Category"><input disabled value="Raw Material" /></Field><Field label="Item / Description *"><input value={form.item} onChange={e=>setForm(f=>({...f,item:e.target.value}))} /></Field><Field label="HSN / SAC"><input value={form.hsn} onChange={e=>setForm(f=>({...f,hsn:e.target.value}))} /></Field><Field label="Tax Type"><input disabled value={form.taxType||"Intra-State"} /></Field></FormRow>
      <FormRow cols={5}><Field label="Qty"><input type="number" value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))} /></Field><Field label="Unit"><input value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value}))} /></Field><Field label="Taxable Amount *"><input type="number" value={form.taxable} onChange={e=>setForm(f=>({...f,taxable:e.target.value}))} /></Field><Field label="CGST %"><input type="number" disabled={form.taxType==="Inter-State"} value={purchaseTotals(form).cgstRate} onChange={e=>setForm(f=>({...f,cgstRate:e.target.value,sgstRate:e.target.value}))} /></Field><Field label="SGST %"><input type="number" disabled={form.taxType==="Inter-State"} value={purchaseTotals(form).sgstRate} onChange={e=>setForm(f=>({...f,cgstRate:e.target.value,sgstRate:e.target.value}))} /></Field></FormRow>
      <FormRow cols={3}><Field label="IGST %"><input type="number" disabled={form.taxType!=="Inter-State"} value={purchaseTotals(form).igstRate} onChange={e=>setForm(f=>({...f,igstRate:e.target.value}))} /></Field><Field label="Total GST %"><input disabled value={purchaseTotals(form).gstRate} /></Field><Field label="Paid Amount"><input type="number" value={form.paid} onChange={e=>setForm(f=>({...f,paid:e.target.value}))} /></Field></FormRow>
      {(purchaseTotals(form).cgstRate+purchaseTotals(form).sgstRate>18||purchaseTotals(form).igstRate>18)&&<div style={{fontSize:12,color:T.red,marginBottom:10}}>Total GST cannot exceed 18%.</div>}
      {purchaseTotals(form).taxType!=="Inter-State"&&purchaseTotals(form).cgstRate!==purchaseTotals(form).sgstRate&&<div style={{fontSize:12,color:T.red,marginBottom:10}}>CGST and SGST must be equal.</div>}
      <div style={{background:T.cardHi,border:`1px solid ${T.border}`,borderRadius:8,padding:12,marginBottom:14,fontSize:13,color:T.sub}}>Taxable: <b style={{color:T.text}}>{inr(purchaseTotals(form).taxable)}</b> | CGST: <b style={{color:T.green}}>{inr(purchaseTotals(form).cgst)}</b> | SGST: <b style={{color:T.green}}>{inr(purchaseTotals(form).sgst)}</b> | IGST: <b style={{color:T.green}}>{inr(purchaseTotals(form).igst)}</b> | Total GST: <b style={{color:T.green}}>{inr(purchaseTotals(form).gstAmount)}</b> | Total: <b style={{color:T.blue}}>{inr(purchaseTotals(form).total)}</b> | Balance: <b style={{color:purchaseTotals(form).balance>0?T.red:T.green}}>{inr(purchaseTotals(form).balance)}</b></div>
      <div style={{display:"flex",gap:10,marginTop:18}}><SuccessBtn onClick={save}>{editId?"Update Purchase":"Save Purchase"}</SuccessBtn><GhostBtn onClick={()=>{setShowAdd(false);setEditId(null);setForm(blank);}}>Cancel</GhostBtn></div>
    </Modal>}
  </div>;
}

function DailyExpenses({ expenses, setExpenses }) {
  const [showAdd,setShowAdd]=useState(false);
  const [editId,setEditId]=useState(null);
  const blank={date:todayStr(),name:"Raw Material",amount:"",reason:""};
  const [form,setForm]=useState(blank);
  const [exportFrom,setExportFrom]=useState(todayStr().slice(0,7)+"-01");
  const [exportTo,setExportTo]=useState(todayStr());
  const month=todayStr().slice(0,7);
  const mtd=expenses.filter(e=>e.date?.startsWith(month)).reduce((s,e)=>s+Number(e.amount||0),0);
  const today=expenses.filter(e=>e.date===todayStr()).reduce((s,e)=>s+Number(e.amount||0),0);
  const total=expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const save=()=>{
    if(!form.name.trim()||!form.amount)return alert("Expense name and amount are required");
    const payload={date:form.date||todayStr(),cat:form.name.trim(),desc:form.reason.trim()||form.name.trim(),name:form.name.trim(),amount:Number(form.amount||0),reason:form.reason.trim()};
    setExpenses(es=>editId?es.map(e=>e.id===editId?{...e,...payload}:e):[{id:`EXP${Date.now()}`,...payload},...es]);
    setForm(blank);
    setEditId(null);
    setShowAdd(false);
  };
  const openAdd=()=>{ setEditId(null); setForm(blank); setShowAdd(true); };
  const openEdit=e=>{
    setEditId(e.id);
    setForm({date:e.date||todayStr(),name:e.cat||e.name||"Other",amount:String(e.amount||""),reason:e.reason||e.desc||""});
    setShowAdd(true);
  };
  const exportExpensesCsv=()=>{
    const rows=expenses
      .filter(e=>inDateRange(e.date,exportFrom,exportTo))
      .map(e=>({
        Date:e.date||"",
        Expense_ID:e.id||"",
        Category:e.cat||e.name||"Other",
        Expense_Name:e.name||e.cat||e.desc||"",
        Amount:Number(e.amount||0),
        Reason:e.reason||e.desc||"",
        Description:e.desc||"",
        Payment_Mode:e.mode||e.paymentMode||"",
        Vendor:e.vendor||e.supplier||"",
        Bill_No:e.billNo||e.invoiceNo||e.refNo||"",
        GSTIN:e.gstin||"",
        GST_Amount:Number(e.gstAmount||0),
        Amount_Without_GST:Number(e.taxable||e.amountWithoutGst||e.amount||0)-Number(e.gstAmount||0),
        Amount_With_GST:Number(e.total||e.amountWithGst||e.amount||0),
        Spent_By:e.spentBy||"",
        Created_By:e.createdBy||"",
        Created_At:e.createdAt||"",
        Notes:e.notes||"",
        Raw_Record:JSON.stringify(e)
      }));
    downloadCsv(`smartcovering-expenses-${exportFrom||"all"}-to-${exportTo||"all"}.csv`,rows);
  };
  return <div>
    <SectionTitle action={<PrimaryBtn onClick={openAdd}>+ Add Expense</PrimaryBtn>}>Expenses</SectionTitle>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:18}}>
      <StatKPI label="Expenses MTD" value={inr(mtd)} sub={month} accent={T.red} />
      <StatKPI label="Today Expenses" value={inr(today)} sub={todayStr()} accent={T.orange} />
      <StatKPI label="Total Expenses" value={inr(total)} sub="all recorded" accent={T.purple} />
    </div>
    <GlassCard style={{marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",gap:12,alignItems:"end",flexWrap:"wrap"}}>
        <div><div style={{fontWeight:800,color:T.text}}>Export expenses CSV</div><div style={{fontSize:12,color:T.muted,marginTop:3}}>Choose date range and download expenses for CA audit.</div></div>
        <div style={{display:"flex",gap:10,alignItems:"end",flexWrap:"wrap"}}>
          <Field label="From"><input type="date" value={exportFrom} onChange={e=>setExportFrom(e.target.value)} /></Field>
          <Field label="To"><input type="date" value={exportTo} onChange={e=>setExportTo(e.target.value)} /></Field>
          <PrimaryBtn onClick={exportExpensesCsv} color={T.red}>Export CSV</PrimaryBtn>
        </div>
      </div>
    </GlassCard>
    <GlassCard style={{padding:0}}>
      <Table headers={["Date","Expense Name","Amount","Reason","Action"]}>
        {expenses.map(e=><TR key={e.id}><TD color={T.sub}>{e.date}</TD><TD bold>{e.cat||e.name||e.desc}</TD><TD bold color={T.red}>{inr(e.amount)}</TD><TD color={T.muted}>{e.reason||e.desc||"-"}</TD><TD><EditBtn onClick={()=>openEdit(e)}>Edit</EditBtn></TD></TR>)}
      </Table>
      {expenses.length===0&&<div style={{padding:36,textAlign:"center",fontSize:13,color:T.muted}}>No expenses added yet.</div>}
    </GlassCard>
    {showAdd&&<Modal title={editId?"Edit Expense":"Add Expense"} onClose={()=>{setShowAdd(false);setEditId(null);setForm(blank);}}>
      <Field label="Date"><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} /></Field>
      <div style={{marginTop:12}}><Field label="Name of Expense"><select value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}>{EXPENSE_CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></Field></div>
      <div style={{marginTop:12}}><Field label="Amount"><input type="number" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} /></Field></div>
      <div style={{marginTop:12}}><Field label="Reason of Expense"><textarea rows={3} value={form.reason} onChange={e=>setForm(f=>({...f,reason:e.target.value}))} /></Field></div>
      <div style={{display:"flex",gap:10,marginTop:20}}><PrimaryBtn onClick={save} color={T.red}>{editId?"Update Expense":"Save Expense"}</PrimaryBtn><GhostBtn onClick={()=>{setShowAdd(false);setEditId(null);setForm(blank);}}>Cancel</GhostBtn></div>
    </Modal>}
  </div>;
}

function Inventory({ inventory, setInventory, isManager }) {
  const [tab,setTab]=useState("raw");
  const [search,setSearch]=useState("");
  const [showAdd,setShowAdd]=useState(false);
  const [showIn,setShowIn]=useState(null);
  const [showOut,setShowOut]=useState(null);
  const [adjQty,setAdjQty]=useState(0);
  const blank={name:"",cat:"",unit:"pcs",stock:0,min:0,supplier:"",price:0,date:todayStr()};
  const [form,setForm]=useState(blank);

  const rawF=inventory.rawMaterials.filter(i=>!search||i.name.toLowerCase().includes(search.toLowerCase())||i.cat.toLowerCase().includes(search.toLowerCase()));
  const lowStock=inventory.rawMaterials.filter(i=>i.stock<i.min);

  const save=()=>{ setInventory(inv=>({...inv,rawMaterials:[...inv.rawMaterials,{...form,id:Date.now(),stock:Number(form.stock),min:Number(form.min),price:Number(form.price)}]})); setForm(blank); setShowAdd(false); };
  const doIn=()=>{ setInventory(inv=>({...inv,rawMaterials:inv.rawMaterials.map(r=>r.id===showIn.id?{...r,stock:r.stock+Number(adjQty)}:r)})); setShowIn(null); setAdjQty(0); };
  const doOut=()=>{ if(Number(adjQty)>showOut.stock)return alert("Insufficient stock!"); setInventory(inv=>({...inv,rawMaterials:inv.rawMaterials.map(r=>r.id===showOut.id?{...r,stock:r.stock-Number(adjQty)}:r)})); setShowOut(null); setAdjQty(0); };

  const catColors={Structural:T.blue,Fabric:T.purple,Mesh:T.teal,Mechanism:T.orange,Hardware:T.sub};

  return (
    <div>
      <SectionTitle>Inventory Management</SectionTitle>

      {lowStock.length>0&&<div style={{background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.2)",borderRadius:12,padding:"12px 18px",marginBottom:20}}>
        <div style={{fontSize:12,fontWeight:600,color:T.red,marginBottom:8}}> {lowStock.length} ITEMS BELOW MINIMUM STOCK</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{lowStock.map(i=><span key={i.id} style={{padding:"3px 10px",background:"rgba(248,113,113,.12)",border:"1px solid rgba(248,113,113,.2)",borderRadius:6,fontSize:11,color:T.red}}>{i.name} ({i.stock}/{i.min})</span>)}</div>
      </div>}

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:20,background:T.surf,borderRadius:12,padding:4,width:"fit-content"}}>
        {[["raw","Raw Materials"],["finished","Finished Goods"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} style={{padding:"7px 20px",borderRadius:9,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600,background:tab===v?T.amber:"transparent",color:tab===v?"#0f172a":T.sub}}>{l}</button>
        ))}
      </div>

      {tab==="raw"&&(
        <div>
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            <div style={{flex:1}}><SearchBar value={search} onChange={setSearch} placeholder="Search items or category..." /></div>
            {!isManager&&<PrimaryBtn onClick={()=>setShowAdd(true)}>+ Add Item</PrimaryBtn>}
          </div>
          <GlassCard style={{padding:0}}>
            <Table headers={["Item","Category","Stock","Min Stock","Status","Supplier","Last Price","Actions"]}>
              {rawF.map(item=>{
                const low=item.stock<item.min;
                const pct=Math.min(item.stock/item.min,1);
                return (
                  <TR key={item.id} highlight={low}>
                    <TD bold color={T.text}>{item.name}</TD>
                    <TD><Pill label={item.cat} color={catColors[item.cat]||T.sub} /></TD>
                    <TD bold color={low?T.red:T.green}>{item.stock} {item.unit}</TD>
                    <TD color={T.muted}>{item.min} {item.unit}</TD>
                    <TD>
                      <div style={{width:60,height:6,background:"rgba(255,255,255,.08)",borderRadius:3,overflow:"hidden"}}>
                        <div style={{width:`${pct*100}%`,height:"100%",background:low?T.red:T.green,borderRadius:3}} />
                      </div>
                    </TD>
                    <TD color={T.muted}>{item.supplier}</TD>
                    <TD color={T.amber}>{item.price}/{item.unit}</TD>
                    <TD nowrap>
                      {!isManager&&<div style={{display:"flex",gap:6}}>
                        <button onClick={()=>{setShowIn(item);setAdjQty(0)}} style={{padding:"4px 10px",background:"rgba(34,197,94,.12)",border:"1px solid rgba(34,197,94,.2)",borderRadius:7,color:T.green,cursor:"pointer",fontSize:11}}>+ IN</button>
                        <button onClick={()=>{setShowOut(item);setAdjQty(0)}} style={{padding:"4px 10px",background:"rgba(251,146,60,.12)",border:"1px solid rgba(251,146,60,.2)",borderRadius:7,color:T.orange,cursor:"pointer",fontSize:11}}> OUT</button>
                      </div>}
                    </TD>
                  </TR>
                );
              })}
            </Table>
          </GlassCard>
        </div>
      )}

      {tab==="finished"&&(
        <GlassCard style={{padding:0}}>
          <Table headers={["Product","Variant","In Stock","Reserved","Available","Prod. Date"]}>
            {inventory.finishedGoods.map(fg=>(
              <TR key={fg.id}>
                <TD bold color={T.text}>{fg.name}</TD>
                <TD color={T.sub}>{fg.variant}</TD>
                <TD bold color={T.blue}>{fg.qty}</TD>
                <TD color={T.orange}>{fg.reserved}</TD>
                <TD bold color={fg.qty-fg.reserved>0?T.green:T.red}>{fg.qty-fg.reserved}</TD>
                <TD color={T.muted}>{fg.prod}</TD>
              </TR>
            ))}
          </Table>
        </GlassCard>
      )}

      {showAdd&&<Modal title="Add Raw Material" onClose={()=>setShowAdd(false)}>
        <Field label="Item Name *"><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} /></Field>
        <FormRow cols={2} ><Field label="Category"><input value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))} placeholder="Fabric, Structural" /></Field><Field label="Unit"><select value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value}))}>{["pcs","meters","kg","sets","packs","rolls"].map(u=><option key={u}>{u}</option>)}</select></Field></FormRow>
        <FormRow cols={2}><Field label="Current Stock"><input type="number" value={form.stock} onChange={e=>setForm(f=>({...f,stock:e.target.value}))} /></Field><Field label="Minimum Stock"><input type="number" value={form.min} onChange={e=>setForm(f=>({...f,min:e.target.value}))} /></Field></FormRow>
        <Field label="Supplier Name"><input value={form.supplier} onChange={e=>setForm(f=>({...f,supplier:e.target.value}))} /></Field>
        <div style={{marginTop:12}}><Field label="Last Purchase Price (Rs.)"><input type="number" value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))} /></Field></div>
        <div style={{display:"flex",gap:10,marginTop:20}}><PrimaryBtn onClick={save}>Save Item</PrimaryBtn><GhostBtn onClick={()=>setShowAdd(false)}>Cancel</GhostBtn></div>
      </Modal>}

      {showIn&&<Modal title={`Stock IN - ${showIn.name}`} onClose={()=>setShowIn(null)}>
        <div style={{background:"rgba(34,197,94,.08)",border:"1px solid rgba(34,197,94,.15)",borderRadius:10,padding:"12px 16px",marginBottom:16}}>
          <div style={{fontSize:12,color:T.muted}}>Current Stock</div>
          <div style={{fontSize:20,fontWeight:700,color:T.green,fontFamily:"'Space Grotesk',sans-serif"}}>{showIn.stock} {showIn.unit}</div>
        </div>
        <Field label={`Quantity to Add (${showIn.unit})`}><input type="number" value={adjQty} onChange={e=>setAdjQty(e.target.value)} /></Field>
        <div style={{marginTop:10,fontSize:12,color:T.sub}}>New stock: <b style={{color:T.green}}>{Number(showIn.stock)+Number(adjQty)} {showIn.unit}</b></div>
        <div style={{display:"flex",gap:10,marginTop:20}}><PrimaryBtn onClick={doIn} color={T.green}>Confirm Stock In</PrimaryBtn><GhostBtn onClick={()=>setShowIn(null)}>Cancel</GhostBtn></div>
      </Modal>}

      {showOut&&<Modal title={`Stock OUT - ${showOut.name}`} onClose={()=>setShowOut(null)}>
        <div style={{background:"rgba(251,146,60,.08)",border:"1px solid rgba(251,146,60,.15)",borderRadius:10,padding:"12px 16px",marginBottom:16}}>

        <div style={{display:"flex",gap:10,marginTop:20}}><PrimaryBtn onClick={doOut} color={T.orange}>Confirm Stock Out</PrimaryBtn><GhostBtn onClick={()=>setShowOut(null)}>Cancel</GhostBtn></div>
      </Modal>}
    </div>
  );
}

function createSmartInventorySeed(){
  return {
    blindRolls:[],
    blindComponents:[],
    meshComponents:[],
    meshHardware:[],
    movements:[]
  };
}
const ftFromSize = size => Number(String(size||"").replace(/[^0-9.]/g,""))||0;
const fmtFt = n => `${Math.round(Number(n||0)*100)/100} ft`;
const inventoryChoiceOptions = (smartInventory, type="Blind") => {
  const isMesh=String(type||"").toLowerCase().includes("mesh");
  if(isMesh){
    return (smartInventory?.meshComponents||[])
      .filter(i=>Number(i.full||0)>0||(i.lengths||[]).some(l=>Number(l.qty||0)>0))
      .map(i=>{
        const color=(i.item||"").match(/white|brown|black|grey|gray|ivory|charcoal|beige/i)?.[0]||"Mesh";
        return {value:i.item,label:i.item,color,material:i.item,code:i.code};
      });
  }
  return (smartInventory?.blindRolls||[])
    .filter(r=>Number(r.remainingMetres ?? (Number(r.rolls||0)*Number(r.metres||0)))>0)
    .map(r=>({value:r.name,label:r.name,color:r.shade,material:r.name,code:r.code}));
};
const inventoryCodeOptions = (smartInventory, type="Blind") => inventoryChoiceOptions(smartInventory,type)
  .filter(o=>o.code)
  .map(o=>({value:o.code,label:o.code,material:o.material,color:o.color}));
