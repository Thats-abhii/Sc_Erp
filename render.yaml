services:
  - type: web
    name: smart-covering-erp
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PGSSLMODE
        value: require
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: WEBHOOK_SHARED_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
